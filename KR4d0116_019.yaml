body:
  text: 樂靜集卷十九宋李昭玘撰賀遊龍圖冬舜璣觀象迎長至於箕躔鄒律吹灰肇太和於天統隂窮於剝陽復而升正君子之大亨與廟堂之均泰恭惟某官才猷映世聞望髙時抱忠義於邦家勒功名於典册比分閫柄亟騰威略之聲旋偃便藩益著循良之政式遵令序宜茂繁禧即趨近密之班以輔太平之業某方祗行役將遂參承欣頌交深敷宣罔既賀兩府正三陽大亨一嵗更始此天地泰通之際乃精神會聚之時宜有吉祥來薦君子某官翊亮三世儀刑百工適當龍躍之初屹有棟隆之任天其或者將俯屬於治平神實聽之方共扶於業履況三朝之在序惟百祿之是膺乂我蒸民繄股肱之永賴錫公純嘏與邦社以同休賀提舉冬肇復一陽潛萌萬物應書雲之觀望增化日之舒長仰屬使華倍祈天祉某官才資髙逺德性溫恭結明主之深知聮外臺之要職訓齊法守開闢利權聳人望之愈崇宜神休之有相三微正始方協慶於令辰百福應期佇進膺於嘉命某限拘官守阻造賓階無任傾依祝頌之至賀鄰郡守倅冬玉管召陽土圭測日推物萌之載始嘉道長之方來君子對時神明協慶某官靖恭秉德直亮端懷早膺中扆之眷求雅為多士之師表暫資賢望出佐方州宜民之謡既喧聞於載烈自天之報方順履於迎長佇奉褒恩入躋近輔回外邑宰冬陽生律本日起子初吉履對時宜有踐長之慶謙光相與乃承流問之勤載味言芳唯深感臆賀監司正時月昜而書年天地交而為泰宜大人之應會與庶物以咸新某官德美在躬聲華髙世器識藴兼人之富事功為諸路之優方迎道長之期宜享彚征之福佇頌褒詔入踐近班賀運司正天地既交在時為泰君子寖長與物偕通某官綽著吏能雅為國器順履吉亨之會茂迎福祿之來佇被恩綸徑居華要莫遑稱壽但極馳誠祝頌之深喻言奚既賀曾端明正運回一氣卦畫三陽方天地之泰通契君臣之感會某官蓍龜先覺柱石元勳早贊略於西樞暫偃藩於東面道乘時長福以類來佇膺衮黼之褒即正鈞衡之位某限拘官守阻造賓閎賀孫學士正葦桃在户禳磔以餞餘寒椒柏稱觴燔烈以興嗣嵗在時為泰與物咸新某官道為儒宗望出民表暫假蕃宣之寄尚淹廊廟之才方迎道長之期宜享彚征之福佇參大用俯慰具瞻賀鄰郡冬微陽肇復庶物更新蕩祓不祥逐郡隂而盡竄導迎多祜乘一氣以俱亨宜有神休來相賢業恭惟某官儒紳元老禁苑名臣久著望於朝端暫偃藩於方面利有攸往道已應於朋來罄無不宜福將迎於類至佇承節召入輔帝猷某限守州符阻趨賓次賀李邦直正一歲始而為正三陽交而成泰乃天地資生之會實君臣受福之時某官德業亮天誠明周物夙富經綸之學屹為柱石之材望重兩朝進退必歸乎禮義道髙萬世始終不纍於功名神明所扶福祿來附方懇辭於機政暫出鎮於留都圗任舊人將再調於元化永錫難老庶大庇於斯民某限守官針阻趨均屏回諸州通判冬書雲應候測景踐長方陽德之時升宜君子之道長某官性姿宏厚器識疏明暫關決於名藩將徑躋於華要俯迎令節倍格繁休方修拜慶之儀遽辱飛緘之賜但勤誦願尤極感銘回安撫冬一陽資始萬物更新發施天地之和敷錫君臣之福恭惟某官生民先覺命世上才總制節於東州坐消姦慝宣詔條於屬吏盡格循良坐迎日至之長茂擁百祥之助七日來復宜君子之階升一節以趨將龍光之兼被某限拘符守阻造賓墀回兩府冬律應黃鍾斗建子位為天地資生之始乃君臣受福之時恭惟某官柱石元勳蓍龜舊德處朝廷以正直安天下以惠和偉然事業之光華休有神明之協相茂迎令序倍格龎禧大賚善人方允升于髙位永錫難老將久庇於生民某限守州符阻趨鈞屏樂靜集卷十九
