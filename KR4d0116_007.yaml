body:
  text: 樂靜集卷七宋李昭玘撰勑諡靈慧大師傳師諱仁節俗姓張澤州髙平人也母初妊夢白光照室生而有異相睂目澄秀手過於膝七嵗不肉食不衣紈綵耻從諸兒戲弄父為館書生授詩禮數不受教書生呵責之師曰自性具足實無可學諸法空寂亦無所説何用讀書為書生曰小子敢爾吾獨不能教汝邪師因詰以經義恍不能對師曰未能利巳焉能利人書生大慙服其父聞之曰此兒夙生法器已能出離世間當求正眼證了真際是時白馬寺逺法師號通性相攜往見之法師使誦金剛經師才啓帙徑發問曰一切經皆云如是如是之體果在何所若有處有名即是我相無處無名即是外道法師無以答顧謂侍者曰不意今日復見善財童子後三十年當大揚教法汝等悉心供養師既融徹正智欲開度迷濁行化四方以廣緣遇幅巾芒屩不求變俗初不知其異人也儀鳳元年過濮州濮陽縣大姓王敬僧邀止居第躬啓法席然宿蔽情塵隂懷怠慢一夕與其母問法俯仰恍惚見金粟化身放大光明充滿內外敬僧惶怖回嚮亟斷疑網召畫工潛寫光相六日不成師責之曰賊心未除豈見真相敬僧阻懾悔罪更以黃金鑄象示堅固信一鼓完就師曰莫作是念須自心解脫方得見佛開元初南逰黃梅寓蘭若堂中見如來像不加瞻敬拊膺自呼曰大雄世尊顧謂第一座曰佛在身中莫從外覔恭敬讃嘆皆是妄想作禮圍繞但行邪道一切凡夫知修福德心不修無住心知皈依色相佛不皈依自心佛如此起解未免墮落在因作偈曰真佛不住有相非真若求有相即是迷人中有明法師者善講大涅槃經指擲疑義懇師開決師曰三世諸佛十二部尊經皆以無為法未審和尚將何詮説凡如説大涅槃還見大否若見大者即是説大涅槃若不見大而説大者即是謗大涅槃莫為語言了了便持我見如破此疑障師特為印證尋亦領契一日都督啓聽事堂召禪支名宿與師評對師辨才流速無敢敵者即曰是法平等本無驕慢亦無怖畏無為白衣論道輒生輕賤公卿據席爭持怯避今日諸人各為佛法大事如兩軍決戰箭鋒相迎先墮落者便入死地有説速道時諸禪子默認玄旨作禮而散開元五年南逰梁宋望都梁山氣象明秀謂其徒元惟良曰昔世尊未滅嘗有五百羅漢於此棲迹今猶有窣堵波在乃淮川福地也佛度衆生無有差别而衆生感遇自有期數吾將大起佛事莫如此地耳翌日同次於盱眙先福寺頓錫涅槃院相地之東偏誅墾榛棘覆茅為廬從者如流不日成聚或問曰大師從何方來特起化道曰吾昔居西竺香象山北方衆生宿有因會故來度拔先有僧伽道人過寺三請不受乃言曰吾因緣不在此耳後有白衣人即無垢真身為法津梁汝當歸重昔五百羅漢居此嘗有甘井大石覆焉是人至止當自開泄亦正法流通之驗師既來從者告無水命具絙鍤發石出井而飲溉大給今號為羅漢井九年師改修故寺慮嚮道者信心未固與門弟子曳杖淮上逢一流胔扣其顙而問曰金玉滿堂莫知誰守四大六根今復何有明妙真性本無起滅情境蓋纒入生死道故了之者不受後有昧之者常與物遷汝等持修可復流惰彼方之人聞是真語洗心喜捨斫材取鍛千里而至師法力願海函攝有情故神人弗違善惡均化方構棟未具聞豫章石浦山巨木無計復領徒南度躬命採度險翳之間異物憑負有大蛇呀吸氣焰燻烈衆不敢近師為之戒曰毒無自性業力所成汝子在前肯復殘噬觀汝此心本來慈忍業未盡故還生殺害作是語已俯首委蛇而去斬伐期月得美材萬數皆筏乘流初艤淮浦暮夜風烈漂激殆盡門人惡睨師獨恬暇自如須臾風息潮泛俱集浦中後人號其浦曰旌異焉將達先福淮水幾涸最大木數百章重於挽曳不日水暴溢木亦隨至廣陵楊生誓鑄大鐘以侈法具既而金齊方流如迅雷震聞於數里都人士子竦動驚徹頓有悟入越明年殿告成未嚴像設董事者請募檀施師曰異日當天授寶相行俟之耳後果有鐵像浮淮而下泊於境上迎置廣筵巍然端睟乃彌勒佛也江都劉氏鼎建寶塔所費億萬雕繪瓌麗工技幾成乏扣金千畨夜禱于庭翻空而下遽就緣力門人謝居士西逰陕州偶都督崔公酺饗於開元寺居士過其門顧金剛像訶擊之曰汝知佛性否閽者斥其狂執以見都督且疑其非常人也命具以情對居士曰吾非狂但今人誦金剛經不知其義正如此土梗耳崔公却音技召諸釋子談金剛經義無一人應者居士為開析如流聞者通解或問曰汝從何證授曰都梁山三賢大士吾師也崔公昔慕真範輒東嚮拜遣使馳五百縑副金帶以獻會廉使按縣或告師以左道疑衆使即詣焉引師訿責曰道人當以正法示人可復簧鼓邪説師唯唯稱咎乃裒會學徒講涅槃義如師子音振越閎厲使者深省妙趣摧伏魔見合爪稱嘆褫奉白金百千以助香炬玄宗皇帝早服髙悟召入內殿恭問心要欲以如來衣昜居士服懇託至三請俟他日乃受澤州司馬改號玄寂并賜章服道具適其所從師以應緣未畢願歸海上詔復其所將戒行有大乘雲禪師者領徒五百迎詣丈室祈稟機訣師曰若欲問佛即心是佛若欲問道無心是道心體清淨與虛空等不可執取亦無證解如如自然乃是真覺大衆此是自身中事莫認他人語句努力珍重師還抵舊住有南山暉律師來勞跋履因問曰大士不破律儀不持戒法和俗同塵何有差别師曰名有緇俗心無凡聖吾從阿閦佛已來深得正法故內祕菩薩外現聲聞與物波流實非有我今如此言迷執我見持戒出家本求逺離而心有我者即同凡夫律師感喻而去忽有二梵僧參禮師引納尤厚嘗中夜講話但聞婆羅門語數日梵僧辭去門人訊詰宗嗣答曰此吾師也昔在西域逰化五天竺國為吾授記行止相失今四十年因謁清涼山方知投足此地然彼我異緣吾亦西還耳師道化大行風靡四逺華嶽黃冠郭談虛朅來訪問遽謂師曰吾服氣鍊形積有功地將何便門示我解脫師曰大道無形至虛為體滌除玄覽物物皆無舍己尋方猶鑽氷求火氷盡力窮火從何得談虛慙屈悻然告往遇三虎踞道求哀戰伏師遙為攝持遂獲行邁初工事起徒邑人陳招不倦財施䪺輸錢數萬師曰此暫從汝貸為汝守之耳師赴詔還招已殫困屬夜寢方寤聞風雨暴至卒無有也黎明家奴報數百萬錢還帑中矣師多劫因緣悲智具足威力無量降伏一切宴息經行天神擁衛故能警動聲緣成不退轉調服魔戲為善知識者其事非一也嘗訪臨淮富人藺氏家有嵩山李全芝蹢闍展謁藺氏揖與之進師方隱几澄觀有二大密迹士紫金相持劒左右全芝怖却願垂悲濟師為攜接門人吉證從師往上方既還已昏暮覩介胄巨人標相威厲徐躡廡下師至具以疑告師曰此名樓至如來最後得佛有大神力護持正法阿修羅種見即膽裂汝以定眼觀之勿畏也開元十五年為凶人誣訟刺史械付吏鞠訊尤棘一夕大雷雨墻户俱徹同時繫者五木隨解吏以變白刺史倣徨懼禍師勉之曰瞋為毒業如火熾然火盡復寒終歸清淨我法無諍猶如虛空穢溺兵燒空終不壞如是淨念勿生狐疑後縣令以強忍挾恚召師具飯餌毒其中師覆杯於地震裂三尺令觸顙謝過師曰法無我人寃親同等雖殺父害母不生憎怨如來性中不説罪福但冥有心永離顛倒何多謝我也緇流無明每忌師出已隂賂姦俠託以戕害偵夜僚操鎪潛入見天人捧足龍象遊戲屏氣辟昜久之推户閴然遽欲前進變現如故乃投兵悲涕誓從悛洗師棲止簡昜不戒扄楗每出應供詔執金剛曰善為吾守果有盜得衣將竄拘不能去師還猶奉伏待命顧謂執金剛曰姑舍之盜即棄衣慚遁其變異感忽不可思議皆此類也天寶初化事大就更命督工劉海者增傅殿址以杖畫壁曰大水將至明年淮流漲溢不移所志廣陵耆老依止既久來懇師曰我輩與佛同世未能斷除結習願畫一音相晨昏瞻事庶幾常起正念不染三毒師許之尋召工和涅丹碧種種變化竟不能繪寺傭李逺者素侍巾錫以無心觀相落筆皆肖衆競讃禮五年十二月十三日早方盥召門弟子曰吾因願既成來去順流今將逝矣吾滅度後四十年不移此邑當復相見學道人心生則法生心滅則法滅心法雙寂此名見性諸境攀緣悉是邪見應如是知應如是住違吾言者非吾弟子吾非汝師嗚呼生死事大如救頭燃嵗不我與悔將何及復作偈曰身從幻化生四大隨變換還從幻化滅不滅乃非幻滔滔生死海迷者自流轉但照本來心一息過彼岸是夜向晨沐浴趺坐而滅報齡一百有五平地大雪林鹿悲鳴山祇慟泣門人相與議曰昔皇帝為師改服云請俟他日今其時也乃挂衣祝髮儼如生存卜葬於山之髙原而建塔焉師惠命無礙凡所説法皆密契楞嚴圎覺金剛的義故順旨投悟委順而化者或以側足或以坐忘蓋亦千計建中末傳業繼序者猶數百人屬兵蹴兩河師昔建淨居竟為煨燼因移寺於涅槃院將遷其化身傅以塗漆啓發之日鐵函已壞而神色不變睂髮修皯即以華旙道迎藏於别室往日之言正四十年矣五代之亂群冦剽削有士人官于盱眙者挈取慈相絶淮浮泗過于彭門其舟屹然而止舟人聞之闔境奔仰或相謂曰至人化現有方隨緣度物豈吾徐之民將利其賜乎越明日道俗千人頂負膝行奉安于乾明寺法雲所覆千里蒙潤西跨梁宋東達鄒魯長淮之南清汶之北有目有趾者咸歸赴焉我朝慶厯七年尼惠忠發大願力造塔於寺西南隅層甍危絢寶坐崛起四方獻饗綿絡不絶數當輪巔發布光相觀者踴嘆寺有古鐘聲振修逺而棲庇太陋方隂靄中射影簷障見隱突間宛然模象連復數四玩揭重觀即不復有熙寧十年河決澶淵東注淮泗環浸城腹民命如線太守睂陽蘇公軾率吏民致齋祝期以旬日之間水退城完奏乞諡號漲怒果息而淫雨連霔再罄誠謁廓爾澄霽踰月表上其事天子異之賜號靈慧大師塔曰靈慧塔元豐五年髙郵孫公覺來守此邦也嵗久旱精禱塔下甘澤霑足因取諡號勑書蘇公祈報詞疏并刻于石河南王公説代領府事六年夏時澤愆嗇祠謁多不效公默念靈躅宿具薰饗達旦霑沃六月孫公以書移曹南李昭玘命採次遺事為之記録得大中元年釋德秀行狀于尼惠忠院元和二年翰林學士吳通微碑于故先福寺以二者參訂芟其重復汰其語意鄙近與事不合者證以年月為之傳云師出世與僧伽相先後故其事尤類蓋於後劫中同一緣化迄今雍熙塔左猶配禮焉或者以為宗門手足其實非也送吳秀才歸汶上序唐李衛公薨百八十年士大夫有觀故物於其家者感嘆惻隱斂容肅心竦動耳目如見其人彼其聲音笑貌已散於冥漠氣血精魄復化為塵腐後之人方且區區起慕于手澤之遺物此獨愛衛公之賢為不足故也物之偶存者猶然果見賢子孫則愛之宜何如故文肅吳公起布衣致位二府熙寧初言事不合出治鎮海不期年告薨澤施于民者日不給道行于已者未能如所期天下之論至今傷之吳君説禮文肅公之季弟子也篤志好學議髙而氣直落落有大器吾於文肅公雖不及見所愛者吳君耳夫水之阻閼者決之則灌千里木之壅壓者一發則枝大乎幹所積之勢然也吾將見魚山之塜松檟有光色汶水之廬賢士大夫結轍而來逰者復自斯人始傳曰樂與餌過客止吾無能留吳君矣君可自留耶日回月周時不與人逰君其勉之朝伯均字序南陽朝子過余曰公秉名伯父所命也取周詩秉國之均為義願請字左右敬從教余因即其義字之曰伯均伯均之理固有本為子詳説之世俗之言薄等厚小齊大割疣補劓斷脛加足一視同情乃謂之均非也此小仁私智信情滅理自以謂得盡物之心不知搶攘剖擊之患自此始矣天之於物寒往則暑隨之春生則秋殺之一雨即潤一風即動不為大者餘小者損乘其運之相推付其分之自宜即參而該更先後而一此均之義也地道亦然陵髙澤深水濕火燥金沈木浮翼飛角逐若違若從若離若合各正性命混為一區所均亦大矣有人道焉貴食肉賤食藿君子乘小人徒賢役不肖不能事能尊則數隆卑則數殺使人以域守以畔立靡然聽順而無怨爭者各得其均故也天地隂陽猶不能反物以行其私任人之事者不以好惡取舍纍其心從其理之當得則不待斟酌推移而天下平矣必曰吾能貴吾能賤可進可抑可與可奪不任其均而惟其均之者在我其克濟者鮮矣斗斛權衡不為怨府至公之所寄也輕重虛滿一有心焉則無以信於人操之者罪也朝氏漢家令後文莊公以亮直忠厚參真宗政事推大公至正以服天下而天下稱其賢吾子四世孫也好學有逺致以名節自勵異日必能似之吾子勉夫朝子安字序潁川朝子求字於余而俾序其説三反而益勤吾聞責善朋友之道也吾子既不鄙而與之遊不敢不告人之秉物大小輕重要之執而勿失也而莫慎於執玉冕辨入朝奉祀宗廟大君天臨神明交乎左右圭璧在手屹然而立聲氣不動若有所聽者安其心以奉之故也不然傲而髙怠而每下有所思而墮驚懼顛仆而倒置者中自亂耳士之學道者必以執心為主智及之仁守之莊以蒞之擇術既審見善既明吾將操而勿捨也如彼而厄窮如彼而利達吾不知也行或縶之止或挽之吾不知也所知者吾如是而已見得不惑臨難不懼奉其身以立於義命之際甘言厚利不可撼搖大威強有力者不能掣而奪也行無奔息卧無噩夢神舒氣怡泰然自若者吾能安之耳夫心危物也一動則不可禁三牲在前五鼎在後文繡眩亂淫哇嘈然勢利之徒左右招之睥睨之間風回波靡一舉手而攬之頽然形往安暇固平日之捉持者哉詩曰秉心塞淵外物之來不得其隙而入窅然靜深無以撓之非安而何昔文元公仕仁宗朝致位內相履道夷坦與物無競及其老也退而家居著書樂道以終天年出處之際始終完一天下大夫皆尊仰之究其心之所安非一日之積也吾子好學特立靜以自守不妄取捨異日必能似之謹再拜以告請字曰子安燕逰十友序余發故篋得頃嵗所藏古器銘識晉唐石刻唐人遺書名公墨迹臨倣諸帖小畫水石蟲鳥傳模畫本類而緝之判為十帙名曰燕逰十友此十友者淡然相與無求無責數見不怠久不相接不相遺信乎可與忘年者也日有餘力悠漫無寄遇事齟齬頽惰不怡揖十友者置之坐隅更出迭進各獻其能而為余勉焉吾是以出處與之俱而人莫能間也客有聞十友者過而謁之謂余曰孰無好子獨瑣陋淺促非磊落人也特兒戲耳余曰以紙為鳶以竹為馬奔走跳擲觀者笑之乃自為戲而不以戲人於人何病必曰舍己所好以從人正所病也客曰垂頭几案手不停披目運心移卷窮意盡此須臾之適耳余曰雕堂綺席歌管迭作歡樂飲酒亦須臾之適也適去而憂隨之則余不與焉客既無以屈余意又從而諛之曰傳有云不有博奕者乎為之猶賢乎已爾今子之賢過博奕逺矣余曰彼夫子進人之語也若賢之實其誰可居自回賜而下不敢覬焉不然何其賢之多也果以此為賢必有操戈逐其後者矣因強而藏之曰余友者聊以自娛非恱於人也何必示人客默默而退政和丙申季秋序樂靜集卷七
