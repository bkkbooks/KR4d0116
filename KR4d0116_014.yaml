body:
  text: 樂靜集卷十四宋李昭玘撰代人賀元圭表欽承休貺叶至日之迎長肆設盛儀闔萬邦而來賀列華紳而星拱翼寶盝以階升上公跪進而前天子再拜以受大樂備九成之奏羣臣奉萬嵗之觴麾幡縹眇於祥風雲物冲融乎和氣人神胥悅霈澤橫流以答自天之休於昭不世之瑞曠古盛典一時榮觀中賀自昔陶唐聖神獨運惟時文命水土既平歸我帝功薦其器寶謂俊德克明者本於智黎民於變者生乎神用此以知人而人績成推此以則天而天道順故外黑以示智之所出內赤以顯神之所存顧强名莫得其緒餘惟默識可求諸形制書猶具在世獨無傳三代下衰曽莫聞其付豫兩漢甚陋終不發於沉潜天心未有以感通人意亦難於窺索綿歷嵗時之久寂寥霄壤之間爛然光明了不刓缺蓋上穹眷佑有待治時而神物護持乃至今日恭惟皇帝陛下儲精稽古恭已愛民聽言同衢室之詢化俗猶大章之作兢兢以行道巍巍乎成功家陶德化而可封人競恥心而不犯亦堯之盛與帝而俱屬景命之方興果珍符之來格學士討論而不謬工人辨閲以無疑再考祕文益詳嘉應得玉璜於磻水何乃不經出寶鼎於汾隂是誠小物固宜告圎丘而饗上帝拱南面以朝諸侯迎福祿之大來對天地以同久臣親逢熙旦猥預下僚倣佛闕廷徒極望雲之想婆娑田里聊陳擊壤之歌代濟州命官學生道僧耆老請皇帝封泰山乞車駕經幸本州表竊以封禪大事古昔有聞數千百載之相望時難偶值七十二君之可記遺跡尚存非至德無以動天惟聖人乃能行禮義當有請時弗可違衆議所同不謀而合輒殫愚懇上瀆嚴宸中謝恭惟皇帝陛下亶聖智之才邁帝王之德仁被動植孝感神明朝廷正而庶官修庠序興而衆賢出禮極商周之盛樂同韶濩之和四時序而五穀順成九澤通而百蠻請吏困窮有養囹圄屢空為道難明視古無並萬邦咸乂豈惟同德之三千百化已成何獨大功之二十三靈協相諸福薦臻太史書祥殆無虛日輿人頌聖如出一辭冲融六合之間充塞太和之氣元圭載出垂眷甚休青帝來臨示人尤著當躬行於昭報無久曠於上儀必展時巡用䖍祀事顧兹東土有曰泰山泰言作鎮之尊東乃資生之本羣靈之府衆嶽之宗近在大邦素為福地升煙中頂可近接於皇天檢玉圎臺亦深明於精意不特享一人之慶蓋將䝉萬世之休幸詔諸儒敷求故實矧規模之具在皆耆老之能言追真皇已講之文請從今日繼神考方興之志奚俟來年惟麟野之舊封附陶丘之大邑去畿無幾視魯為鄰路固少於縈回地尤多於平衍萬人無擁六馬不勤才經清泲之郊圻已見東山之雲物伏望皇帝陛下曲從人欲俯屈帝尊遡日馭以啓行揭龍旗而來幸肅傳鳴蹕徑取便塗舜禮方修敢願陪於羣后堯車儻過竊有效於封人庶仰曯於清光不虛生乎盛世第二表投寸莛於洪鐘固知難動納細流於滄海尚或能容是誠力所不量恐亦行之甚昜躊躇欲却僶俯復前中謝竊以奉牲玉於圎丘以展報天之禮潔粢盛於泰折式昭事地之儀此皆有國之常經未盡聖人之極致非升中不足以對上穹之佑非降祀不足以接厚載之靈自伏羲以來斯焉可考由祥符而後今則其時敢布懇辭再干宸聽恭惟皇帝陛下聖心天縱神化日新造士訓官羣俊在位制禮興樂習俗已成木索俱閒倉箱遍溢犀利䝉皮而不試遐荒削枉以來庭洋洋乎歡樂之聲恢恢然仁夀之域精神之妙既已和同天人糟粕之餘猶將陶鑄堯舜冬祀方修而清真格韶音才作而白羽來大㓛岌嶪以升聞諸瑞紛綸而畢至草木山川之勝競出珍符日星雲露之精次垂喜應不為創見非止一書此皆前古之罕聞何獨大封之未舉惟岱宗之作鎮在方嶽以居先巖巖之望尤髙生生之德滋盛神房阿閣即先聖所棲紫蓋黃光盡吉祥之氣舜帝時巡之禮具載遺書真皇夢感之靈竊聞殊貺伏望皇帝陛下躬行升降丕答顧懷鶴髮相扶每共談於古事鑾輿來幸將復望於清塵宜奉三神之歡以錫庶民之福雖貶成抑定謙不自居而附厚增髙禮寧終廢是弗為也尚稽檢玉之期侯不邁哉徒鬱搢紳之願載言大野俯次輔藩參考舊經最為便道五百里之非逺東北望以甚平乃汶陽接畛之區正羽衛徐行之地幸頒俞㫖夙戒候人煌煌華蓋之來四郊風動隱隱春雷之轉萬騎雲從臣某等夢寐傾心掃除先路進陪朝序敢希闕里之榮親見聖時誰復周南之歎第三表盥手奉章鞠躬俟命望雲雖劇伏地無從獻一得之愚已幾喋喋下十行之詔尚復遲遲中謝竊以因崇祀以告成禮當有報為生民而祈福意本無私乃上聖所優為亦下情之公願凡在照臨之屬莫知鼓舞而來稽於衆則可從冀䝉兼聽至于三而必瀆敢避多言筮日之良瀝誠斯迫恭惟皇帝陛下化行俗美治定㓛成隂陽天地以流通禮樂刑政之明備丁寧德意孰非堯舜之用心熙廣聖㓛不忘文武之勤教交萬物以道得百姓之歡衆賢並興五兵俱偃養材有本造小子以詩書懷逺無方裂殊鄰為郡縣九年粟腐比户錢流惸獨孤窮飽餘糧而鼓腹桁楊纒索掛空犴以凝塵朝廷胥樂於清明田里蔑聞於愁嘆馨香有感惠澤無垠共陶一氣之和遍為諸福之應元圭發見上帝降觀九霄光明日有戴氣千里澄徹河無橫流甘露葳蕤寶山崒嵂竹實供九苞之食野蠶增卒嵗之衣雙蓮駢苽不並生於庶草赤烏白鵲獨先至於四靈淮人瞻崒堵之光嵩阜示高真之相嘉榖動盈乎拱把瑞文繼出於山林九臯之鶴蔽天同傾萬目五色之芝連篚幾困十夫禮部受圗嵗嘗百數外朝稱慶日或二叄呈露紛綸變化竒詭事出乎見聞之表意存乎象數之間歡流聲詩光動簡冊此太平之極致何峞峞乎彼載籍之所傳特小小耳惟天之垂眷者甚厚故民之報上者益勤圎丘方澤之齊嚴未為之稱束帛金錢之慰遣詎已其來必先喬嶽之封允答三靈之眷庶弗違於上下亦曲盡於情文庸示光揚非為進越博士濡毫於冊府夙備討論封人側耳於路隅屢從汛掃載稽前古無越此時雖退託以未遑顧久留之何待蓋曠世罕逢於盛際况舊章非設於空文今復仰冒嚴誅堅陳丹懇幸稍回於淵慮難終抑於輿情魯邑儒冠已顒顒而北嚮岱宗雲物每靡靡以西來伏望皇帝陛下追祖武以聿修奉天時而順動自大野達東山之境導屬車無五日之行良出便安最為平昜填金祕冊罄一人昭事之心刻石層崖張萬世無前之烈訪仙閭之縹眇觀海日之騰陵百神之御沓來萬嵗之聲相屬回鑾夷路瘞帛崇壇麾仗雲屯琛貢山積先端冕以受四方之賀大作樂以舉諸臣之觴躬問髙年畢修羣祀尊儒闕里欵帝真庭賜酺飲以交歡欣濡德音以蕩瑕穢榮光均被慶賚並行永孚宗社之宏休丕顯帝王之能事臣某等敷言纍牘引領踰時恍迷丹闕之岧嶤想見翠華之髣佛躊躇終日搖役寸心奏帝典之一篇慙無宿學望聖人而三祝竊效前驅代賀平瀘賊表勇校鷹揚赫天聲而莫禦窮陬電掃殱鼠類以無餘三捷告旋萬方交慶中謝臣聞漢闢牂牱之地始定南夷蜀興瀘水之軍寖通諸夏雖屢更酋族時擾疆陲固不煩浮以六師止可以驅之尺箠夫何狂醜敢黯皇靈謂中國之兵不習山林之險聖王之法必寬夷獠之誅輒肆披猖自媒剪覆以至虎臣受略軺使移輸先攖必死之喉襟大索已窮之淵藪踝頭顱於川谷卷廬落於灰埃何能逃螻蟻之生無復恃螳螂之臂風馳旁徼魄落諸蠻伏惟陛下聖德靜淵武烈神速萬全之勢灼見於目中千里之師焱來於天上以山壓卵如火燎枯孑無遺凶少快宿憤昔方叔之征玁狁柔服蠻荆二師之伐大宛震驚西域跂觀遐俗畢附中邦臣素荷國恩忝分符守喜聞寬詔竊助歡聲飲至行封莫陪於周廟頌功稱夀徒望於堯天代知徐州馬大夫謝上表祇擇時日初見吏民當朝廷訪落之時各修其職濫師帥長人之寄徒愧於名撫已知榮感恩欲涕臣某中謝伏念臣斗筲淺器畎畝孤生遭遇聖明因緣仕宦亦嘗登進言責披瀝肺肝分二計司運量金谷載更使指出領憲綱未歷嵗時遽銜哀恤養既違於將母義當許於致身逮賜對于天光復轉輸於嶺表出入溪蠻之徼馳驅瘴霧之中以革裹尸分捐邊野舉頭見日莫望長安方撫水之繹騷病師糧之難給粗完經費遂致招徠幸蜂蠆之無虞顧形骸之可乞猥䝉寬詔退守真祠屬瘴疹之稍平奉詔恩而入對荷先帝神明之照知孤臣忠梗之心假以便藩養其暮齒惟徐方之奧壤實蠻服之舊封井邑浩繁風俗剛悍宜資名德以賴藩宣夫何妄庸輒膺任使此蓋皇帝陛下道膺堯智德邁湯仁謂犬馬有一日之勞簮履乃昔時之御曲加完愛詎思棄遺臣敢不勉激吏能奉行德意桑榆雖晚未忘幼學而壯行金石不移敢有先難而後昜少立涓埃之效上酬覆載之恩樂靜集卷十四
