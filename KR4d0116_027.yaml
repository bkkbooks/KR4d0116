body:
  text: 樂靜集卷二十七宋李昭玘撰試館職策一道問傳曰秦失之強周失之弱昔周公治魯親親而尊尊至其後世有寖微之憂太公治齊舉賢而上功而其末流亦有爭奪之禍夫親親而尊尊舉賢而上功三代之所共也而齊魯行之皆不免於衰亂其故何與國家承平百年六聖相授為治不同同歸於仁今朝廷欲師仁祖之忠厚而患百官有司不舉其職或至於偷欲法神考之勵精而恐監司守令不識其意流入於刻夫使忠厚而不偷勵精而不刻亦必有道矣昔漢文寬仁長者至於朝廷之間恥言人過而不聞其有怠廢不舉之病宣帝總核名實至於文理之士咸精其能而不聞其有督責過甚之失何修何營可以及此願深明所以然之故而條具所當行之事悉著於篇以備採擇對百王有可變之道而天下無不弊之法古今無一定之時而聖人有應變之術由道而言之堯舜相授一道也由事而言之夏之政忠其失也小人以鬼商之政質其失也小人以野周之政文其失也小人以僿聖人不恃其事之不能弊而必欲強天下之所厭而病人之所不能從所恃者吾善救之而已今夫水之為物也濕其勝則息火火之為物也燥其勝則息水二者其勢不相逮也有智者焉火在上水在下鼎鬲在其間而五味以和此無他善調一故也為天下者能知其善調一之術時有損益而斟酌之至於無偏弊不舉之明則古今一理也萬世之道也又何竊竊然憂天下之不治哉秦人據崤函之險擁甲兵之富磨牙搖毒并吞六國及其弊也閭巷匹夫皆攘臂相與起而亡秦德不足故也周人為千八百之國分民割地使世為藩屏一之以禮樂法度時之以朝覲會同上下之勢如臂使指如手足之捍頭目及其弊也征伐號令不出於天子齊桓晉文扶尊周之名終無以興王室威不足故也要之德非亂天下之術威非亡國之具特用之有善與不善耳親親尊尊仁也仁之效緩而不切故周公期年報政而其勢不能使人無怠惰寖微之憂舉賢尚功義也義之效太明而速故太公五月報政而其勢不能使人無急迫必爭之禍故仁而不義則失之縱義而不仁則失之忍此齊魯親親尊尊舉賢尚功與三代同而受患與聖人異無以救之故也藝祖以武定天下太宗真宗以文致太平仁廟慈愛天下躬履純儉思與天下之民安寧涵養於仁壽之域政令簡昜刑輕賦薄四夷之未服赦而不誅大臣之有過貸而不治恩被四海澤及草木而匹夫無失職之怨常使舒遲樂昜於法度之外而不相促迫百官有司不能體上之美意至於弊玩茍簡相與竊其溫厚長者之名而從容於自養之地此上非不勤篤而從事者已甚也神宗以英睿之質奮乾剛之斷一新天下因循不改之弊理財治兵訓官造士賞功不疑罰罪無赦謹簿書督期會奉法之吏晝則計功夜則思過奔走竭蹶各盡其力而不敢告勞於上監司守令幸於見知訶及細微責任不量力以苛為明鍥薄之風靡靡馳競而終無以成忠厚之俗此上非不和昜而行法者過也昔演門以親死者以善毁爵為上卿其後黨人以毁死過半察其矜名趨利之心則去本益逺矣夫明王操厲世磨鈍之具以作成天下之材與之同心均力興起萬事昭功業於後世其志之所向亦已勤矣奈何官人百吏不推明德意以應上之所期悻悻然幸於為己以敗上之法度亦是有罪焉耳夫行百步不至則止行五十步中道而止卒至於箕踞偃卧而不進志怠故也一棋既勝而復棋者愈善卒至於智慮搶攘而後已其數迫故也墮者猶可以牽一臂而起之迫者斥於無事而已矣如此則小才淺智常汲汲於日月之不足聰明之士不敢削於繩墨之餘兩得之矣文帝之初天下既定出於兵革誅斂之用與民休戚感一婦人之言去肉刑愛十家之産罷露臺此仁人也吳王不朝錫之几杖疑失之寬宣帝先法律而後詩書重賞罰而輕德教此霸道也蓋寬饒楊惲一有過失誅之無赦疑失之猛若夫馳射之上林欲親罰胸奴雖寬大長者而有不怒之威思與良二千石共理使民無嗟息雖總核名實而有不言之憂雖然道將行也非人主所獨能為其臣亦有以與之也故賈誼太息流涕欲以法制詔諸侯明禮義齊風俗所以略施其説黃霸行循良之政而人服愷悌此文宣之世所以不至於怠惰督察之過者公卿大夫相與明其美意而篤行之故也愚嘗觀天之道陽主仁隂主義仁善生養義善制割陽常主進隂常主退處於無用之地觀人之道父主義母主慈義則敬而尊之慈則愛而親之由是推之治天下之道不幸過而失之猛寧失之寬故秦人之攻戰不足於周人之德澤齊人之強富不足於魯人之禮義漢宣之厲精不及於文景之恭儉蓋可恃者德本也可存者厚道也楚人有疑獄三年不決問諸大夫半以為是半以為非或曰陶朱公布衣而富必有竒智使人問焉朱公曰臣不知治獄家有二璧焉一者千金一者五百金其徑相若也澤相若也色相若也側而視之其倍二寸此所以為千金也主上仁孝母后慈愛內之公卿大夫外之守令監司寢掊剋之風布寬大之澤百姓安生業四夷不內擾年榖順成財用不匱大數已得之矣然法之所未善者行之以仁祖之意則不刻意之所已降者約之以神考之法則不偷此三代救弊之道也其或天下之事與天下之政令出於議論之不同利害之不一其意猶未敢出法之外者假之可也子賤為單父宰請善書二人魯君與之至單父則使書子賤從旁而引其肘書醜則怒書好則復引之二人辭以告魯君魯君即以單父付子賤而單父大治由此觀之法終不可以純任必有美意以作之又何拘焉若夫當行之道廟堂講之已熟姑發其大略云樂靜集卷二十七
