body:
  text: 樂静集巻四宋李昭玘撰和程適正見贈二首壯嵗干名幸起家十年蹭蹬一長嗟慿陵初託風前鷁淘汰終隨浪底沙沒得𤣥機問黄蘖却將齊物付南華感君憐我貽佳句一段秋光照晚霞簿領棲遲嘆陸沉滔滔何處覔知音凌雲詞句豪難敵似水交情老更深鼷鼠飲河聊滿腹白雲出岫本無心從今収拾身閒計洗竹鋤花日醉吟北園書事三首葛巾茅屋自為娱門掩槐隂長夏初聒聒難休鳩喚婦飛飛不定燕將雛繞池曳策携雙鶴架水澆花課小奴麥飯滿甌葵數筯丁寕車馬肯来無得喪有萬理古今猶一區鶴鳬元自足蠻觸竟同枯十年蕭散愈身輕弄筆翻書亦稱情當案忽聞縁壁墮隔池遥見啄苔行静疑多事非求福老覺無心勝攝生自愛吾廬人不到何須谷口問歸耕贈子常二首幽蘭一曲思無涯炊熟黄粱日已斜閉户終年心似水讀書萬巻眼生花汗流不舎浯溪刻糧絶猶須北苑芽束帛不来人已老只將清白付吾家本無機械亦非愚自信沉冥與世疎一段畫圗冬卧雪平生樂事日翻書田園無暇供餘稅風雨何堪巻敝廬笑殺貴人門下客不逢此老曳長裾贈故人劉器之待制文史當年共講磨扁舟此地復經過流年屈指夢相似白髮論心喜倍多寄眼偶懐梁苑雪臨風猶駭洞庭波從今燕坐叅空寂却笑天人被佛魔早秋書事二首正晝睡方起門無雀可羅風池亂荷蓋雨徑滿槐鵞齒髮流年速江湖歸興多終期買船去卧月扣舷歌盡日與琴語經旬無客過蟬移鵲争樹魚散雨傾河每悟酒如聖不禁詩作魔風聲稍蕭瑟殘熱定無多齒落孽蟲負固飽羶葷摧折纔能絶禍根每遇屠門慙大嚼猶思夢澤欲平吞初揺不為脣先喪已脫翻驚舌尚存莫與時人作嘲笑不如緘口學無言髮白有感剪􅩧無多日星星已數莖不空年可諱端與事俱生安得馬肝石未甞甘露羮有情憐陸展解與小兒争早秋大暑不可怨秋来終有時露驚庭鵲睡風動井梧枝逐客長夜感美人團扇悲如何陶靖節獨與菊花期贈漢臣夫子以貧病終身復凍飢捉衿無可攬數米不成炊何以謝蟋蟀獨能留扊扅徒勞問倉扁王老是良醫八月十五日夜大雨風伯遭讒不自停鞭龍倒海勢如傾胷中洗盡三年渇闕千倉嘉榖入新耕野人亦有充飢幸相見春綿滿眼眀九月八日雨作盪滌驕陽勢已迴徧流和氣入根荄簷間㸃急侵燈落枕底聲髙帶鴈来永夜故畱人不寐輕寒未放菊全開明年麥價應如土安用登髙把酒盃北園偶成二首㳺宦歸来似繫匏偶依河渚寄衡茅以貧為樂漫喜酒與世無求非絶交倚杖静聞風過竹枕書閒看燕争巢却憐多事揚夫子更為𤣥文作解嘲酒昏便書榻詩痩怯寒葅志大懐千駟㓛髙憶五湖闕何如一盃粥晴日照吾廬送春終日無人晝掩扉緑隂庭草自相依輕寒曉覺池臺静半夜春隨風雨歸恰似舊逰鸎獨語畧無餘恨燕争飛飄零不解東君意却放楊花亂撲衣有客携扇欲予題字因以一絶答之平生自笑書成癖運墨圎毫日幾囘六角招人聊一戯區區老媪復能来和鮑輦七夕四絶織女黄姑天一隅九清飛馭盡通衢年年須作秋風約此事朦朧信有無奕奕流雲度太虚盛陳𤓰果望天衢嘗聞刻楮三年乆一夕穿針乞得無如何靈匹異人間脉脉相望卒卒還不用蛛絲争送巧自知得拙半生閒一水盈盈㑹合難古今雲路暫来還㡬多靈鵲成橋去獨有棲烏月底閒十月晦過舍弟庭玉䖏見諸人棊戰方酣頃之復過集者皆散獨枰尚在窻户閴然因成三篇呈子常漢臣元一聮用弓字韻云兵鎮侯就國獵獲士藏弓後以非同韻昜之今即録於此妙手固多暇忿兵終昜窮戯餘歸一笑戰罷失羣雄風過雨雹息天明星斗空爛柯人已去斜日上牕紅一先雖自喜百戰亦須窮狡兔有三窟連鷄無兩雄霸成秦陌廣騎去楚營空老子無知解頽然醉頬紅得失信偶爾好謀徒自窮前㓛竟何在百戰漫争雄昧者甘守拙髙人成悟空不如来飲酒聽唱小桃紅御試宿集英殿雨過有作呈敏甫學士朝寒生廣陌宿雨漲方池霧桺和鴉重風簾為燕欹闕多才惡摩詰無日不成詩子常生日無以為夀偶得團茶一餅因書拙詩一首藉之以獻比年方貢競珍藏膚理豐腴紫璧光虬膂左囘分絶格蒻衣十襲護新香貴人恩澤纔浮賜俗骨塵埃不合嘗願作詩翁千嵗夀乘風聊復發清狂迎駕端門萬騎錦衣紅迤邐鳴矟下半空天極奥居黄道北瑶池歸仗五雲中金輿影度長廊日法曲聲囘廣殿風泗水昔年曽夢到拜恩何幸接鵷鴻喜晴寄張使君使君仁術物同情日望田疇祝頌成夜滴未休心欲折朝陽初放眼先明比年嵗􅍄多中上此事邉防繫重輕食足訟稀真可樂時傾盃酒話平生无咎哀辭二首落落孤標氣吐虹青雲指日黒頭公兩行粉字平生盡一曲龍吟萬事空夹路衣冠如昨日故園桃李又春風朱絃雖在知音絶樽酒今誰笑語同才屈千人未昜量妙年文采已飛揚終身祇得一麾守後日空留萬丈光風馭不来成寂絶玉樓何在隔蒼茫可堪囘首魚峯路滿崦青松照夕陽送次膺赴詔二首辭章泛濫昔稱雄飄泊文園偶未逢舊典鐃歌歸制作盛時郊祀待形容乆無青眼憐髙卧新有宫詞落九重異日錦衣還故里却尋蓮社日相從青雲初上萬人看中路摧頽鎩羽翰一日馳聲動黄閣㡬囘飛夢繞長安翩翾丹鳳来天上寂寞雙松倚嵗寒自笑白頭冠尚在十年塵土不堪彈次膺哀辭三首翻然矯首奉恩除却似當年擢第初憔悴九衢林下客光明一軸錦装書馮陵河岳才無敵繪畫乾坤思有餘方板赤虯何太迫君王曽未識相如平昔絃觴浪自怡暮年薦鶚有新知蛾睂翻作黄昏哭樂府空傳白紵詞上國音塵隨夢斷東山蕭管結秋悲風亭月觀依然在遼鶴歸来復㡬時行止非人不自謀飄然一葉信沉浮躊躇去歩迷三徑奄忽平生閉一丘韶樂已聞更雅奏瑶池尤喜近中秋無人解寫昇平事惆悵騎鯨去不留雨後二篇苦雨㡬十日滿庭多土花行螺上牆屋倒竹卧泥沙澄景生凉吹晴雲變晚霞却愁清夜夢無計逐池蛙一氣不自息四時如轉丸月流天宇静風掠葉聲乾紈扇已謝事莎蟲將戒寒登臨偶有得不復計悲歡贈漢老姪琴鄒嶧孤桐不可尋汧公舊斲萬黄金顧余乆有沉舟志知子甞懐欲炙心便好安絃求妙趣不須變雅作新音席間弟子来傾耳為問何人屬意深某氏挽辭二首翟茀朝初罷升堂拜已非凝塵孟光案洒血老莱衣奩鏡悲鸞舞庭萱感露晞西風原上路無復板輿歸主饋齊家道羞蘩肅婦㓛疏封秦大國致養漢三公世事哀榮極人生夢幻空夫人篤好内典慈顔不可望彤史有遺風樂静集巻四
