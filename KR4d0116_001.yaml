  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0116_WYG_001-1a, image: WYG1122/WYG1122-0258c.png}
body:
  text: 樂静集巻一宋李昭玘撰逰白鶴觀春歸數十朝八九不暇出萌芽日夜發百觜競撐突駕言謁仙祠古像懷髣髴白鶴来何時蒼檜暮蕭窣雲霞斷人世往事已荒忽解纓濯泉流深澈㡬照骨毛寒不敢視下必有神物昔人斯徜徉音影詎磨没嗟予質汙下見亦被呵咄仰慙逍遥逰未忍塵土汩時須挹髙風為我一吹拂從張聖塗乞石先生築髙隱趣好清且獨雲龍峯上石跋草自鏨斸發竅號隂怪窮根攬坤腹山靈不敢愛鞭叱滿崖谷危躋已穿履大載㡬折軸直欲起巖巖未容買碌碌心營合天造指化出神速突兀傲中巔憑陵勇雙矗獸蹲目睥睨龍攫腰囘蹙縮脰立幽鳥擎顱卧孤犢鯨鱗老㢘利相角怒撐觸軒昻鶴引咮贔屓鼇跂足騰空快髙思排峭驚醉目伊余朅来逰歩百吟周復願從乞其餘伴我東牆竹猿鶴莫相嗔此客意非俗常令月色照敢使塵土辱日待風雨来起看空遶屋送王子中南歸筠州荆山美璞昔未發鬼神訶守誰可奪妙工伐石强剖抉試之烈火皎氷雪長虹射天晝不滅夜堂流光墮明月堅厚粹温函正氣不許時人巧雕礪羞與佩環争細碎直登丘壇薦天帝世無琅玕来作貢楚人未售空長慟索價當髙勿輕用緹囊十襲須珍重送徐州舉人赴省試淮夷之珠照夜明泗濱之石聲泠泠昔時大禹致方物神光玉色羅廣庭比年入獻多豪英褒雄妙思相憑陵飃飃束書去觀國痩馬踏雪鬚垂氷長廊白晝天宇清落筆冉冉風雲生千官拱笏赭袍近碧溝新栁黄鸝鳴金撾虎士傳姓名魚龍巻尾隨雷聲州人洗眼望歸期㑹約春風載酒迎送李容甫歸北都先生讀書不下堂堂上有客語琅琅弟子出觀如堵牆怪君睂彩生光芒北都晁夫子一别乆相望君来道信問使我開肺腸三日不改服猶覺芝蘭香平生寡投分一笑且云樂慇懃發黄巻鈍吻慳應闕大杵撞啞鐘已厭音響惡更慙河伯觀未昜窮海若索寞嵗華晚颼颼黄葉秋歸心劇流水忽忽不可留固知此鱣鯨肯託尋常溝直須見老聃可化南榮儔海州歲有冲天鵠卵如萍實光琢玉蜀鷄𦕈然何敢伏羽成不須求日浴一舉將驚萬人目雪堂詩寄子瞻愁雲蔽日昏風發鵝毛大片舞空闊隂崖氷壓木枝折一鳥不飛人足絶山翁口掉肩擁褐斫竹􅠡茅勞架結堂成不用巧丹涅却畫東坡四山雪羣石嶄嶄争皎潔門外堂間兩清洌萬境一心同瑩徹石牀雲生濕肌髮布被颼颼冷扵鐵半夜哀猿叫山月山翁髙哦響修越不道妻啼憂米竭世事薫膏付灰滅長安髙門奔請謁赤日炙背沙埋轍僕夫汗流馬吐舌三謁不逢腹欲爇怒氣恐成疽毒裂狂走不須求扇暍此堂一登能濯熱謝劉主簿見和乞石詩官居太疎冷門外少車跡蕭蕭此君軒為我慰窮寂貪饕起餘慕逺乞南山石形模太詭陋此詠費搜摭蝦蟇欲上甕作氣屢跳躑心知不可強怒癭猶鼔息但勞旁者觀笑爾不量力君能恵然来抵鵲輕尺壁明月投我懷坐上光彩溢神心巧鐫鑿變化出胷臆髙言寫豪壯健讀口終吃衝風巻海濤蕩潏迷四極陣馬脫重圍戰士皆辟昜使人魂魄沮三日不敢食嗟余性頑闇兀兀寡知識臃腫終天年不願借雕飾飜憐孤僻中趣味得所適拂石雲生手誦詩風滿腋此應長不飢富貴乃毒腊人生多苦辛嗜好須自擇昻昻千里駒昻昻千里駒逸氣吞九區東馳越夕兔西走窮朝烏闗山一息過躑躅疑有無快哉穆天子逺駕周四隅嘶聲想雲海弄影有天衢昆丘距赤水度足纔須㬰眷言芻粟恩豈敢論形軀雄心忽摧頓倦歩成躊躇日暮路途逺天寒毛鬛疎此時垂耳心可復輕疲駑泛泛水中鳬泛泛水中鳬上下聲相呼徜徉信波浪澡濯羞泥汙晴洲漾蘋荇雨岸眠菰蒲飲啄亦自足飛逰誰我拘侯門大池籞富屋夸庖厨何慙乆垂翅未願輕投軀雖非黄鵠舉幸與白鷺娱逃烹笑窮鴈啄腐嗟飢烏三秋􅍄粱稻萬里開江湖寄言澤中子何用張羅原本闕飛鴻亭平野浩空濶危甍兀岧嶤臘盡風日好春囘氷雪消朱絃試揮手度響何翛翛此意復誰共古人今寂寥眷彼澤中鴻欻起如囘飇悠然薄天末去去不可招愧無雙羽翰萬里同飃䬙人生本蕭散知慮勞煎燒恈恈覘聲利傴僂隨紛囂安知出世間造適皆逍遥帝鄉果何在乆願追松喬行歌歸去来五斗空折腰敺雀行田頭小兒杖敺雀雀飛上枝不敢落繞樹詋罵語聲惡三時耕鋤一時穫老牛力盡石田薄五龍作嗔風吐雹赤烏燒雲龍見逐南村賣桑北村熟狐尾毶毶穂齊屋縣門大書催賦粟南闗飛輓夜摩轂掃舂縛箕十指禿一米未炊汝先啄直須殺汝償我腹田父坐語兒雀不暴人人亦飢但令家雀千羣飽莫使征西戰馬肥春日逰西池雨餘風日暖野塘春水滿天影倒浮人鏡光環射眼蘭船不可上漠漠低煙晚歸路已埃塵滄波鳬鵠逺樂静集巻一
