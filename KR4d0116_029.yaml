body:
  text: 樂靜集卷二十九宋李昭玘撰吳彥律墓志銘公諱琯字彥律纍贈太師中書令諱文祐之曽孫將作監致仕纍贈金紫光祿大夫太師諱懷德之孫資政殿大學士贈太師封秦國公諡文肅諱奎之子母趙氏追贈冀州太夫人繼母張氏纍封鄆州太夫人亡家北海自文肅葬汶後為汝人公以文肅遺表恩補將仕郎祕書省正字既冠調監徐州酒稅元豐官制行改承務郎監鄒鎮有巨盜過境上聞公仁而愛人相戒不可犯束手以去就遷承事郎㑹哲宗登極遷承事郎權齊州長清縣地大事叢素難治吏以公貴人子頗易之公漫不省前此囚繫纍月不决一日躬自引訊量罪傅法隨决遣之牢户一空旦視事訟者喧沓塞堂下涉筆批解人得其情呌抃出縣門去吏惴惴負壁立無敢旁睨舊令玩弛積弊頺委具條目戒告凡警偷束姦直寃恤隱先後張下人畏之如神號曰日新父老至今思之丁母夫人憂免喪遷宣義郎簽書護國軍節度判官公事張太寧提㸃陜西刑獄人憚其嚴州縣望風求勉既至檢法官通判河東令皆以病告公獨舉一府事比次酬對各有條理太寧嘗駁部中具獄委公審閲公曰以人命迎上官指顧如幽責何力分明之張始大悟即日表薦于朝資政蒲公宗孟知府事以前執政自重操下甚急凡參佐治事須晨入暮歸公曰吏奉公無曠不得恤其私情未安也欲移病去使者重其節使按事他郡蒲去乃還終不為屈檢法官倚文生事侵詆府屬嘗語人曰萬一案牘出入不當法意必摘聞上公寄聲謝之曰律令餘事爾輕重自有理何至失入如以出得譴無悔也府有疑獄公出力平反人謂不寃亦不自為功資政范公百祿繼至每付以綱紀公才髙尤務大體嘗請於范公曰府所以督縣也令偷脫避事屢求决於府府為追呼以擾鄉部是守常代令治也當戒諸邑各事其事毋故不警以自幸更有罪移令痛懲之范行其言境內大治以通直郎通判保德軍今皇帝即位以恩轉奉議郎賜五品服遷承議郎通判永寧軍民有訟財者躁狠失辭當置于法公命易牒責其償以出是時河北方更制樓櫓公獨請樞府願少緩期責庶益堅久遷朝奉郎大觀元年年五十四上書請老乃以本官致仕公少有大志剛梗喜有為欲卓卓自見於世嘗上書論河東轉輸便糴利害皆天下大計於書無所不讀論歷代治亂纚纚不倦至古人氣節不撓處輒抵掌歎激為文渾厚敏給雅自好亦不茍作撰南郊大禮賦典麗雄富人皆稱之嘗有郡太守喜文士登樓燕集曰快哉此風屬公聨賦辭氣警拔一坐盡傾終身不求人知以義自信雖聲齖不合裕如也所與遊皆一時名卿交口稱薦宜偹獻納退處閭巷不登公門不道官府事客至酌酒賦詩隨意取適悠然終日退而窺其私則蔬食不充不以為病王氏寡姊寢疾纍年以亡奉養送終無一不具又買田以活其孤中外有不能自存者多賴公以濟八寶覃恩遷朝散郎又詔許致仕官得再仕諸公欲強起公稍治資産以託身後公曰吳氏世清約自文肅公貴未嘗買屋以居獨有故書在乃亡業田也食於斯足矣不然徒為人書劵爾性至孝自奉甚薄祭享之具尤務豐潔晚年不堪事必扶力薦酌率子弟執禮唯謹同時僚友多在髙位未嘗叙契濶有就見者送迎如平日或誚其太簡公曰彼以知我故來今吾亦故吾也復何貶焉忽夢文肅公曰汝睂目踈秀隂德在人已而得疾即以後事飾諸子且曰先公有大功于王家不幸年不得下夀小子庸弱不能紹發緒餘茍免罪戾而過先公之年瞑目奚憾病再閲月起居如平生至斂手足不亂以政和四年十一月戊寅終于正寢享年六十一五年正月丁酉葬於東阿縣魚山鄉孟柵村文肅公之兆次公有文集二十卷室人吕氏先公五年卒賢而有禮法公所恃以為助者多矣八男子紹京兆府法曹參軍早卒結將仕郎繕文林郎給通仕郎絅緬綡縯一女適射法令張子定孫男女十有八人公善教子簡嚴有法度結給繼以經術擢第繕絅綡貢辟雍其餘子與孫皆幼有立余嘗聞自昔有隂德者必得其報至髙其門以待信不虗矣公之餘澤固未艾也將葬結以狀來求銘為之銘曰士以學行志則愛日不謀其身維以始卒我車既堅服馬云邁中道而休亦保我載有德在人而命不厚惟德不亡乃自為夀譬彼嘉谷既種其實生之又生百世之食有蕃子孫克配其澤山回水長於此歸魄傅主簿墓志銘君諱思齊字至之逺祖良弼仕唐歷沂州刺史其先清河人皇朝初遷徐州豐縣又遷覃州魚臺今為魚臺人曽祖贍教授鄉里祖圗隱居喜浮屠學父永錫以治産起家三世皆不仕君永錫之次子也樂易有常行好義甚篤與人久而益親人以善事歸之會河决澶淵經費未給君曰畎畝不忘君卜式獨何人㦲因輦薪芻千萬願濟其役朝廷嘉之授太廟齊郎調劔州梓潼縣主簿以母老無壯子弟就養不赴未幾母卒號毁屢絶幾不終喪服既除或勸從仕君曰家世仕族不幸緒業中墮轉而為民吾志學無所成且復孤弱無力起門户嵗時徭賦吏作威特檄詬呼當關不置竊耻之今日舉手板長揖縣令史過庭下無或睥睨子弟去丁籍免給事公上自幸多矣不願仕也家君無奔走自效猶能坐里門勸人為善裨風教萬一無茍也元豐間大河復溢橫流入東部邑有舊防連絡數十里吏玩不治垝缺非一水將至居人大恐編木浮甕逃死甚急君部家僮數十人荷畚鍤號之而趨從者如雲面水衝立舉杖指呼人百其力不數時完塞隱然無虞脫良田數千頃老幼遮君拜道上曰微君之賜廬舍家墓盡為江湖吾將鼓鬛而遊矣願以功聞上君曰守望相助不敢不勉今日之幸天也吾何預紹聖間將舉大父葬事考卜既宜而地並山行徑窘澀方秋成不敢轥民田出入父老知之遽請君曰同社小人飲君之惠為久今逺日將至不能委拱把粟為挽翣除道是無義也惟便宜自擇復戒僮奴曰異日無得縱放馬牛踐塋域百步無得輒入中林彈射至今松檟修鬱過者曰此必傅氏阡也合一門百口資産稍立不以豢養敗子孫即所居闢十數楹左右圗史命布席危坐執經誦習以厚隨計上玷奏籍一名歸過閭巷吾當以一尺之面見鄉人此其志也邑人不甚喜儒患無以倡之距居數里有馬先生之祠人莫知其為東漢融也君齊潔汛掃具樽爼躬薦獻羅諸兒拜庭下觀者如堵退而嘆曰先生以髙才博洽為世儒宗今敝里獨無其人患不為爾後生聞之競警激日奮事業嶄然自見者多矣奉職和育大理少卿王振姑之子也幼孤老窮不能活振移書託君君為治居室料理生事衣食以給育既長以女孫妻之賓州從事王汝輔娣之夫冒瘴死旅殯道傍久不歸骨厚資遣其子行萬里扶柩以還四方遊士聞義而至者授館餼如在公府舉匕箸堂上如集鳬鴈有所假求不以厚薄無倦窮冬大塞羸老行乞顛踣衢路為屋收之薪火袽絮糜糗飲藥人與之卒嵗得活者幾百人晚益喜聚書好賔客飾庭榭茂林修竹日涉成趣酌酒笑語無虗日天章閣待制李公師中自汝往來屢從宴飲嘗有詩曰門無俗客盡清隂家有藏書敵萬金益稱其雅尚户部侍郎馬公㸃與君同郡平昔甚歡既貴君不為俯仰相遇如布衣時後其子以訃聞馬公歎曰自爾輕施重義樂於為善與人無間不易得如此人矣治門內謹約束無寸紙一辭千縣令與人情義明白人亦不忍欺鄉鄰有鬬訟先質於君判可否為解譬以理往往毁牒而去嗚呼信可謂一鄉之善士矣元符三年九月三日以疾終於家享年七十七娶宋氏先君十三年卒男六人偕舉進士攸將仕郎德州司理參軍伸鄉貢新科明法價左侍禁你敕賜青州助教佺鄉貢進士女六人長適宣德郎吳彥次適鄉貢學究閻友直次適進士李袞次適進士李郊次適通仕郎陳壬次適登仕郎向澐孫男十人激洵洙深漸洄沂濤洞皆舉進士孫女十人皆歸士族曽孫十三人尚幼德善之報方逶迤衍慶未易量也將以政和四年七月十二日葬於魚臺縣髙平鄉東單村之原佺以狀來乞銘於豫為銘曰士不茍作或以見已所願既薄求可而止善善及人何必曰仕身則不酬惟後人之祉吕正臣墓志銘君諱規字正臣世為兖州萊蕪人曽祖日新故任駕部員外郎祖旬教授鄉里故不仕父孜故任淄州司法參軍妣楊氏君性嚴重簡默若不可親者人樂與之交事父母盡愛以順待其兄內外無間言博學工文不專記誦務曉大意此所聞大槩嘗為人稱重者竊考其狀參以本末信乎一鄉之善士也司法君棄養門內幾百口飲食被服滋窘一日兄弟合食堂上議所以託君獨進曰斯事不敢以詒兄憂請任其責稍經理生事異日糊口四方棄廬舍去墳墓妻子流散復何面目望魯東門乎乃募工徒斬木鍛鐵制器利用視他工尤精密人人豫一已獨豫三人出取三我獨取一凡東州之人一農一工家㸑户禦其器皆吕氏作也㑹官議收攉君盡其齊量作程利害嬴約一切并歸之語其族曰吾家世儒學非殖貨者方禍至艱急日計不支倒行逆施何暇擇去就昔一疏食今兼肉矣昔嵗無褐今重裘矣祭祀以時嫁娶如禮賔至有館有餼可以言義時也不爾使後生輩貪得爭利挾氣犯法前日之積正為獄吏資爾因太闢館舍要致一時名士與羣從游以經術講習稍預鄉舉鄉人貧病不能出門户婚葬失其時四方遊士顛頓道路不得歸力振翼之一日忽得疾子弟左右侍告曰汝知所學又知所以為善矣美名髙爵行可自知吾少也困賤事為力不暇比幸栖遲田里庶幾見汝輩冠蓋入吾門時有顯者來布衣無憾嗚呼嵗不我與吾今往矣東臯有黍亦既播之汝食汝收惟力無惰元符三年五月十八日終于正寢享年四十八君先娶王氏兖州朝散郎天錫之女先君十一年卒繼室閻氏濟州承議郎仲約之女男三人長曰黃中秉義郎前淄州長山髙苑兩巡檢次早卒次師中縣學生女二人長適郡貢武士孔盤次適鄉貢進士梁元忠孫男二人曰澄曰淳孫女三人在室政和六年十一月十三日葬于萊蕪縣朱郭村孝婦原師中來乞銘其墓為之銘曰士不世官或窘家食養祭不供惟子之責厥初艱憂承父之蠱我幹我謀乃復用裕數粒量帛不資其餘他人厄窮溫飫與俱好義則榮知足不辱磨之友師俾自求福富貴利逹天實為之詔爾後人亦既有詒宋故益州路諸州軍水陸計度轉運使直史館護軍賜紫金魚袋贈尚書工部侍郎李公神道碑公諱某始系出隴西成紀後為齊州金鄉人曽祖某祖某襲儒服恬晦不仕父某閒居讀書教授鄉黨子弟無求於人人敬其有德纍贈度支郎中公即度支之長子也幼聰警篤學有大志初七嵗日持一卷書置几上若有所思羣稚戲走不顧未晡已默記數百言或問之頗曉大意度支異之曰大吾門必此兒也景德三年以明經中第釋褐為陳州司户參軍未幾丁度支憂終喪再調沂州沂水尉舉進士試禮部偶不如格公曰學行之上也安用虗名遂棄場屋以祖母喪去官服除授開封府考城縣主簿嵗大飢朝廷貴尹擇良吏賑給尹狀公治行應㫖公躬行饘粥授病者以藥朝暮數問勞如其家人得活者數千人相率謝公曰父母生我能脫吾死者主簿也世為牛馬以償不稱感泣再拜公卿間由是知公有仁術可用薦充大理寺詳斷官每議獄必平心定氣審閲數十然後麗法法一定慘惻終日得從輕議喜見顏色暇日一切罷造謁惟學是務客至相與論天下事纚纚然忘倦皆愛其有廟廊之器而不知其為法吏也祥符中朝廷無事四方奏符瑞上方喜弄翰墨圗繪太平公作祥源觀賦夸麗詼詭放蕩排騁幾數千言卒之以法度并奏疏以獻上喜納之改太子中書通州判棣州知逹州事並山無井負致良苦公破竹架䨥泉注城中人不病汲尋遷萊州膠東之士喜誦數略文義公召郡之秀民日與講解執經坐堂上者滿席因奏增嵗貢朝廷從之自是萊之學者數倍他郡有大姦李翼挾資長雄肆奪為不法隂拾吏短長掣其手使不得鈎擲一日潜縳致庭下件責其罪黥竄逺方人聞之舉手加顙嘆公神明嵗終考課第一撰天聖䇿要四十篇奏於朝其言感慨切直中事情願急世用五榖絲枲以治飢寒仁宗愛其才召試舍人院賜進士第改屯田員外郎提㸃成都府路州獄代返擢三司度支判官上殿賜金紫出為江西路轉運使夏賊擾邉調度方窘公以本道羡錢二十萬助軍費賜詔奬諭移淮南未行徙兩浙數月除成都路遷工部郎中直祕閣㑹雅州有巨獄罣捝數十人吏滋不决公夙駕馳險行五日至屬道已感病至之日遂卒享年五十九公為部使者務從大體去苛急訊獄平恕不喜深致人罪而示已精明治財有本未嘗操智數掊克以斂民怨前後兩使蜀人狎其愛訃聞官吏慟泣居民為之罷市公以愷悌待物而處已莊重故人樂其易親而畏其不可犯薦吏幾三百員始疑其濶略無節後自州縣躐美官班班有名績時論稱其知人居家清儉不妄笑語不飲酒俸廪所餘不以入門內周乎族姓之貧者助其嫁娶平生嗜好一寓之墳史有餘力必論事著書不以世不知自廢古今之治亂聖賢之出處強國義人治身修性其言易知與道同貫至於涉世應事得喪悲樂吟咏情性發於所感寬而不迫樂而無怨有古詩人之作焉凡論䇿章奏為卷若干雜文古風律詩為卷者若干櫝而藏之異日諸子白大人請治資産公推櫝示之曰懷此待價利不資能行吾言當如吾不負汝後三十年子孫涖官行已皆有能名通朝籍者二為郎者三舉於鄉者連以文藝中第公之言益驗一時名士大夫遊公之門者多在髙位范蜀公鎮石公揚休皆布衣時從公講學後致身禁從為時名臣公獨奔走四方以死命也以某年月日葬公於某之原公娶扶風馬氏宜家有令德先公四年卒男四人長曰羣終國子博士次曰安郊社齊郎早亡曰兟右朝奉郎知成州曰衆終右承議郎女一人早亡孫男十六人公夀公度並終虞部貟外郎公約監處州松陽縣髙亭場公淵公裕舉進士公祐以進士中第萊州萊陽主簿皆卒公濟進士出身隰州隰川縣尉公立公忠公才公敏未仕孫女十人長適秦州司理閭丘圭次適朝損之次適張斁次適卞之美次適劉師文皆舉進士次適廣濟軍定陶主簿崔翰次適隰州司法魯永安次幼朝奉君狀公行事求文於某晚進竦聞緒餘敢不從命謹考次先後為之銘曰士孰不學寡見淺聞富哉李公涵養有源取之其身經世道民器大用狹而感子言嵗不我與遺諸子孫餘波渾淪仕學滿門左陽之西為公兆阡人望松檟正其衣冠死亦腐骨其人若存命也不厚德名則尊始終業履有考斯文大書端首以覺後人張純臣墓志銘君姓張氏諱仲原字純臣濟州巨野人纍世隱德不仕自君之父鼎始應科舉以行義聞君生數嵗學為文章時有動人語諸老先生多稱之嘗夜讀書不寐其母為起滅燭戒之曰汝父饒於財獨一男子當資取如意無自苦君曰學在致祿將以顯親也願從其志既冠舉進士隨計上試禮部不中居家治館餼厚禮知名士問學日益髙明父得疾纍年晝夜憂不交睫既棄養盡哀毁瘠終喪不窺門內一日盡舍其科舉所學慨然嘆曰祿不逮親吾將何求宜從吾所好即其居東南闢地種松竹中為大堂環壁架書邀致儔好論說終日時載酒相勞酒酣賦詩人競吐竒彈珠投璧磊落相射以此為樂人亦從之不厭也河朔大荒民流亡委幼弱道上君悉養於家飲哺浣沐與家兒等方春物色父母歸之餓者踵死枕藉相屬募人斂收藏以大冡羅食物弔饗之召浮屠氏用其法呪誦解祓以絶祟厲士貧乏無所依飲食居室隨所須必具間假求折劵不問至有閲嵗月不能去者敬勞如初平生好聚書不計所償掇拾數千卷指以示諸子曰吾為汝曺得良産其利不資非金玉守無替汝力晋魏以來迄于今以詩名世者凡百餘家往往成誦至啓手足時口不能吟猶躡躡自喜所為詩僅五百篇刻意杼柚非一日故雅麗清逺多古人不到處嗚呼可謂一鄉之良士也元符三年五月十七日以疾終享年五十鄉人皆傷之先有治命語家人曰吾先君欲改卜髙原葬我大父未幾寢疾泣以付我嘗恐奄忽負先君語為恨無窮不幸疾苦逮今彌年甫畢大事若有神助死生命也又何憾焉娶錢氏武肅王之曽孫治內有法後君五年而亡子男五人曰紳三班借職曰詢曰績曰綱鄉貢進士曰紹女三人長適鄉貢進士翟光弼次適鄉貢進士王彤一在室諸孫二十二人男曰彥輔彥忠彥正彥和彥逺彥常彥聖彥誠彥圭彥回彥覺彥臨彥能女九人並幼崇寧四年十二月二十一日葬於吕村諫議鄉之原并錢氏祔焉從先兆也昔君之父就養孑立無他昆弟遊膝下逮君年未四十子孫已十數人嵗時拜堂上鴈行進退士族相語以為盛事初閒居不復筮士有相好者告曰君才過人兾及壯時拔身取髙位何為泯沒閭巷笑而不答後鄉人去仕官奔走四方稍稍重名爵憂􅉵疾病其甚者顛頓流落殆不能活妻子君方幅巾林下嘯吟傲睨較其利害得喪然後服君之髙大父以資其家獨君數散施寖失生事家人為憂益自信甚篤自君之卒子孫皆力學執經庠序者數人其一升辟雍為貢士借使昔日侈居養無一毫惠善及物士大夫過門不入後生輩無所睹聞庸庸怠惰至於辱身敗門户不能如今日自好無疑此又知其賢於衆人逺矣將葬其子紳來乞銘於豫豫與君晚同場屋君之父又兄弟遊也知君尤詳為之銘曰有美斯人兮好修滔滔不願浮我舟館餼奉客日與遊圗書潤屋後世謀起羸掩露吾隱憂黃金禍人無久留千首不見東諸侯從吾所好非所求天實抑之夫何尤有泉在淵滿則流前日種耘後日收魚岡之藏其可休仁夀縣君藺氏墓志銘夫人姓藺氏其先開封人左藏庫副使宗道女嫁供偹庫副使木公封仁夀縣建中靖國元年十月十五日卒於寢舍享年七十一夫人性明慧遇事有識取乎中義動有儀矩閨門內外雍容調一而無間言事其夫尤敬未嘗忤辭色木氏族大無世資夫人既歸於其家婚姻之助出奩中物無一毫吝嗇踈服之貧者撫存尤渥不繼輒脫簮珥與之察其意得而後已供偹君方謀葬考妣不幸病且卒夫人曰人子之恨莫大於此使長夜不瞑者未亡人之罪也傾其簏為錢二十萬卜得其地於祥符縣柏榆之原奉姑舅以葬并其夫從之負土徒跣以助封築行路嗟惻平居出納有度儉以自處冠婚祭祀飲食服用不謀於人而皆以時具仕者厲於官學者強於業女即其工婦修其職舂㸑之賤各運其勞而不知化嗚呼夫人之德可謂賢矣不幸長子早卒哭之甚哀寢疾纍月越明年秋疾作如故召諸子促致喪具親舉佛事衣衾之制手自紉綴疾寖極告諸子曰吾嫠居守節幾二十年綱紀家事一日必葺惟恐貽乃父地下憂汝等方壯而立且復有子矣吾順化無憾然克孝克和以續厥宗猶有望於汝也言竟而逝以其年十二月二十六日舉其柩歸於供偹君之壙禮也子男四人長曰彥輔右侍禁監鄆州都作院先夫人卒次曰彥國彥常彥弼皆舉進士女一人適右班殿直杜士宣孫男三人曰詵曰諤曰說皆幼孫女六人長適三班借職路扶次適進士柴貽序餘在室余事夫人為小功尊而䝉愛尤厚知本末甚詳故為之銘曰夫人之德實母婦師內明外正不介以私於義能果霈然克施孤嫠立家有養有歸所願既獲知死不疑木世風顯逮今則微惟德可作祉祿具依尚爾後人勿替爾思樂靜集二十九
