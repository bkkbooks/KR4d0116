body:
  text: 樂静集巻十一宋李昭玘撰上鄆州安撫劉莘老相公書某皇恐䪺首百拜上某官閣下某元豐間作舉子同相公二令息登進士科後一嵗復與今管城令偕除學官是時方執子弟之禮請謁左右相公亦以禮進而不拒也聴言侍坐茫然如循大海之涯莫能窺測一二退以自許以謂寒鄉晚進望大人先生名徳之重一造其門以得見為幸元祐初詔試入館相公位既顯徳業並著天下之士奔走望風摩轂而至皆一時之豪傑相公坐政事堂為天子調緝百度道迎太平塞天下之觀望以得失為輕重外則為朝廷考觀人才内則相與講論經世之具相公固不輕於與人士之吐竒畫䇿者亦平日感慨自負不疑於有為也自惟渉道甚淺聞見鄙野氣孱志狭一無所長乘馬從徒陪三館之士出入掖門塵埃風雨破帽自障蹌踉俯僂日復一日顧左右虎士如有愧色區區亦莫知其何為也同列之間俊異朋合吐辭論事伸睂抵掌方使雄向挟輈賈馬執鞭其後相與並驅周旋每坐其間不敢據席面熱氣茀竟不能語闒闒如屋上鴟惟恐其彈射之將至也退而治事則磨丹和鉛鐫補字畫一見蠧蟲則惡而殺之獨不知無功而禄坐官舍食太倉黒頭利喙便腹蠢蠕月費三萬錢亦書林之一蠧也當此之時便有投劾而去暇振衣彈冠趨歩王公之庭哉夫犯分而進不若知守而退使人可賤不若以賤自安往時雖數月未嘗一走門下者其志亦如此而已如某等輩雖百數十必無補於盛徳之萬一猶能退自屏縮以冒昧為罪亦於相公進賢退不肖之道有助焉爾茍為不知此三日一謁五日一拜縱不䝉箕踞而慢罵亦門下之罪人也京居累年職事既非所安又迫以貧病求去甚懇累月未報猶以莛撞鐘幸其鏜然以應固不可得也伏䝉相公造物無間與之曲成憐其無用之愚一言埏鎔獲遂所請被命奔迫束装東歸洒掃敝廬上先人冢墓哭兄長於室問勞孤嫠飲食族子弟私願既畢徑趨官期度白馬之横流覽鄴都之頽址浮清漳探滏口弔黎人之墟訪赤狄之祀如歴階升天底於上黨其地襟以三闗帶以汾沁七國之時為韓邊邑趙魏倚以障秦而相為鴈行秦不破韓不敢循東山而下開元以来連絡六州為一大鎮騎太行之脊前扼幽并旁蹙鎮定當四塞之冲屹為完城亦形勢之國也其俗儉嗇固陋克於自守爾我不相昜故急衣食而緩節義重財賄而薄婚姻地髙氣寒故堅忍而夀陵阜多川澤少故有餘於力而不足於智雖強聒難令而無椎牛發冡羣行剽刼之患斯有取焉爾上自秦漢下及五代阬趙卒封馮亭直盗兵之寃翦鳴辰之禍夹城之圍三垂之戰遺蹤舊事歴歴可按一来於此年穀既豐民訟希濶飽食而日有餘力山經水志斷碑遺史田野老人之語究其本未足以增益所未聞登髙望逺山川氣象負抱回合感事賦詩足以泄其羇旅之思不知為吏之勞而有宦學之樂此皆相公前日之賜也幸甚幸甚日夜奮勵未知所報雖然士之為志也致一而已是非可否重輕利害衡之於心而照之以道無待於人人亦何與於我也要之不辱於終身之義自信其所為而不茍挺然中立不倚於物而姑從吾所好其為窮達用捨則有命焉爾如某之說雖相公之自處者猶若是也以身任國事宰平天下裁量斟酌合千萬人之情同不齊之口愛憎毁譽動盪排觸紛紛藉藉特未定也日使百手百喙撫藉解釋必不能平惟相公應之不撓使物自為輕重去就而不相薄者為能洗濯其心一以待之而已士之與王公雖貴賤異勢茍為學先王之道要其自得之志未甞逺也汶為東藩非勲徳之盛無以壯京師而鎮方靣股肱勤勞暫爾分逸西歸之召正在朝夕伏冀為時貴生還踐鼎席宗社永賴天下䝉福某官守拘隔末由參侍台座下情無任傾依激切之至不宣某皇恐䪺首再拜上答劉秀才求先博士墓誌書博士劉孝嗣也某再拜伏䝉遣人寄示先博士行狀委之誌銘伏讀反覆泫然墮淚哽塞終日恭惟先博士文章議論器業風節卓然盡在人上士大夫知其名者莫不嘆息追憤願為之載述而猥先不肖理亦疑焉自念與先博士元豐初擢進士第名列奏籍有同聲之舊元符間攝事南都因縁聚首把酒笑語傾露肺腑情義欵熟復為同好之友古之人既曰故舊朋友凡有以赴患難託子孫者皆受之無拒不幸且死俾之書數百言納諸壙中以信後世乃餘事爾来使恵然必以此也幸甚幸甚某不敏輙逡巡再拜以辭固有說也某杜門屏處十餘年中間禍患摧併哭泣之哀相踵者七八志慮凋耗餘息僅屬忽忽如迷人未甞涉書史窺古人制作之意筆硯塵涸覆弃地上不復収拾逮今事往痛定遇意少適欲為小詩陶冩情性經營終日不能成章間得一二句瑣俗淺惡正如劇兒行歌乞人擊節之語竊自鄙笑亦復慚恨竟與敗絮敝屣投之糞壤示不更作行年㡬七十百事斥廢每遇天日暄和藉菅擁絮坐墻下暴背摩腹氣血俱融頽然一寐此日用也其他種種現前不復經意若夫枯腸索竒字嚼齒造健語蓬頭搔鬢其色焦然徼倖於世俗牙頬之間固不暇也此某所以當辭而左右者不得不聽某之辭也必欲強其所不能使某不得以不能自免則一切荒浪顛倒茍塞来諭一聞於人百手指笑足下方以顯親為孝而無以慰其心某之玷負先徳亦不克終故舊朋友之義非所安也昔栁子厚死皇甫持正為文哀之知子厚者止如此而已韓退之為誌其事辨說明偉信非常人所能知者光芒一出千古不滅言足以發之故也足下欲以此意見屬實非所敢當必求諸能者毋勤来使幸甚某再拜代賀方回上李邦直書伏念犬馬之齒既壮且老望門下之日不為不乆方未冠時碌碌無所知識閣下應直言詔嶄然起北州策天下利害於天子之庭卓卓皆經濟大務傳之四方士大夫誦其言想見其人者摩轂而至某自量何如人不敢奉洒掃以從衆人之後竊以為慚後數年迫於致養遽從一官監門管庫義茍不辱坐則如窘木索動則與輿皂等勤一忤上官訶詆隨至且虞誅責之不可脫則無以事親畜妻子故垂頭塞耳氣息奄奄崛然自奮之心日已微矣閣下位益顯名徳日重一旦參領大政門下之客皆一時豪傑而某之貧賤猥陋不改如平日縱能操尺紙之謁膝行下風門䦨典謁之吏一覘其姓名已偃蹇不問左右青紫􅌓睨耳語不怪則笑雖某之心亦不能自信也故又逡巡中輟某嘗思古之王公鉅人出則為名世不幸不同其時不可復見時雖同而老死窮僻終身不得而見之者皆命也可以往見矣言不足以自媒力不足以自舉欲行而如有挽之者而又蹷焉疑亦有命爾然以謂或出於人事之不齊者猶末志也比江外代歸閣下方出鎮咸陽距京師二千里堂上之老不可去須臾升斗之祿甘㫖不足盖未能贏三月之糧褰裳以往也今則調官衡陽將浮汴達淮渉江漢絶沅湘萬一有逃於風波之患而長沙之南地苦卑濕皆騷人逐客悲吟歎息不自聊生非北州之士所能安也而又母老妻病子弱身復多疾一月之間飽食甘卧者不過數日方且日夕促促以皷鑄為事金錫之氣薫灼腸胃叫呼咄咤驅策吏卒以赴其員程此賤者之事非敢辭也自惟平生多艱小有所須動不諧適百歩十躓一食三噎又安能必後日之志哉所幸守官彭門辱與公子有一日之雅今輙以悃愊自託繕寫所為惡詩若干篇上獻台座俳歌諧語之比試以閲之幸甚若夫渭水秋風倚樓長笛固未能挹司倉渭南一勺之細乂安敢望李杜之波瀾哉區區之心伏惟左右憐其憔悴之餘無他好而已代賀方回請見書某聞古之士方其竒窮瑣賤未遇之時或束書裹糧周行四方跋山渉川冒犯霜露固非去墳墓之國而樂它邦舍安佚而好逺㳺也將欲覽天下之風俗交天下之賢士大夫収其聞見議論之益去其卑汚固陋之弊以自成其所志者不得不然耳與夫抱殘編屏窮巷傴僂蹙縮端坐則面墻舉頭則礙屋幽憂沉寂志衰而氣促區區掇拾古人之腐餘與兒女子語欲望遭時而立功名者亦可鄙矣孔子曰父母在不逺逰逰必有方此古之士未嘗不逰也昔司馬遷二十而南逰江淮上㑹稽探禹穴窺九疑浮湘沅北渉汶泗講業齊魯之都觀射鄒嶧過梁楚以歸若夫髙山大川名都沃壤物産之蕃美士人之豪秀固已洽聞多識而昭澈乎胷中矣然後辨論古今馳騁千載之上下著書以名後世此有志者所為也某不肖生質孱懦未能強立而竊有志焉感慨先王之餘風想聞士大夫之髙義惟恐身不及見而見之且不多也間者南逰梁宋東走鄒魯還過於滕滕古侯國也山林深茂氣俗淳重宜有賢者為政於此某一至境上而閣下之休問溢於民言喜躍不自勝以幸其及見輙有請於執事者願一識風采而服其緒論惟閣下受之而已代四兄求薦舉書某聞萬金之賈陸駕大車川浮巨舶南窮甌越北極胡漠龍皮象齒文犀紫貝夜光之珠照乘之玉一旦得之則深居大第拱手待價通侯巨室先之以將命繼之以飲餼以幸一閲方牀大案藉以藻繡大僕挟扶逡巡而進革匱十重綺囊十襲整襟濯手而後發照爛錯落神動心悸徐問其價則以千言萬以萬言億下酬之則勃然作色中酬之則掩口而笑上酬之則躊躇不欲而後應盖所得者重則所予者不欲輕故也販婦販夫陸拾棗栗水捉螺蠯足皸指秃暴露風雨罄其力不過一鈞之舉計其價僅足一日之食正晝過市欲人問之而未嘗顧也日暮人散鷄棲於塒豚歸於苙突未及薪釡未及粟其色焦然掲之則屢用弃之則可惜皇皇扣人之門户㡬何不悲吟行乞矣此其意何也所養者薄而所售者急也蹈道之士被褐懷玉志足以輕王公氣足以驕富貴致恭盡禮則見之誠親心合則交之非其徒招之不来非其義就之不見嘗恐山之不深林之不幽世俗之人將逐其後也又何嘗以半通之綸五斗之粟折腰下邑踧踧於人睂睫間哉若夫道不足以任己才不足以驚世其志懦而卑其器拘以迫使之效一鄉任一官輕趨疾作以應期㑹指呼不知勞訶叱不知辱如轅下駒顧一束芻垂頭塞耳不憚鞭箠當是時又何暇議髙節卓行矯激自負哉雖悲吟行乞亦所不恤也某生質頑昧讀書二十年三試不第晚從䕃補得官下邳碌碌獲佐大邑生齒繁浩簿檄填委勾考之詳出納之吝日夜砥礪計功補過茍免罪負中心所幸者一薦狀耳薦状所願者一縣令耳今則已踰兩考未能如格揺揺引睇于門下者日夕以之終亦不敢以鉗結自廢也恭惟閣下道徳在躬仁恕成物屬部之吏洗湔出塵泥而脫枯槁者固已多矣以某不才何以與此然而竹頭木屑無間於大匠之手牛溲馬勃不弃於良醫之門此某之心猶有待也昔者荘子舎於故人之家故人命孺子殺鴈而烹之孺子曰其一能鳴者夫能鳴者則矯翼而飛不能鳴者則合喙而死如是則某今日之言不得不聞於左右也伏惟閣下貸其僣昜憐其㡬成出一手而挈之糜身之報不敢為衆人後伏惟聰明亮察幸甚幸甚樂静集巻十一
