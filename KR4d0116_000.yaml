body:
  text: 樂靜集别集類二宋提要臣等謹案樂靜集三十卷宋李昭玘撰昭玘字成季宋史云濟南人考昭玘籍本巨野蓋嘗署濟陰而史遂誤為濟南也元祐中擢進士第厯官提㸃永興京西京東刑獄坐元符黨奪官徽宗立召為右司員外郎遷太常少卿出知滄州崇寧初編入黨籍紹興初追復直徽猷閣史稱昭玘坐廢以後居間十五年自號樂靜先生寓意法書圖畫貯以十囊命曰燕逰十交侯䝉為昭玘校試所舉士及䝉執政感舊恩使人致意昭玘惟求祕閣法帖而已其孤介自守不汲汲仕進如是故其胸度夷曠發為文章皆光明俊偉無依阿淟涊之態亦無囂呼憤戾之氣又早為蘇軾所知耳濡目染具有典型北宋之末翹然為一作者當時與朝補之齊名固不虛也其集前後無序跋不知何人所編宋史藝文志文獻通考皆不著録葉盛菉竹堂書目有之而無卷數惟焦竑國史經籍志三十卷此本凡詩四卷徐州十事一卷記一卷傳序一卷雜文二卷書二卷表三卷啓狀七卷疏一卷青詞疏文一卷僧疏一卷進卷二卷試館職策一卷碑志行狀三卷與焦竑志合蓋即竑所見之本也乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a9cc02ff6297d81061ce8261caebc8337aa5edceccdffe0d9cbe4e70708efb4b
