body:
  text: 樂靜集卷二十四宋李昭玘撰濟州天寧請觀禪師開堂疏諸佛以因緣出世我法以方便為門發菩提心行本願力六度萬行如筏濟河十地三乘隨根得雨惟生實相無佛衆生合寶綱珠光光相入盡大地水滴滴同歸從無始已來為一念所染波生海濁塵落鏡迷顛倒色空流轉生死乃至大疑未判小智自私趼足山溪腐脣貝葉萬里尋天竺國窮年轉法華經未離妄想情塵不見本來面目有右佛子為人道師不由心外千開直指言下一路金箆刮膜更無隔地懸天黃葉止啼祗在拈捶舉拂方今聖神紹述海宇熙平共傾臣子之一心願祝君王之萬壽遍關梵剎大暢宗風兼收善利之功永作無疆之福恭惟觀公和尚惠林麟鳳覺路梯航携隻履以遊方警紫雲而駐錫顧惟敝里久仰髙風薝蔔花開欣逢此日醍醐味美未副夙心伏望憐惻有情敷揚妙㫖登師子坐作海潮音華亭手中篙臨濟坐上喝衝風卷浪送巨艦於長川强弩發機斃群鹿以一箭然後雲收霧散同觀自在之天虎嘯龍吟競唱太平之曲聖君賢相長轉法輪百辟庶民供依福地毋懷謙默幸副懇祈天寧請化老住持疏逹磨傳心特來震旦曹溪得法終返南州各有因緣共成契㑹化公和尚辨才無礙行業素髙駿馬一鞭萬緣俱斷寶花才出四衆同傾揚睂大振於宗風隨器盡霑於法雨間遊京輦暫寄叢林黃檗清凉須垂巨䕃牛頭氣象為指真棲永懷佛祖之恩不忘父母之國某久沉迷網夙乏利根幸枌社之相依愧潮音之禾接老之至耳敢逃抱足之譏聞斯行諸猶希刮膜之賜天寧請首座贊直傳法開堂疏伏以雲出岫以時行終歸無住火傳薪而迭照本自相生天寧和尚系出黃龍化流上國錘爐不倦夏臘寖髙坐却天下舌頭養得窟中獅子將忘言於宴坐每寄相於中林授此信依囑吾嫡嗣大川得濟舟楫方閒利劍不呈煙塵俱息首座大師求心無墮見道不疑胸前猛得一椎豁開宿障肋下連遭三築唤出菩提既從這箇了知當與大家受用比者寶憧圍繞香象奔騰共看出世機緣必有驚人語句莫但揭眉展手戲弄學人便應刮膜開光通流祖意儻許尋蹤見鹿寧辭立雪齊腰多生曾是作緣此日定求得佛大空法界從初不限東西無量度門何處獨無能秀願垂悲濟永脫迷流普集妙因上崇聖算同前伏以空性不遷法緣無盡求佛得佛故葉葉相承以心傳心故燈燈迭照不住常住是無非無窺索根原必自思維外入流通消息終由語句中來雖諸聖有情如人父母而一言不契非我子孫天寧和尚臨濟别支黃龍髙足自曹溪而下薝蔔同林留滄海以西麒麟一角疚心捶拂注想雲泉須要猛脫閒名未可輕論法器千人衮衮罕逢入闕將軍四句惺惺獨有當春獠子首坐大師久親巾錫夙悟機緣曽經虎口捋鬚奪得钁頭在手不待三敵入室便能一㸃成金直透重關更無遺照比者密傳空印親奉法衣掛皎月於髙臺鑑洪鍾於廣坐師子出窟百獸吞聲馬駒踏人千里無跡十年趺坐不將拄杖它遊一日花開真見老婆心切自昔張弓捉箭見敵橫行從今劈浪鑽風看師自渡伏望以自利利物以先覺覺人開無礙門唱第一義庶使隨根得潤見指知迷上去階梯既許承當大事後來津濟莫教辜負宗門願憑佛子之因共作聖人之祝金輪永御髙視泰平法界無邊一歸清淨樂靜集卷二十四
