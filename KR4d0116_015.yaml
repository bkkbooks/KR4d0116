body:
  text: 樂靜集卷十五宋李昭玘撰賀河中府經略游龍圖此者伏審肅拜恩綸榮遷帥閫經畫歸乎素業注倚出於上知成命甫行縉紳相慶恭惟某官學通聖奧識照事微抱忠義以有為喜功名之自致暫將使指䪺實兵儲坐馳智算於幄中生致羌首於闕下功髙百戰聲屈四夷初進躡於書林旋入登於卿寺遊心魏闕暫勤三節之趨厭直承明遽起一麾之請惟秦亭之奧壤為邊邑之具瞻特賴名臣作鎮方面亷頗尚壯必寬西顧之憂靈武可平佇報東門之役行膺詔握入贊帝猷某方幸依仁繼聞昜地尚期展晤少罄叙陳與虢州孫學士此者濫被宸恩誤叨憲領量材非稱負寵若驚幸緣聯事之榮遂獲見賢之願恭惟某官天姿俊拔國器宏深早擢峞科寖揚膴仕行義足以範模多士文章足以粉澤太平步履􅘵州俊聲莫競翺翔蘭省賢望益髙方虞侍於親闈屢懇求於藩服大邦作屏暫資善政之才四輔維人允屬元功之後徑趨召節入覲凝旒某晚接英遊並登策府奉一介之使將觀大國之風銜杯酒之歡良幸故人之遇方圗奏記先屈飛緘感服之私誦陳莫究上開封府蔣待制言念少學屬文嘗起執鞭之慕晚從試吏濫陪入幕之逰稍親閒燕之談良若喧囂之役遽緣補外遂失依仁鷦鷯一枝暫託蹤於美䕃鴻鵠千里徒絶睇於青雲仰惟剸决之餘休有吉祥之助恭以某官識周萬理學造大原以王佐而自期非聖言而不道躡聖科而特起軼後躅以先馳彈擊百僚皂鵰橫漢澄清屬部皎鏡懸秋優服使華增嚴帥領泉流六路半居天下之利源膽落諸羌獨出幄中之勝算重以儒林舊德延閣清班未親日月之光屢從軍旅之政暫輟藩方之節制用釐天府之浩繁初落筆以無留不閲旬而稱治大黠結舌情窮片言群偷屏心首戴一尹方久虛於近弼已密簡於上知意在東朝顧未伸其素業天將大任宜永庇於斯民某竦服誨言悵拘官守地遙望履心劇戀軒浩蕩江湖何待飛鳬之集低徊燕雀終懷賀厦之歸敢乞勉為邦家精調寢餗下情無任傾頌激切之至賀新潭州張學士竦聞譽命光奉恩綸解印陜郊作藩楚服伏深慶慰恭惟某官學通今古識際天人遇事敢為直躬無愧風生藝閣皆名理之談鶚立霜臺有忠義之色恥遂容身之計勇為去國之行列郡澄清蕭然虛圄九年饒富浩若流泉俯臨大國之封遽報朞年之政益隆宸眷更守名邦浮艗清湘聊適江湖之興懷鉛紫禁行追翰墨之遊某猥以塵蹤竊攀英躅石渠舊事嘆從宦之飄流銅虎優恩期望風以髣佛方謀命駕先辱飛縢竚申伏謁之勤少慰叙陳之願賀新郢州韓待制伏審解延州之屬郡領楚甸之名邦地介江湖之交物多魚稻之美國小而昜足民淳而不偷蓋將優飬其賢能然後逺觀其德業見匠石之斫固深識於道微聽陽春之歌亦自諧於心賞恭惟某官以學修性藏器在身久更獻納之勞暫資屏翰之寄存心虛靜與物去來昜地之恩漸磐兹始賜環之召指日可期某限守官常阻趨賓席仰祈保育别對寵靈下情無任傾依之至上事謝監司服鄉校之官已非其任據先生之席尤濫於名蓋師不可以少知器必先於自治茍為無本何所取材竊祿太優反躬知懼伏念某性資凡暗學識迂踈素乏兼人之能誤當聞道之責聖賢可仰何容握管以窺天豪秀滿前良愧奔蜂之化蠋而況俯仰一室沈酣六經無簿書紛迫之勞有朋友講習之樂退惟僥冒宜自激昻敢不考上下責實之時循終始修已之效講道勸義庶無曠于厥官論世讀書將必行其所志與交代先狀右某言念傳洛中之價久已服膺傾麈尾之談未遑引袂比緣補吏偶被誤恩輒當鄉校之官將承賢者之緒幸隨願喜獲與愧并恭惟某官國器粹溫天材超拔應休期而筮仕拔上等以飛榮論議髙深下荀揚而不道文章古雅揖游夏以相馳方君子之育才俾諸儒之駕說橫經師席流化藩州洋乎盈耳之絃滿矣及門之履英豪輩出道德風移隱几絳帷已格泮宫之化懷鉛紫禁行追金馬之遊某猥以淺聞獲依成範奔蜂之祝化藿蠋以何能黃狗之皮補狐裘而終纍行須體踐尚免曠尤瞻晤有期歡躍無已謝趙判監伏䝉判監朝請以某近舉再任特貺長踐者賢不肖天下所共知進與退君子之髙致所難掩者甚公之論毋茍失者可仕之時自古當然於豫何有猥䝉歸惠俱益懷慙恭惟某官立心有常好道不倦淡泊榮味怡安仕途嘗矻矻以窮年恥沾沾而自喜放虛舟於不繫斂倦翼以知還殆至絶交中散不堪於世纍未能力疾士安無損於天和寢食俱忘乎典籍之間筆硯幾滿乎門牆之下以傳為癖將老未休為𤣥解嘲雖窮奚病妙得鍾王之骨直登李杜之壇錦囊不空棐几增重室中乏王老之氣味席上盡陳𤣥之子孫但存青氊獨無愧耳能著幾履其好如何驁然與世以無營雅以絶塵而自許每容比德輒慕薦賢寧取不度德之譏庶逃䝉顯戮之罪敢來國士之報姑致衆人之言自以短綆無汲引之功一吷勞吹噓之助巫者祝人以千嵗固盡誠心楚人售璧以萬金更求真賞移京東東路提刑謝豐侍郎此者叨䝉中㫖就昜東畿猥緣聮事之榮竊有趨風之幸恭惟某官儒林重器禁掖名臣文章追三代之醇議論極六經之奧是非之智則確乎不拔進退之義則綽然有餘大德不爭知江海之善下晚節益厲見松柏之後凋暫輟從班出司留籥興王重地式賴於老成論道宗工必咨於逺業某素䝉知遇方獲庇依滄州到任謝韓丞相城髙池深壯矣萬夫之守地大物廣富哉千里之封惟偉人可以折衝非惠術不能媺俗先朝偹禦雅資武略之長纍世承平優假使華之舊如某者斗筲小器章句腐儒自知斷斷以無他不善沾沾而自喜涉世每謀於揭厲謀身素拙於從違安以乘流自信河中之木疲於抱甕豈知井上之機才屢試而無聞志已衰而不警猥叨進拔稍獵等夷澤虞從大夫之招已乖去就小人乘君子之器自取顛危濶踈初出於智昏繆誤殆曲於魄奪何獨有言之悔幾成不敬之誅屬大事之告終法雖可貸論有司之失職罪復何辭方且刻骨退思屏蹤待竄魯趙為禮莫知薄酒者為誰臧榖亡羊何但讀書之無罪遽從寬典猶領名藩借朽木以可凋收弊帷於已棄此蓋伏遇某官股肱王體柱石廟堂裴度之才上所自用武公之後人無不宜大器以天下為公至誠得仁者之樂無一夫之失所雖小善以不遺曲全孤生尤被厚賜雖江海之量無待細流之歸而燕雀之軀寧忘大厦之託誓殫夙夜少補毫分悔不可追顧何功於犬馬老當益壯庶有淂於桑榆樂靜集卷十五
