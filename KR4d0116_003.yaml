body:
  text: 樂静集巻三宋李昭玘撰觀江都王畫馬落落名王唐帝孫筆端飛洒只逡巡風雲絶足知何在粉墨餘姿若有神可信權竒盡龍種不應腲脮失天真驊騮寂寞龍眠死更復何人接後塵暮冬書懐贈次膺四首一氣推遷星復回人生常苦嵗華催凍雲欲雪鴈聲過臘酒正香梅信来晝夢每因啼鳥喚柴門獨為故人開自憐衰晚無多事心地都成一寸灰不住寒岩不姓龎亦無短艇釣清江門庭晝寂人欹枕几案春生日上窻五鼎甘心争逐獸萬夫落膽看尋橦何如種取東臯秫爛醉床頭酒百缸多病猶憑藥可醫若為換却鏡中絲人生得意一搔癢世事循環千奕棊幸有歸来陶令計何須惆悵杜秋詩慇懃田父勞相語天命吾今不復疑慙愧儒冠誤此身塗窮何假問通津門前羅雀正吾事牆角負暄非世人自喜小槽長有酒獨驚華髮不便春知君澤畔成新築擬荷鋤犁去卜隣出郭閒歩城市不在眼始知天宇寛田園休嵗事風物似江干茅屋上斜照水煙生晚寒徑須追野老笑語暫盤桓冦彦時自歴下歸携古鐵刀白石壓尺見贈因以二詩答之素質並琳瑯磨礲若截肪動揺風莫慮㸃汚墨須防色帶泉流潤聲含磬韻長願登青玉案時助寫雲章右白石壓尺戰地乆埋沒洪爐為再燒曽因土花缺不逐血䰟銷擬借庖丁手寜懸筆吏腰柔鉛勿多忌一割定相饒右古鐵刀次韻庭玉弟暮春作小雨㢘纎春欲歸桃花吹盡鷰来遲閉門却有宜人處簾幕隂隂睡起時戯贈閻漢臣廟令香火餘金月十千指呼巫覡示威權如何報得君王賜瀝酒慇懃祝萬年又戯贈漢臣蕭散官資近十千不須親舊祝無權虎頭食肉非虚語可待誰人報有年睡起病夫無酒破春愁掃榻焚香作睡謀夢覺不知身是蝶午鷄聲裏思悠悠病中聞雨官居寥落禁門東秋滿長安一夜風老病不眠成展轉五更鐘鼓雨聲中弔劉孝嗣富貴從来一羽輕胷中萬巻復何營囊錢盡處布衾短謗焰息時墳草生一日得行須有命百年不死是髙名瑶琴掛壁凝塵滿無復當年流水聲經睢陽有感昔日經由一夢同髙樓雖在舊㳺空東流不改當年水白首已成今日翁梁苑衣冠共黄壤隋堤楊栁㡬春風扁舟莫負南来興咫尺吴松落眼中南㳺道中玉鱠金虀昔未嘗㡬迴飛夢到滄浪鄉闗望處歸期晚風水聲中去路長梅使南来問行驛鴈聲北度下斜陽囊錢未盡江湖近擬買漁舟學漫郎舟行阻雨暮雨来何急乘時助發生水邊千樹暗篷底一燈明半夜起鄊思空陂聞鴈聲春風故留客不為阻歸程道中書懐三首竹樹出平岸人家藏逺煙片㠶雲度水雙槳鴈隨船緑變春囘地寒生雨後天前塗盡佳境得意且留連漸入臨淮路移舟每問津行行風逆水䖏處雨隨人啼鳥如留客幽花忽見春白魚不論價沽酒莫辭頻平野青蕪合長橋緑樹低客愁須白酒春意屬黄鸝落日鄉闗逺孤村煙水迷清明能㡬日却過浙江西過盱眙宿慈氏寺行役經旬不自聊强將登覽寄春醪淮吞汴水長増急城睍南峯不讓髙賈客正来喧萬井夕陽初下艤千艘明朝更作留連訃醉卧西窻聽夜濤宿慈氏遥碧齋有感齋榜无咎書髙僧邀我暫淹留細話朱轓此屢逰不見清談飛麈尾空流悲淚拂銀鈎淮山勝絶千年在人物才華一夢休欲作招䰟弔餘恨晚煙疎雨不勝愁天長道中細草眠黄犢短籬穿緑楊舂聲鵓鴣急田徑蝍蛆長地暖足春物雨頻宜水鄉羇懷不可話倒橐酒須嘗乆雨苦雨經旬乆溟濛勢未収細聲来短盖横㸃透重裘澗曲水流急峯深雲氣浮此行吾自喜所念老農憂南峯閒歩足健㑹真賞眼明逃世紛風煙入詩畫杖屨逐僧雲水濶天疑盡峯寒日昜曛羇人正愁思城角不堪聞登龍㳺寺飛構起崔嵬江晴宿霧開風幡兩州見花供四天来日月依峯轉魚龍觸石囘蓬壺在何䖏更擬上層臺過虹縣有作老態倦羇旅不堪行舸催風髙鳥横度汀轉樹交囘雨過霧猶濕春寒花未開楚傖如見問不為米南来過淮東風吹雨過淮濱草木精神一畨新鴈起沙隄煙隔水寺藏松崦塔招人盪胷長憶江湖月眯眼曽嫌京洛塵誰道南来少知識向人修竹特相親登平山堂斷檻欹簷風雨頻不逢心賞為重新依稀叠嶂宛如畫憔悴垂楊今復春一闋髙歌長在耳後来佳客復何人悠然未盡雲煙思不見揚州十里塵泊揚州城外地占東南㑹舟浮百貨通惺忪喜淮粲啁哳困吴農借此韻春喚鴈俱北水將人更東吾廬杳何在天末暮霞紅贈盱眙令王邦直樽酒留連淮水邉一燈相對共茫然退閒得計我華髮撫字有聲君壮年幸有髙情種松竹可無餘思落淮川南金不用充行贐古錦囊中乞數篇還家有作還家春已晚風雨誤歸期飲啖嬉兒笑形容吠犬疑江山猶似夢巾箧謾多詩未負東園醉桃花正此時樂静集巻三
