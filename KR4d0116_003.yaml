  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0116_WYG_003-1a, image: WYG1122/WYG1122-0262a.png}
body:
  text: 樂靜集卷三宋李昭玘撰觀江都王畫馬落落名王唐帝孫筆端飛灑只逡巡風雲絶足知何在粉墨餘姿若有神可信權竒盡龍種不應腲脮失天真驊騮寂寞龍眠死更復何人接後塵暮冬書懷贈次膺四首一氣推遷星復回人生常苦嵗華催凍雲欲雪鴈聲過臘酒正香梅信來晝夢每因啼鳥喚柴門獨為故人開自憐衰晚無多事心地都成一寸灰不住寒岩不姓龎亦無短艇釣清江門庭晝寂人欹枕几案春生日上窗五鼎甘心爭逐獸萬夫落膽看尋橦何如種取東臯秫爛醉床頭酒百缸多病猶憑藥可醫若為換却鏡中絲人生得意一搔癢世事循環千奕棊幸有歸來陶令計何須惆悵杜秋詩殷勤田父勞相語天命吾今不復疑慙愧儒冠誤此身塗窮何假問通津門前羅雀正吾事牆角負暄非世人自喜小槽長有酒獨驚華髮不便春知君澤畔成新築擬荷鋤犁去卜鄰出郭閒步城市不在眼始知天宇寬田園休嵗事風物似江干茅屋上斜照水煙生晚寒徑須追野老笑語暫盤桓冦彥時自歷下歸携古鐵刀白石壓尺見贈因以二詩答之素質並琳琅磨礲若截肪動搖風莫慮㸃汚墨須防色帶泉流潤聲含磬韻長願登青玉案時助寫雲章右白石壓尺戰地久埋沒洪爐為再燒曽因土花缺不逐血魂銷擬借庖丁手寧懸筆吏腰柔鉛勿多忌一割定相饒右古鐵刀次韻庭玉弟暮春作小雨廉纎春欲歸桃花吹盡燕來遲閉門却有宜人處簾幕隂隂睡起時戲贈閻漢臣廟令香火餘金月十千指呼巫覡示威權如何報得君王賜瀝酒殷勤祝萬年又戲贈漢臣蕭散官資近十千不須親舊祝無權虎頭食肉非虛語可待誰人報有年睡起病夫無酒破春愁掃榻焚香作睡謀夢覺不知身是蝶午雞聲裏思悠悠病中聞雨官居寥落禁門東秋滿長安一夜風老病不眠成展轉五更鐘鼓雨聲中弔劉孝嗣富貴從來一羽輕胸中萬卷復何營囊錢盡處布衾短謗焰息時墳草生一日得行須有命百年不死是髙名瑶琴掛壁凝塵滿無復當年流水聲經睢陽有感昔日經由一夢同髙樓雖在舊遊空東流不改當年水白首已成今日翁梁苑衣冠共黃壤隋堤楊栁幾春風扁舟莫負南來興咫尺吳松落眼中南遊道中玉鱠金虀昔未嘗幾回飛夢到滄浪鄉關望處歸期晚風水聲中去路長梅使南來問行驛鴈聲北度下斜陽囊錢未盡江湖近擬買漁舟學漫郎舟行阻雨暮雨來何急乘時助發生水邊千樹暗篷底一燈明半夜起鄊思空陂聞鴈聲春風故留客不為阻歸程道中書懷三首竹樹出平岸人家藏逺煙片帆雲度水雙槳鴈隨船緑變春回地寒生雨後天前塗盡佳境得意且留連漸入臨淮路移舟每問津行行風逆水處處雨隨人啼鳥如留客幽花忽見春白魚不論價沽酒莫辭頻平野青蕪合長橋緑樹低客愁須白酒春意屬黃鸝落日鄉關逺孤村煙水迷清明能幾日却過浙江西過盱眙宿慈氏寺行役經旬不自聊强將登覽寄春醪淮吞汴水長增急城睍南峯不讓髙賈客正來喧萬井夕陽初下艤千艘明朝更作留連訃醉卧西窗聽夜濤宿慈氏遙碧齊有感齊榜無咎書髙僧邀我暫淹留細話朱轓此屢逰不見清談飛麈尾空流悲淚拂銀鈎淮山勝絶千年在人物才華一夢休欲作招魂弔餘恨晚煙疏雨不勝愁天長道中細草眠黃犢短籬穿緑楊舂聲鵓鴣急田徑蝍蛆長地暖足春物雨頻宜水鄉羇懷不可話倒橐酒須嘗久雨苦雨經旬久溟濛勢未收細聲來短蓋橫㸃透重裘澗曲水流急峯深雲氣浮此行吾自喜所念老農憂南峯閒步足健㑹真賞眼明逃世紛風煙入詩畫杖屨逐僧雲水濶天疑盡峯寒日昜曛羇人正愁思城角不堪聞登龍遊寺飛構起崔嵬江晴宿霧開風幡兩州見花供四天來日月依峯轉魚龍觸石回蓬壺在何處更擬上層臺過虹縣有作老態倦羇旅不堪行舸催風髙鳥橫度汀轉樹交回雨過霧猶濕春寒花未開楚傖如見問不為米南來過淮東風吹雨過淮濱草木精神一畨新鴈起沙隄煙隔水寺藏松崦塔招人蕩胸長憶江湖月眯眼曽嫌京洛塵誰道南來少知識向人修竹特相親登平山堂斷檻欹簷風雨頻不逢心賞為重新依稀叠嶂宛如畫憔悴垂楊今復春一闋髙歌長在耳後來佳客復何人悠然未盡雲煙思不見揚州十里塵泊揚州城外地占東南㑹舟浮百貨通惺忪喜淮粲啁哳困吳農借此韻春喚鴈俱北水將人更東吾廬杳何在天末暮霞紅贈盱眙令王邦直樽酒留連淮水邉一燈相對共茫然退閒得計我華髮撫字有聲君壯年幸有髙情種松竹可無餘思落淮川南金不用充行贐古錦囊中乞數篇還家有作還家春已晚風雨誤歸期飲啖嬉兒笑形容吠犬疑江山猶似夢巾篋謾多詩未負東園醉桃花正此時樂靜集卷三
