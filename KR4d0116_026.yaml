body:
  text: 樂靜集卷二十六宋李昭玘撰重外嘗觀漢唐任刺史或輒親見問退而考其所行以質其言或録其姓名得才否狀以擬廢置或增秩賜金以勞其成或臨軒受服以光其遣故漢之吏事號為稱職唐之任人所傳十五蓋重郡縣之官慎臨人之責自古皆然不特為今日之所急也愚竊論之天下之事有名變而實存者後世習於名而遂略其實此名實所以並廢而事功不立也今之守令視古猶諸侯也非不有境土也獨不得斂其賦爾若勸課之責則在焉非不有城邑也獨不得專其地爾若守禦之責則在焉非不有官府也獨不得置其屬爾若察治之責則在焉非不有學校也獨不得命其士爾若教養之責則在焉非不有軍旅也獨不得專其政爾若簡習之責則在焉或以謂古之諸侯與天子同體而尊故其任重今之諸侯與朝廷異勢而卑故其任輕然不知地土封爵名數儀物雖今日之所輕而重榖阜民養材教士無以異於昔日之所重承今之責者務核簿書促期會以文法吏自處其於詔令之意教化之實玩以為不急嵗時上計茍於文具而已必欲宣德流行移風昜俗一陶天下之和固亦難矣故勸課不修則耕稼不時田野荒汙水旱無具老壯流徙守禦不修則群小嘯聚屠牛發冡焚燒區落白晝殺人察治不修則吏行貪汚交貨賣法公義不肅私幸爭出教養不修則學舍蕪沒圗籍塵委人材遍野士論淺俗簡習不修則卒伍墮氣器械鈍弊春秋角抵坐作如戲凡此者吏不知其責故也國家頻年以來除徭役興農利聮什伍講學校練軍士其法􅊀成其令數下郡縣之吏猶不能盡心率職以稱上意蓋其修飾形迹附託名𢾗茍可以奉朝廷之法其實無至誠惻怛以行朝廷之意此特失於亷按未精而督責太輕爾若三代之時諸侯之見天子也春以受其圗秋以比其事夏以陳其謨冬以協其慮時以發其禁衆以施其政天子之撫諸侯也諭言語協辭命諭書名聼音聲同度量成牢禮同器數修法則有撢人以道其政事有掌交以道其德意故能均政刑合禮樂一道德同風俗以天下為一家以中國為一人者察治詳故也今夫州為之守邑為之令星列棊布散於四方萬里之逺道不足以一揆法不足以一守無禮以致之無政以合之凡朝廷之政事法度雖時下其詔丁寧告戒而奉承之吏習為茍簡大事則行文檄記條目小事則挂屋壁束髙閣至於獄訟農穀貨幣征租力役之常嵗為一書以上於朝其人之賢不肖其治之得失其事之利害以謂盡在於此是亦踈矣朝延常患其弊而設監司矣委之以亷按付之以督責修職者薦於上不才者罷而去此代天子知人者也然而監司未必皆賢也庇姦則以寬縱為度喜事則以苛細為功惰怯則操鎮靜之説強忍則徼刻薄之利挾氣者輕於沮下幸名者急於趨上取未必中也或出於親戚故舊之先去未必當也或出於怨嫌忿怒之表其情狀之相攻自治且不暇又況治人哉朝廷所望於人者乃止於如此則監司未必為得人也夫郡縣之治視監司指顧為近監司之治望朝廷耳目為逺天下之事嘗勞於總核難於察治者蓋在此也唐制監察御史掌巡按州縣其一察官人善惡其二察户口流散帳籍隱沒其三察農桑不勤倉庫減耗其四察妖猾盜賊不事生業其五察德行孝悌武材異等藏器晦迹以待時者其六察黠吏豪宗兼并縱暴寃抑不申者方今莫若時詔御史分出而臨遣之使郡縣核於監司監司核於御史御史致其狀於宰相則天下郡縣之治可指掌而議可僂指而分庶幾古循吏之風復見於今日矣屬民昔先王和同四方連絡萬里使家與家相愛人與人相親保之而不忘合之而不散者有道以維之有政以屬之有法以制之而已以民情為昜辭也故以九兩繫焉牧以地得之則食之者不去長以貴得之則事之者不忘師以賢得之儒以道得之則樂其教者安宗以族得之主以利得之則親其上者服友以任得之則善有以相成藪以富得之則利有以相養以民心為昜危也故又以本俗六安焉媺宫室所以同其生族墳墓所以同其死聮兄弟所以同其恩聮師儒所以同其義同衣服所以同其禮故能上下統一逺近和合父與父言義子與子言孝長與長言友幼與幼言弟恩足以合情而相愛文足以飾貌而相接此維之有道者也先王既有以繫其民又有以安其俗猶以為不足恃也故五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓至於守望相助出入相友嫁娶相媒有無相貸疾病相恤祭祀同福死喪同哀男子不足於耕也相從而助耕婦人不足於績也相從而助績一鄉之事皆通也無求而不得一鄉之情皆同也無為而不知此屬之有政也先王以謂有政以屬於前無法以制於後未足以防民也故徙於國中及郊則從而授之徙於他則以旌節行之無授無節則以圜土納之竄伏者無所匿欺偽者無所容無事而出鄉則鄉必問無事而出關則關必譏民不擾於流寓吏不勞於呼索由此而登於司民則可以知其數由此而比於鄉大夫則可以均其力由此而斂於司稼則可以制其食由此而會於小司徒則可以用其衆此制之有法也維之既有道屬之既有政制之既有法不幸旱乾水溢民食不足轉流四方則非道之所能維非政之所能屬非法之所能制雖天屬俯仰之間不足以自存又焉有守邑地居室家而不去者哉故為之鄉里之委積以恤艱厄為之縣都之委積以待凶荒又為之荒政十二以聚萬民不必斂其利而利可散不必盡其征而征可薄力則弛其勞刑則緩其責舍禁以赦小害去已以釋小過眚禮而使勿充殺哀而使勿致樂則蕃而不用昏則多而不􅊀索鬼神以致福除盜賊以去害雖凶年飢嵗民猶安居重家佚居飽食故自少壯以至於老耄老耄以至於死亡食其田飲其井十里之外不知道塗百里之外不傳風俗此先王之保民也可謂至矣自夫仁政不行井地不均民昜其業官失其守內不能制其情外不能知其數此宣王料民於太原仲山甫所以非之也逮夫戰國交侵土地時昜封疆不足以限其遷徙城邑不足以遏其流亡管仲以區區瀕海之齊制國為二十五鄉郊之內自軌以至帥郊之外自邑以至屬以相糾聮以相保合少相居長相遊居處相樂行作相知以守則固以戰則服故桓公九合諸侯而號為強國者善保民故也自熙寧之初嘗詔天下行保伍之令此有意於三代之遺法也行之數年法雖具存而民未安土義不足以相守則時有桴鼓之警恩不足以相保則或起父子之訟壯力分於出贅世業入於兼并户口隱於圗版夫家脫於聮伍輕鄉危家逺出千里故秦多晉寇而魯雜齊語祭祀不從丘壠老死不知子孫罰不及於其友其犯法也輕其背本也衆雖欲均地著之政立土斷之法未昜制也昔三代之時里無間民民無遊業居則皆勸功樂事之人出則為仗節死難之士以守則國富以戰則兵強今天下壯有力之民僑寓雜處散於四方手不服耒耜之勤心不知田畝之樂為淫巧竒技屠販遊博其無理之甚者嘯聚不逞殺人于貨邑里不告訐門關不訶問縣官鄉吏察治無術計户而不得其家計家而不得其人居無與守出無與戰此為國計者未嘗不深惜之也昔者既詔天下置義倉矣義倉設則雖年穀不豐民可仰食貧不至於昜業飢不至於輕家然後禁遊手抑末作去舊里者必告入新鄉者無容如此則民無流散之苦吏無逋逃之憂三代之法可漸致而力行矣取士璆琳琅玕皆美質也雕之琢之至於成器而後可施楩楠豫章皆良幹也長之養之至於成材而後可用人受天地之中以生性無不善也充其性以至於成人然後可以治人未能成人也雖公綽之不欲冉求之藝聖人猶不取者禮樂不足故也先生能使人必至於成人固有術焉謹學校以教之而已先王之學皆所以明人倫也能明人倫然後可以盡人道盡人道然後可以治人事故入使長之出使治之道還以同民之善而已方其教之也或三嵗賓興或終身不齒雖庶人之子孫積問學正身行屬於禮義則歸之卿士大夫雖卿士大夫之子孫不能積問學正身行屬於禮義則歸之庶人此所以責人之必成候人之必至也自離經辨志至於敬業樂群自敬業樂群至於博習親師自博習親師至於論學取友自論學取友至於知類通逹強立而不反謂之大成未能通逹則知不足以應物未能強立則仁不足以守身先王責人必至於如此之詳者蓋人之行已也自非四十而不惑則是非之理去就之義猶不保其往也升於鄉則升於司徒升於司徒則升於學升於學則升於司馬由秀而選由選而俊由俊而造由造而進不躐等不陵節論定然後官任官然後爵位定然後祿先王之取人必至於如此之久者蓋聽其言觀其行非一日之察也故士知學之可樂不知學之可已知仕之可欲不知仕之可求進取退捨以俟天命人人安於為學而樂於循理之義考之則有成德任之則有成效三代所以成王業者此道素行也自漢武帝開設學校增置博士廣弟子貟射策決科勸以官祿學者寖盛異端日滋六經之説人自獻於其君而操以為禽犢性命之理喪於破道之言聖賢之迹滅於浮名之行利祿使然也陛下嘗詔師儒開廣學校修正經義發古人精微之藴祛百年陳腐之説道德之義性命之理著見簡策使天下學者一其所嚮會其歸宿足以見天地之純古人之大體不溺於支離蹇淺之弊而又慎選其官開析餘義使疑斯明窒斯通虛而往實而歸其於教人可謂至矣陛下聰明淵懿出於德性問學智慮發於天縱萬機之暇周覽墳籍如稽之以驗物又操之以決事天人之道帝王之業固已自得於成心矣間諭大臣專意學校慨然思得豪傑之士與之都俞經畫以躋時於三代之隆凡試言博士上書公車者躬自考核或擢之以髙第或官之以不次其於好士可謂篤矣然而承學之士經學未甚明德行未甚厚志意不修風義不肅未足以應陛下寤寐虛已之求以其好學之志不能勝其祿利之心故也夫軒冕在前韋褐在後雖子夏不能忘交戰之患利動其心故也子張學干祿孔子告之以言寡尤行寡悔祿在其中矣使漆雕開仕曰吾斯之未能信孔子説蓋有志於學無志於仕然後可以盡心於聖人之道而成士君子之器今之學者弊在利祿之欲速其為道也茍於日月至焉而已矣故經術未甚明德行未甚厚志意不修風義不肅良以此也夫聖人之言非如天之髙逺非如鬼神之不測凡所以明天道治人事者不外吾所性而已故秦焚六經殺學士聖人之言鬱而復明者性之在人不可滅故也今之經術皆出於師儒致一之論剗革俗學發明至賾蓋天為陛下生其人人為陛下駕其説此士之去聖人千載之逺生於今而幸見者也然而有論然後能議有議然後能辨見近而不及逺聞一而不知二適人之適而不自適其適得人之得而不自得其得是由思索不精爾昔有梓人為鐻者其技甚賤然猶三日而不敢懷慶賞爵祿五日而不敢懷非譽巧拙者致其精也乃若萬物之理萬理之變可以坐觀可以意得必曰思之而已思之所入與神為一非神之使然也精之至也茍能如此利祿不足動也陛下欲取士得人莫若待其教養之久抑其進取之速使人盡心致志深造而自得然後敷奏以言明試以功庶幾作人與古無愧矣政録天下之治涉於道者無患乎至略涉於事者無患乎至詳蓋道之所以官天地府萬物役使群動運之以精神感之以會通聖人端冕南面恭巳而已事所以應時而造推物而行號而讀之則有名指而議之則有數自其名而舉之則小大先後不可昜也自其數而積之則一二三四不可亂也然而日之來者無窮往者益逺事之方至者常謹幾成者常忽此所以茍完於耳目之前寖微於嵗月之久以至曠敗缺漏紛紜倒忤而不可考者常以此也而況政教禁令綱紀法度有屢進而後成有一成而不變或先昜而後難或初因而終革不有圗籍日陳於前操以為驗稽以為決則朝廷上下失於茍簡官人百吏習於惰偷上方信人臣有為之功而矜攬緒餘下亦操人主不自任之説以彌縫罅漏故雖虛心以望成功拱手以迎太平是亦踈矣周之治官也小宰嵗終令羣吏正嵗會月終正月要旬終正日成司會掌凡在書契版圖者之二以逆羣吏之治而聽其會計以參互考日成月要考月成嵗會考嵗成以周知四國之治以詔王及冡宰廢置冡宰嵗終則令百官府各正其治受其會聽其政事詔王廢置三嵗大計羣吏而誅賞之不獨官府之治如此也春朝諸侯以受天下之圗籍而行之官以利害為一書禮俗政事教治刑禁逆順為一書凶荒厄貧為一書其康樂和親安平為一書以反命於王以周知天下之故夫內以弊羣吏之治外以周知天下之故舉無遺事事無遺慮其職守之勤怠功利之登下用度之多寡經畫之利害百日之所積者一日而槩舉之百人之所共成者一人而坐見之任事之臣不敢為偷得之利以幸耳目之所不及天下之治常為之不厭通而不倦考核詳故也後世不知其法以謂帝王之道必無為而用天下無為不逹者無不為之説政教禁令綱紀法度一切曰有司存事常至於偏弊而不救者無術以舉之也故大事幸天子之不問小事幸大臣之不知漢文帝問丞相決獄錢榖𢾗而對之以廷尉內史宣帝時郡國上計簿具文而三公不以為意上下如此則何以督察天下而與之仰成哉今陛下必以朝廷官府已行之法度緝為政録有凡有目有要有會而時自閲核如裘提領屈五指而頓之不勝其舉矣使官人百吏宿道向方勸功樂職夙夜不惰可謂治術詳矣臣聞五霸不及其臣故委之以能託之以國三王臣主俱賢故合謀相輔五帝其臣不及故親自處事於法宫之中今陛下訓迪厥官總核名實此聖功成就之時也惟陛下加意而已樂靜集卷二十六
