body:
  text: 樂静集巻八宋李昭玘撰潞州戒焚死榜今月日通判軍州事李某謹出榜告潞州軍民百姓某聞人者仁也不昜兄弟父子之恩葬者藏也宜有棺槨衣衾之制此皆性所自出禮不可違孝子由是盡心聖人奚以強世故虆梩掩親者必有道矣土不侵膚則獨無恔乎茍為無傷是不知本惟夷狄之異類猶草木之無知平居殆絶於恩親一死即同於腐臭遽加焚灼不待覆藏顧惟中國之民乆被先王之澤詎從非義反害大倫夫死必有歸塟之以禮身體髮膚昔之所愛居處笑語尚或可求而乃藉以束薪付之一炬雖悲哀未盡而殘忍已深裹灰燼以故繒封罌缸為吉宅棄捐無日曠乆何追有慙掩骼之恩㡬類析骸之酷凡人䖏已則幸其安逸待物則終以愛存棟宇以避風雨之憂犬馬猶加帷盖之賜患不思爾豈其逺歟至若蜂蠆螫手變色踰時蚊蚋􅀈膚廢寢通夕因心原理觸類反情何其冥漠之間畧無痛毒之怨載懐及此良為惻然况爾名邦號為美俗去唐堯之千載猶有遺風介劉氏之數州不從僭命物大地廣閭里相安土厚水深耕稼自養惟兹大事獨愧良心豈生民有此不仁亦貧者無以為禮當州具陳其弊獲請於朝出公帑之羨錢昜近郊之善地置之守塜繚以周垣儻未能為七寸之棺姑可以寄一丘之土嵗時展省獲奉掃除䰟魄慰安不為祟癘重申告令明示通衢行之非艱勉焉無忽祭枯骸文年月日謹遣某人致祭於無主亡人之靈嗚呼人死曰歸歸於窀穸棺槨衣衾以棲沉魄爾今何辜暴露殘骼馬牛踐馳逰稚鞭擊穢䝉泥沙痛梗榛棘嚴霜烈日誰爾覆匿人或過之掩鼻屏息嗚呼爾非髙封大塜環以楸栢口珠腰玉卜嵗千億盗斯奪之斲伐窮力解襦推頤支首離析者邪爾非挽甲負戈横身赴敵主將促戰力殫氣迮折肱斷顱痛冒刀㦸妻子不収為烏鳶食者邪爾非獨馬弊車輕鄉逺客嵗月頽暮闗河斷隔失志昜感沉憂生疾漂零路隅裹以篝簀者邪爾非衰門敗家子弟孤阨故阡不歸逺寄别域狐穿鼠嚙土腐水激莫知誰何但餘瓦甓者邪爾非荒年阻飢凍憊空瘠昜子析骸朝不支夕嗷嗷道塗連藉交踣不施藁薪填委坑谷者邪爾非宿姦老兇喜為剽賊白晝殺人毒於貨殖危生殘家禍抵梟磔投屍溝中犬彘跑捽者邪今夫荒叢蔓草廢墟古陌晦雨淫淫悲風索索顧歩躑躅呻吟啾唧使爾不得歸邪天門九闗虎豹嚇嚇磨牙揺毒啄人肌骨幽都九重旁立土伯三目虎首噬人如腊使爾不敢告邪假時凶災偷起厲疫寒熱更作燒灼澌淅憑跡附聲驅巫走覡濁酒腐䏑日幸咀咋使爾不得已邪嗚呼古之葬者既穿既塞土或親膚猶為嗟惻胡寧忍斯散弃中澤藏之壙阡温以絮帛魂兮来歸於此安宅祭晁次膺文嗚呼連城之珍一世埋沒既發其光墮地而折千丈之松半死復生大風横来無復樑楹成毀在數所難者才有人如此宜哭之哀嗚呼次膺偉卓疎明洙泗而西千人之英擢第熙寜文辭驚人頭角嶄嶄莫敢與羣㳺刄百里事無少留􅑆卻俱解孰為全牛側目青雲軒軒欲舉初無猜心乃觸豺虎解印投檄幅巾自娱良醖佳客日不可無不愠不戚薫然以和人或憫嗟惟以笑歌辨說古今亹亹飛屑捆載而歸傾倒不竭誠心與人洞見膺腹窅然曠空如百間屋老驥伏櫪雄心未平寒鷄失旦猶思一鳴嘘吹抆湔晚有元老振衣彈冠翻然西笑一顧増價髙視上都不待給札乘化已殂昜簀方終命書来下哭聲滿堂賀客回駕奔命之初促裝晨發荷夫褰裳嘶馬漂沫素車東来徒御行泣雙輪不膏旒旐如濕哀樂相尋曽不踰月感忽之間星流電滅投分兹乆情均弟兄一日不見鄙心已萌清風皎月每與我期髙山流水誰復我知華館晝掩啼猿曉驚時見墮葉不聞履聲死生往来聚沫遺蛻造物者誰以我為戯魂兮歸来勿起遐想八荒愁人跳踉焉往瞿曇老人有國無碍子甞注心胡不遄邁魚山嵳峨天衣来盖清流在旁下貫淮海宛宛其中亦既築室此焉歸骨百世之吉大事將舉已告日時歆我肴醴一慟長辭祭晁无咎文人初有生豈獨無死死而可哀孰不涕泗維公人豪標度翹偉妙峯千尋玉海無底九流百家逺探旁貫白羽一揮傾倒河漢騁辭流離躪轢韓栁人皆仰之維北有斗名卿鉅人未識為媿牛童馬走喜道姓字海岱千里翩翩孤鶱中路摧委垂翅十年大恩生成復請試吏窮陬小壘直為貧計昜官淮泗往綏疲民坐席猶冷訃音遽聞故園来還三徑掃跡猿悲鶴怨松蘭改色念昔握手笑語道隅今拜堂上憑棺以呼驪珠沉海曽嘆遺墨茂陵殘編尚寄他日我有㫖酒魂兮能来㵼此一觴莫知我哀樂静集巻八
