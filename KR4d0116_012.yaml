body:
  text: 樂靜集卷十二宋李昭玘撰賀太皇太后生辰表候屬西成屆金方之正氣時生上聖配天德之鴻休聲文所臨舞蹈同底中謝恭惟太皇太后陛下母儀恭肅坤德靜柔弼成永圗休有顯烈三光明而四時節九功叙而百度熙恢基業於無垠躋民物於交泰文武之興周道華胥之贊軒圗迪是芳風敻超治古臣守職藩佐叨榮聖時觴獻萬年莫預造庭之列心肩一節徒傾就日之誠宜益介於延洪庶克符於頌祝賀皇帝即位表臣某言伏奉三月五日詔書恭承皇帝陛下䖍奉寶圖踐登宸極震雷一發聲赫四方大寶繼升光被萬國生靈鼓舞動植昭蘇凡在撫臨無不欣戴中謝臣聞盛德之後世有天下有道之國篤生聖人恭惟陛下席六帝之洪休對三靈之丕眷仁孝純乎天至聰明茂於日躋岐嶷之間已能動娛先帝號令之始足以慰恱衆心社稷有所憑依神祇以之安樂皇天右序復開命武之符率土祇歡行見紹堯之化臣限拘符守阻造闕廷無任舞抃蹈踴之至賀太皇太后表伏承太皇太后誕膺寶冊同攬乾綱號越常尊禮隆無上孝慈交感遐邇祇歡中謝恭惟太皇太后陛下柔順在躬聰明齊聖輔佐英帝肅隂教於六宫保鞠先朝端母儀於萬國載加盛典允答徽音挾日以升均照臨於南面與天同久擁康樂於西朝臣限守藩符不獲趨詣闕廷無任瞻天望聖舞抃激切之至進奉賀皇帝登寶位上絹表大人繼明神祗協相四方來賀玉帛交馳仰罄歡心畢輸邦物臣猥叨符守阻觀帝閽敢陳在篚之儀少助充庭之實謝告諭表伏䝉聖慈特降勑書告諭臣即時集官吏軍員將校僧道百姓等宣讀訖睿智纂圗深恤艱難之託邇遐聽命載銜撫育之恩中謝恭惟皇帝陛下純孝在躬至仁感物奉時昭考將圗天下之安咨爾庶邦使知王者之志臣猥叨符守誕布德音坐食見堯盡識宅宗之念謳歌歸啓共迎極治之期臣無任瞻天望聖感戴激切之至賀冊皇太后表伏承皇太后允膺寶冊增奉鴻名大孝隆親事光墳史萬邦䝉福喜極人神中謝恭惟皇太后陛下育粹坤元服勤隂教輔佐先帝志在靜柔保鞠聖躬德惟均一式彰懿範推講盛儀祇答懿慈盡明王之要道誕敷徽命鼓百姓之歡心臣限守藩符不獲躬詣闕廷無任抃蹈激切之至賀冊皇太妃表伏承皇太妃誕膺徽冊增奉隆名凡在邇遐孰不抃蹈中謝恭惟皇太妃陛下慶傳貴緒瑞發靈源率嬪御以靜柔奉蘋蘩而蠲潔屬真人之纘紹推盛典以褒崇歡動宫闈事光史冊臣限拘藩守阻造闕廷無任抃蹈激切之至進貢綾表禹分九州均節諸侯之貢周建太府校登天下之財入之必以其時制則各從所有方帝仁之愛養滋物産於盛多追講舊經畢修常獻臣猥叨符守獲奉嵗輸敢陳在篚之儀以助充庭之實賀興龍節表四序周而在朔方成一嵗之㓛二陽進以為臨允叶大君之吉篤生真主奄有庶邦紹六帝之休光歡兩宮之孝養車書所暨舞蹈攸均中謝恭惟皇帝陛下聰明日躋智勇天錫應千齡而出震操大器以乘乾虎嘯龍翔共覩聖人之作風行雷動坐躋萬國之寧衆賢濟濟以在朝至化新新而美俗三靈助順六氣薦和人情胥恱於謳歌天祜沓來於福祿將窮冬律俯屬誕期載瞻虹渚之祥竊效封人之祝恭默思道允懷上帝之心安樂延年永邁南山之夀慰皇帝表今月日神宗皇帝小祥者渭水衣冠想神明之如在石門霜露驚日月之難留中謝恭惟大行帝澤被生民道躋曠古收成功於六閏垂鴻業於萬年欲窮海上之山遽厭人間之世言未忘於在耳嵗已換於終星皇帝陛下孝極事亡念深率考盡憂勤而纘禹感冥漠以見堯維練服之將更結聖衷而永戀昊天罔極春露既濡雖哀不可忘顧奄經於時變而禮當有節庶下慰於人情臣限守藩符不獲躬詣闕廷無任激切屏營之至慰太皇太后表日月變遷人神感惻中謝愛深母道慘結聖衷覬少順於天時庶下安於人欲闕賀玉璽表大明當寧百辟造朝翼赭案以前登發金箱而跪進靈光煥耀虹氣屬天妙刻蜿蜒龍文照日作乾安之樂奉天子之觴誕布宥恩敬謝宗廟慶流海宇歡動人神實曠古所未聞宜四方之來賀中謝竊以明德在御嘉應並臻蓋天將有示於人故地亦不愛其寶至神變化非意所知和氣薰蒸為時而出惟珍符之肇見錫景命以來崇眷懷本自於帝心追琢疑非其世造學者之辨無以稽諸史玉人之巧莫能喻其工不必論前世之所遺要非偶聖人而不受恭惟皇帝陛下仁孝率考嚴恭事天朝廷治而庶官修隂陽和而五穀熟百神協相四表乂安宜保無疆之休以稱甚盛之德靈芝朱草非難致之物神鼎丹甑不足效其祥非假祕文孰昭休貺昔堯享封人之祝漢聞嵩嶽之呼曽未若躬承受命之符永為守國之器聖作明述方啓佑於千齡史書樂歌將有辭於萬世賀元符改元表准勑自紹聖五年六月朔已後改為元符元年神休沓至昭示聖時嵗號更新欽承天意布宣萬國鼓舞羣情中謝恭惟皇帝陛下一德感通三靈眷佑諸福之應緣類而來明照下土則神光燭天澤潤生民則甘露如雨欲付以享邦之慶又申之受命之符皆前世所罕聞不踰時而來上載諸簡冊播之聲詩猶未足著無窮之傳復何以表非常之貺大將詔世宜重紀元太史編年無愧祖宗之美明堂頒厯永同天地之期樂靜集卷十二
