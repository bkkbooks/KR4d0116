body:
  text: 樂靜集巻二十三宋李昭玘撰祈水退青詞天每私於愛物人無告則呼天比者雨潦既瀦川流暴溢鸛鳴于垤未瞻杲日之光城復于隍幾有襄陵之患命且危於晨暮力已困於捍防敢竭真宫仰祈元聖惟冀享其精意矜此下民詔風伯以驅雲遣波神而洩水復變桑麻之野不為魚鼈之隣永頼生成敢忘歸報靈惠疏我佛開方便門施智惠力哀衆生如窮子假大願為慈航比者暴潦淹旬川流漲野駭孤城而若塊憂庶類於其魚惟是熈寜之間將罹昏墊之患威神一扣瀦潦四空再瀝丹衷上千靈鑒惟願散白毫於頂上盡逐頑隂吞巨浸於毛端坐成沃野永頼搃持之賜益堅囘嚮之心諸廟文惟神功禦大災嵗有常祀聰明所信肸蠁必通比者雨潦既瀦川流暴溢民將瀕死神亦何依頋為力之已窮雖殺身而無補呼天莫捄沉玉如遺敢竭丹衷仰祈昭鑒哀此無辜之扼貸其不腆之誅力囘昏墊之憂誓殫牲醴之報河伯文自昔山川之神皆為民社之主今則河流暴溢城堞屢危薪芻之計已窮魚鼈之憂將至頋天威之可畏哀民命之無辜吏當謹誅神亦無赦敢冀力回湍怒少獲捍修歛收大壑之間傾洩尾閭之上溝塍一出比族再安不忘歸報之功永頼全存之賜僧道道塲惟徐大府為國東藩征賦倍於他州生齒踰乎数萬嚮者冬春之末赤地如焚今而秋夏之交衆流皆溢馬牛不辨老㓜若號寄孤壘於浩茫幸餘生於朝暮禍雖天降神莫余哀坤祗寂寞以無聞河伯彷徉而益肆盖聞九天元聖十地慈乘皆以度物為心施福無量敢伸齋祝上叩真靈伏願黙扶捍築之功力回湍怒之勢千里將顛之命咸荷再存一方受賜之民不忘欽報謝靈惠䟽佛果難量法門無碍天龍人鬼盡入摠持地水火風一歸變現託化身于千刼㧞苦道於衆生恭惟靈惠大師位證真乘功深願海自有唐開元之際夙種妙縁由先帝熈寕已來屢開靈感一方受賜萬目同瞻比者雨潦因仍河流漲溢蛙鳴薪竈十日不炊槎擁戍樓四郊如海已危生于朝菌將塟骨于湖魚屢瀝丹衷果通𤣥鑒威神所應影響不違幹巨浸以東傾破重隂于一指天青日白鸛鶴爭飛野濶雲平牛羊可数凡在含生之類共䝉再造之恩是用祗率屬僚肅陳凈供誓禪真信上報深慈惟願遍福徳於未來廣津梁于不倦使四時調序百糓滋豐少完瘡瘠之餘永頼生成之賜靈惠塔祈晴䟽佛以度物為心食乃生民之命比者時陽不固暑雨既淫大貽南畆之憂將失西成之望仰伸誠祝上叩法慈惟願放白毫光如一念頃破頑隂於四極瑩麗日於九霄永賴庇存益堅囘向靈惠塔祈雨䟽稼事方興時澤不足既任承流之責宜先闔境之憂敢露精衷上干慈聖伏願法雲遍覆神力揔持遽興三日之霖少蘓千里之旱仰惟惠照俯狥哀祈謝雨䟽廣願不違至神能速梵磬鏘而震雷作凈香散而蒸雲興一夕霑濡千里膏沃輒伸精懇上報法慈誓堅囘嚮之心永頼函蒙之福天慶觀祈雪青詞竊以上帝降觀善於救物下民靡告危則呼天比者時雪既愆菽麥將槁吏雖不徳人亦何辜敢瀝丹衷上祈真聖願施一尺之澤俯紆千里之憂益罄齋䖍少酬蒙覆靈惠塔䟽伏以佛果妙圎法力平等雖無求而不獲須有感而後通敢竭精衷上干慈照比者冬隂不固時雪既愆幾成焦旱之災且憂癘疫之變伏願不違本誓力度有情俯為三日之期遍蒙一尺之瑞永堅囘嚮益勵齋嚴祈雪禳火青詞髙天在上故無棄人至誠如神可與事帝比者時方卒歳陽反代隂水不堅凝木多燥槁牟麥已播未霑為瑞之滋綆缶相望每有救焚之恐敢伸醮設共罄懇祈庶有感而必通將轉禍以為福伏願三清覆佑列聖鑒觀膏澤應乎豐年熒惑循於常次揚熛不作無徙薪曲突之勞盈尺既優遂飽食逸居之樂共荷生成之賜不忘歸報之勤樂靜集巻二十三
