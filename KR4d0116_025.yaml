body:
  text: 樂靜集卷二十五宋李昭玘撰用相有用天下之道者乃可以知相有兼天下之才者乃可以為相今之相古人公是也三公之職上論天道下經人事非涖官行法者也故有其人則置無其人則闕有其人則非六卿所為也王以賓師禮之無其人則六卿各率其屬以佐王而三公之名無害為曠位若夫宰相則處三公之職而兼六卿之事者也故不可一日無其人此固知之者非難而為之者實難也天下安危之勢生民休戚之命始於纎微而成於不可禦藏於優遊無事而發於不測此制之者君也而相實維之一時之因革百世之利害謀夫爭於庭而不一庶人議於道而未諭此決之者君也而相實持之百官之賢否庶事之修緝衡是非於名實信賞罰於功罪此覆之者君也而相實察之內強中國外鎮四夷經營廟堂而震讋萬里此御之者君也而相實器之故智不足以用天下之變則屈於所不知勇不足以任天下之重則困於所不舉昔人有言曰宰相自有體而不親小事若此者小材之所效也宰相不可以親為至於小事敗弛以亂成法則亦未得為無責矣錢榖固非宰相之所治盜賊固非宰相之所問也各有司存至於國計之不知姦猾之不息此有司不治也則責將誰尸故天下之守在天子天子之責在宰相故曰知之為未昜而為之甚難者也古之人非灼見其臣不敢舉國而與謀非深知其君不敢委身而就責考其文迹之甚明而精意之可見者莫詳於書夫髙宗舉傅説於版築之間一旦加之公卿大夫之上疑若甚昜者然而至誠相感之際丁寧告戒固非中才庸主之所能為也説之告王曰后克聖臣不命其承則望其君者隆王之命説曰罔俾阿衡專美有商則望其臣者偹知之非難要其上以力行也克邁乃訓示其下以必聼也既俾之有為矣而曰罔不同心故沮議者弗能改既告之以典學矣而曰旁招俊乂故能言者無所容此傅説所以得行其志而髙宗所以能享中興之功者也以豪傑非常之士得聰明有為之君故相與以造事興業創法定規出於庸人辨事已息之餘乘於功利調習甫行之際使續之者非其人因之者隳其事帝王之績困於垂成而官人百吏亦幸而願息此知人者又不可不善於其後也桓公既相管仲欲繕甲兵伐諸侯管仲五諌而五不聼緣陵之封既行其言矣凡五言而五諾之故合諸侯王天下以成霸功者桓公之知人也方管仲之得其君也既以信而後諌量而後入未嘗輕用其事而國之大事固不敢輕屬於人凡此恐遺君憂而為百姓怨也桓公欲用鮑叔管仲以為不可而薦隰朋鮑叔非不才也蓋知其善於後者必隰朋也管仲一霸者之佐非天下器也其始則未嘗輕用其身其終則惟恐不善於後况其致君澤民安利萬世復有大於此者乎嘗觀明皇見姚崇於田獵之間咨以天下事而衮衮不倦崇知帝大度鋭於政事先以十事要之使堅開元之間卒見施設至於序次一聼其決擇由是進賢退不肖天下大治方崇以疾移告歸第雖政事必得其言而後定及乎薦宋璟自代帝益以不疑璟承崇之後務刑政官任職而守正過之蓋法之始行容有踈緩行之既久循名責實按事計㓛非少加之以威嚴則不足收斂凝就其勢不得不然也史稱崇能應變以成天下之務璟善守文以持天下之正由是觀之則知相之才既難善其後者亦未昜愚故終誦之知人知人者自信知於人者信人道可以治天下則與之謀天下道可以治一國則與之謀一國器大者不拘之以苛細器小者不責之以闊逺能者官其能藝者食其藝使辨士不得以辭勝才士不得以文亂勇士不得以氣激智士不得以機合貪士不得以利摩有德者居上無德者居下有功者進無功者退量材而授官按法而麗罪如師曠之不可欺以聲離婁之不可欺以色言之所舉竟以得之貌之所見情已察之姦良憸壬毁譽是非無以逃於我而陟降沮止廢置豫奪亦無不自乎我此知人自信者也內無主外無學好惡無别取捨無擇故人觀其倚而潛以應之倚於名髙則諛説之徒至倚於厚利則聚斂之徒至倚於法術則刻核之徒至倚於計數則譎變之徒至美言獻於前重祿餽於後使夫喜功昜進挾捭闔之謀試揣摩之術排擊於必爭之途譁噪於並趨之地前之既入後則却之昔之既獲今則攘之名器可以餌取威福可以意移此知於人而信人者也知人之君使人畏上之知而不敢為也故勢重而威專知於人之君使人唯恐不為以自侈故勢輕而威奪凡此兩者治亂之所繫而人君之所察者也孔子曰不知言無以知人然則知人之本未始不先乎知言也夫天下無事則欲言者息天下有事則不能言者出故以言擇人以人責事雖堯舜不能廢也言乎經大事興大利舉偏而補弊革舊而造新此必有趨變之功也言乎明憲度謹禁令犯義者黜犯刑者誅此必有制法之功也言乎節財用阜通貨賄使公私無不足之患者此必有富國之功也言乎修車馬偹器械選將厲士使敵人不敢加兵此必有強國之功也言乎稼穯有政農功有時竭人力盡地利此必有養人之功也言乎明道德逹禮樂人無賢不肖才無愚智學則成不學則棄此必有教人之功也然許人以可用則不可用者無以知億人以不能則能者無以見故因而任之使自事之因而與之使自舉之功當其事事當其言者賞功不當其事事不當其言者誅大臣不能為朋黨之助左右不能為先容之助士大夫不能為遊談之助賢不肖是非之迹循其後逐之而已窮矣故好誣者不能詭言言則不實之罪隨之好匿者不能隱言言則不忠之罪隨之好大者不能侈言言則惑衆之罪隨之好毁者不能譛言言則蔽賢之罪隨之度其誠可言則言誠不可言則止知其言之不可罔而名實之不可掩也昔者齊威王命大夫治即墨而毁言日至使人視即墨則田野闢人民給命大夫治阿而譽言日聞使人視阿則田野不闢人民貧苦故召即墨大夫封之萬家召阿大夫烹之堂下於是齊國震懼人人不敢飾非而務盡其誠雖然此知言者也持此以責人之功未足以盡人之才盡人之才惟聖能知之人之才於此於彼各有所能也不害其所能而用其所不能則所能者悅於見知而所不能者終不敢以非其才而自處唐太宗常謂髙士亷臨難不昜節而所乏者骨鯁唐儉出言可喜而未嘗一言及國家事楊師道自能無過而懦不更事長孫無忌應對機敏而攻戰非所善岑文本敦厚而謀長經逺劉洎堅正而其言有益馬周敏鋭禇遂良竭誠依人太宗知此數人之才而用之數人者亦莫不盡心以應上使夫聖不足以通人知不足以周物疇克之哉故知人者始於試人之言而終於盡人之才凡此者出於聖王獨見非下之所能為也省臺寺監昔先王自勤厥德夙夜不怠惟前代時若然後訓迪厥官而作周官立三公以論道分三孤以洪化公則燮理陰陽孤則寅亮天地皆所以成王道也道則一事則異故設六官各率其屬以象天地四時皆所以成王事也治則簡而嚴故冡宰為天教則詳而親故司徒為地禮和君親以體仁也故宗伯為春政正上下以合禮也故司馬為夏刑主制殺以象義也故司冦為秋事主應變以藏知也故司空為冬上則天地陰陽日時之變中則君臣父子之常下則山林川澤土壤之化繁至於宫室器械飲食衣服之節微至於蟲魚鳥獸草木之性莫不有官以治之外有職以辨之增一則有餘虧一則不足內外相屬小大相聫故能國體完具政無不大而阜成兆民者也自周之衰其制變於戰國而大壞於秦漢承秦之後獨用其故號其位無統其事無聫至唐始為省寺臺監以分處百官使令宿業事事無曠問其名則以職對下其令則以官議司有常守位有定員唐之治績號為甚盛者其致然也謂之省有曰尚書有曰門下有曰中書尚書典領百官庶事所會決者也其屬則六其聫則二十四其位則各以其序知百官之功過然後與之以勳級勳級未足以勸賢也又加之以封命此三者未始不先選天下之材而用之也故考課勳封之職則主之以吏部倉廪有所積然後為權衡度量之制既為權衡度量則量嵗計所出而支調之此三者皆出於户口田賦之所入也故錢榖土地人民之職則主之以户部先王之為禮未嘗不謹於賔主之際外則謹於賓主內則嚴於鬼神為之牢禮膳羞之數為之祠祭祀享之節三者皆禮之事也故賓客膳飲祠祭之職則主之以禮部戎器既有藏車馬既有偹必周知天下之籍鎮戍烽堠之逺近者皆兵之事也故武庫輿輦方域之聫則主之以兵部謹門關出入之籍以防姦督財物期會之責以防偽以此防人猶有犯上違令者則戮辱隨之此三者皆刑之所治也故門關鉤會禁隸之聫則主之以刑部津梁溝洫以時修苑囿山澤以時取屯營之事以時耕此三者皆工徒之所興作也故水利虞衡田作之聫則主之以工部門下之治掌出納帝命而相禮儀者也中書之治掌佐天子而執大政者也故侍從顧問規諭諷諌之左右分更焉故記動史書其起居法度執大政則道揆者也參議表章草創制命之職在焉故記言史書其詔誥德音儒學皆有選也圖籍皆有藏也議法制沿革者其事小故屬之門下求賢才隱滯者其事大故屬之中書此三省之制也監則其所守寺則法度之所出其事則同其主則異若禮樂飲膳宗室蕃夷之所掌圖籍天文學校服御之所司則又禮之别也宿衛工作僕御軍械則又兵之别也治水則工之别也此監寺之制也庶事既有别矣帝命既有掌矣大政既有議矣有守者付之監有法者付之寺朝廷之治略已具矣然而百官之所領萬事之所總必有責也故特置一職謂之宰相百官之罪惡朝會之儀典必有所紏也故特置一官謂之御史則內外各有所察也或不以一名其職唐之致其盛幾與古比隆者任官得其序而已國家設官分職一切用唐制或有職而非其官或有官而非其職或一職而治以數官或一官而兼以數職名分不正而已名分既不正則無能罔上之人盜名而自安喜功勇利之臣犯分而爭進今先正其名分而各以所能任職則賢不肖之實昜察而功罪之迹昜知又何患官不得其人人不能行法者哉治吏上君主靜臣主動君任逸臣任勞靜而逸則使人動而勞則使於人故動而不辭勞而不怨者義之制也舉天下之物無以昜我者莫大乎身舉天下之人無以先我者莫親乎家既以身事人則身不得而有既以家食人則家不得而懷可豫可奪可殺可活莫適而非君也又焉得擇事而後安哉孟子不往見諸侯孔子君命召不俟駕曾子居武城越冦至則去子思居衛齊冦至則未嘗逃以孟子則無官也曽子則師也若孔子之不俟駕子思之不去蓋事君之義不可不畏也先王之時大夫使於四方雖四牡之嘽嘽周道之倭遲動至於不敢懷歸憂至於不遑將母其心則非不悲其居則未嘗寧處不以不能忘私之恩勝不敢慢命之義故也非特使臣之如此也至於戍役之士亦然薇既老而不得食歲既暮而不得歸驅之以行道之勞迫之以雨雪之苦告之以靡使歸騁之私心繼之以我行不來之死志義使然也非特戍役之如此也雖婦人猶能勉其夫之勤勞告其夫以不可懷歸之義凡以致其義而已矣夫或生或死或安或危莫之為而為莫之致而致是數者皆天也若夫遇事不茍免臨難不昜節有質直而無流心此士之於君臣之際當自致而已茍為不知義而操富貴之勢憂事物之纍惴惴然惟恐其去已則凡可以避患者無不為也臣嘗觀東漢之時班超開通西域立功萬里五十國皆欵關納質馬援清隴西定嶠南跋窮域冒毒霧終死蠻徼二人者豈甘心絶域輕萬死一生之計哉忠義所激然也以光武之賢臣能自致如此而陛下聖德聰睿不自有已優禮公卿大夫輕施爵祿嚮之以樂與之心屈之以不倦之所將以責在位之臣行令而無壅赴功而不墯然而天下之大事社稷之長策古人未盡之遺利當世必行之良法皆出於上之經營注措之先而猶不能奉承趨走以應指顧至於轉徙以避事茍簡以違命懼逺適則以親辭厭繁使則以病告使人之如此孰有為上守節死義者哉何不旌拔一二忠義之臣與議政事放斥不職之吏錮而勿用以懲偷慢以勵風節使弟兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上捍難隱患之臣誠死城郭人君恭已正南面其於責成也何有治吏下先王之設官也與之亮天工治天職其人足以任官其官足以行法朝無幸位位無曠事然後可以比羣吏之治收庶績之熙而成王業方其任人也未嘗不勞於所求優其所使蓋士之明先王之道逹古今之變者得位則行不得位則立迎之以至恭則就不恭則去故有爵以貴其德有祿以富其功有冠冕佩服之尊有車服徒御之盛所以立於朝廷長於民上者遇之已至矣屈樛木之髙而引之無遺虛卷阿之中而受之無拒有諌則行有言則聼與之以美意樂之以至誠又已至矣為人臣者因其同寅協恭正直在位致其道以飬人修其身以行法內盡其心而不欺外竭其力而不懈不擇事辭難知無不為為無不至以服其下之所勞以報其上之所施不能如此而私義以害其公私智以非其上懷祿圖存背公死黨則先王復何以馭焉有刑以治之而已夫刑之所加常在於不善之小人今乃致於公卿大夫之際下則喪亷恥之節上則傷尊賢貴貴之義非所勸也先王之意以謂使之既有禮飬之既有仁在位獨不恤而違上慢命以亂成法所以設官分職復何望於治人哉此刑之不可廢也方其功之所取則晝日三接不嫌於無威罪之所去則肆諸市朝不疑於無恕堯之於舜雖迭為賓主而善善之樂惟恐其不優舜之於四凶雖放流竄殛而惡惡之刑惟恐其不著聖人之情無所茍也其於進賢退不肖之義各從其當而已矣周官太宰以官刑糾邦治大司冦以官刑上能糾職大司徒令於教官曰各供爾職修乃事以聼王命其有不正則國有常刑雖然其刑之也又豈一日而誅之而輕終身之善哉日不至則待之以月月不至則待之以嵗一歲之逺猶以為未也三歲大計然後誅之夫豫之則甚厚奪之則不速然猶頑不即工以干上之典此刑之所以無赦也先王之責人也既如此之詳而躬自厚者亦未嘗不謹也成湯不邇聲色不殖貨利檢身若不及然後制官刑以警於有位者躬自厚之道也主上取人以身修身以道凡謀之所可聼言之所可行陟之不遲舉之不次朝獻其言而暮試其能朝為布韋而暮為卿相用之不違其學與之不求其偹可謂厚於與人矣內則於穆其德外則勤勞其行敦信以一好惡明義以審是非可謂自厚矣官人百吏猶不能徯上之志行上之令告之以嘉猶示之以周行或乖爭以起事或偷慢以違命罔上而不忠趨利而無義在所察治而已傳曰臨事接民以義應變寬裕有容恭莊以先之政之始也然後中和察斷以治之政之隆也然後進退誅賞之政之終也一年而與之始三年而與之終今之謂歟樂靜集卷二十五
