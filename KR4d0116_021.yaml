body:
  text: 樂靜集卷二十一宋李昭玘撰賀門下司馬相公寵膺除詔進二納言多士彈冠欣見雲龍之㑹都人夾道競觀衮繡之歸惟嗣王勤欽止之思而賢者動翻然之意天惠有道時丁太平明良相歡上下䝉福恭惟某官生民先覺當世宗工富貴死生不動心如孟子仕止久速必治已以仲尼故特立於議論之間不惑於是非之際間當言責益勵風猷於義也剛奚恤衆人之怨不可則止匪懷好爵之縻飬疾家園遊心聖閾疏泉種竹自以為迂隱几讀書莫知其老潔身自信與世尤踈謝流俗之睢盱挹古人而嘯傲德無與映貫洛水以並清望不可攀壓嵩髙而獨峻雖雅從於燕處終未慰於岩瞻屬睿智之紹休念艱難而在御允升故老丕式壯猷暫糾治於東臺將燮調於大化夙有進思之志今為行可之時不負蒼生安暇東山之髙卧方思霖雨果符傅野之旁求人心同樂於春臺國體大安於磐石四方無競萬世有辭某猥以微蹤數䝉優眷限拘符守阻造鈞庭賀平章文太師光膺策命入拜師臣三公惟人大厦有棟梁之任一相處內四方如泰華之安天扶聖君人望元老歡樂精神之㑹流通上下之情禮無與隆時所罕遇恭惟某官孕靈嶽秀配德坤元器深厚而有容道直方而不撓武足以戡定亂略文足以潤色聖謨可托大事則社稷之臣不親細務則帝王之佐進人如巳愛物以情碩畫嘉謨撫寧於華夏隂功隱惠孚感於神明故能業亮四朝身兼五福出入將相幾四十年古今勳勞無一二輩屬真人之嗣服攬庶事以圖新謂國軍禁令有未决之疑左右輔弼皆後來之俊俾辭留鑰入造內朝集冠蓋於都門羅饔飱於候館衮衣已往難留洛水之舊邦皓首復來共識仁皇之真相龍光叠被衢路榮觀于今熙河之餉餽甚艱遼夏之疆隅未復不足者九年之食已傷者百姓之財將冗而卒驕吏繁而員溢永賴蓍龜之舊德克開社稷之逺圗俯陪調鼎之司獨踐位槐之地壽考之美躬邁德於汾陽禮樂之功更仰成於姬旦某素惟鄙昧久荷奬提台座熒煌悵披雲之在望駑蹤疲曳但服駕以長鳴賀左僕射相公拜命大庭分聮左揆天人相與君相並興千載一時永契太平之㑹四方萬里共䝉生氣之和竊以舜帝舉臯陶而竄不仁髙宗命傅說以求古訓因先王而為政為天下以得人竦佩遺風復見今日顧安危之所繫宜上下之稱歡恭惟某官名世真儒生民先覺禀三才之正氣思則無邪以四海而為心逹則兼善智大而必先於逺致行髙而不可以小知未嘗枉巳以直人豈憚屈身而伸道三諌不聽漠無干澤之私萬鍾何加惟有養恬之樂屬大明之紹服講庶政以圗新急聞至言優禮元老以公議而自處為衆人之不能匹夫未安深軫納溝之念至誠獨立靡懷濡足之憂故進賢退惡而多士歸心興利去害而庶民不議果膺睿渥參秉鈞衡飛鴻之遇順風已如夙志大旱而作霖雨咸賴我公益扶萬世之安永尚一人之慶某猥叨憐遇倍切歡愈限守州符阻造台屏到任謝右僕射守籥真祠幸退安於衰暮分符督府復誤玷於恩榮蒞事已還俯躬知懼伏念某器能淺鮮學術拘踈猥遭遇於昌朝粗激揚其懦氣一登言職五委使華第殫報國之忠且乏過人之譽方欲屏蹤於田野庶幾息駕於桑榆歌詠王明涵濡聖澤敢祈寬詔特假便藩謂朽木可雕未忍輕其棄置而老馬知道猶堪責以馳驅此蓋伏遇某官大業亮天元功播物歡樂精神之㑹陶成小大之材每憐寒拙之無它曲示含容而與進俾更善地以養餘年敢不益勵素修仰酬巨賜上體朝廷之意下安閭里之情十駕雖勞尚不忘於夙夜一毫有補庶無負於埏鎔謝大漕河山連絡古稱督府之雄民物浩攘今是名臣之寄揆材非稱冒寵若驚恭惟某官儒服先知相門英胄獨倚公忠而報國不投機㑹以幸功間調王師特分使領議論可畏共觀文正之餘風偹禦有經多出延安之故事雅推髙義益簡上知暫糾吏於西曹復理財於東部洗深文之苛急悉附寬條起疲俗以惠和坐成樂國猥惟朽質獲託巨庥敢不勉勵吏能奉行詔㫖追洙泗聖人之化盡革侵蟊師武宣循吏之風少移忠厚過此以往末知所裁賀南京知府主漕南州悵星霜之屢改得州東部幸雞犬之相聞仰惟坐鎮之餘益保天和之固恭惟某官三朝元老間世真儒蚤躋禁從之華屢更天下之故淡薄榮味恬安仕途雅為多士之表儀綽有古人之風度顧惟商丘大府甸服别都當舟車孔道之衡實名德偃藩之地暫資賢望未慰巖瞻道之將興方慶風雲之㑹人惟求舊必先柱石之材竚奉詔音入陪鈞輔某素慙孤賤曲被眷憐兩地河川宛隔登龍之步纍年胸臆莫親揮麈之談敢冀上為廟朝精調寢餗賀吳運使轉官右某伏審密奉清光茂膺嘉命一日三接已躋侍從之華六轡載馳特總漕輸之重起土人之歡慕聳吏部之榮觀恭惟都運待制與聖並生以道自任識當世之先務為衆人之不能屢奏顯勞再更劇地弊源漫溢豈十手所能支議者倣徨無一辭之可措照理於變通之㑹撥繁於談宴之餘僂指布籌已足三年之食銜艫擊轂暴登百萬之輸果被詔音入瞻宸坐天子促席而為之改色財臣斂手而敢爾言功遽升延閣之班尊委外臺之寄金絲寵薦競觀賜物之新彩旌啓行喜拜使華之舊即聞節召入踐鼎司詎容東俗之少留將使萬邦之均慶某素惟孤陋猥荷奬提蕞爾卑飛敢起青雲之望塊然頑礦將希良冶之功限守官針阻趨鈞屏下情無任欣抃激切之至賀右丞拜命中宸分聮右掖正人既進朝廷之勢益尊大道將興天下之民斯幸某官秉心亮直學古粹深常一志於險夷恥因人而進退不可則止懷蓍龜先見之明於義也剛挺松柏後凋之操屬大明之紹服攬群俊以在朝間自西州入升內相謂輔世必忠賢在上而順民惟政事為先總正臺綱共謀王體六官成績方注意於名儒萬世永圗將登庸於真相代石職方答交代濫趨末宦獲佐近州吏牒紛迷詎免曠官之黜塵蹤疲曳屢懷解綬之歸豈私幸之儻來承更書而俯罷未見君子實勞我心愧禮好之方修忽郵書而俯及矍然拜賜灑若對顔某官器度淵沉性姿踈敏仁恕為政有古吏師之風聞譽在躬為時士人之望尚資關决暫爵逺圖將聞濟水之民復起海沂之詠退慙淺薄輒預交承久雖學步而未識國能素不善歌而敢期和者履難加首顧賤質以奚堪瑜不匿瑕幸前非之將掩瞻風甚邇晤德猶賖伏祈善保興居茂迎寵祿代人上兩府問候言念仰泰階之焜耀目逺鈞庭奉使節以周旋身勞塵鞅稍昜寒溫之序未修咫尺之書每思犯分以陳情反畏黷尊而取戾雖江湖之量無待細流之歸而燕雀之軀寧忘大厦之託倣徨兹久畏惕益深與其自怠而不言未若以誠而歸罪恭惟某官蓍龜舊德柱石元勳契千載以有為躋四方於無競君子在位士皆樂用其才百姓既安民罔不同於善道行而政舉法具而官修百榖順成四夷內附在蕭曹近用不過慎以無為如房杜淺能何所施其素業粵惟盛際允屬元臣三代可追不獨稱於兩漢大章繼作方有賴於一䕫某樗櫟散材墳壚惡埴猥叨匠斫竊纍陶埏誓殫夙夜之勤不忘頂踵之報髙秋在序福履是宜尚祈寢餗之以時俯慰士民之所望代賀方回謝舉换文誤塵恩命特昜班資度德無堪撫心增懼雖去彼取此均曰服勞而舍短用長粗知從欲再循幸㑹尤切競凌昔者朝廷分建百僚文武均為一致逮乎選舉不一仕入寖分儒生擅文雅之風武夫夸疆場之任國家病人材之偏廢開吏道之通規或貿厥官亦從所志去東曹者素寡脫右部者實難初試其藝則十或取三今薦而用則百不得一如某者性資凡暗智識謭拘姑求得祿以養親安暇擇官而就列一邑之事誠有未知六藝之文乃所願學間關末路困折萬端殆將等於臺輿豈止供於呼召竊論先王之糟粕人以為狂進登君子之門牆已猶知愧栖栖俗狀役役半生謂秦無人敢辭清議與噲為伍頗屈素心已甘孤宦之飄零忽纍大臣之論薦遽超常格曲預優恩此蓋伏遇某官一德亮天大釣轉物攬多士而並用拾寸長而不遺致此微蹤俾更舊秩敢不仰圗報稱益勵踐修躍冶之金固已不羣於物棄溝之斷猶將有用其材代人謝安撫祗擇剛辰俯臨郡政分符流水嘗受賜於恩門補郡徐方復承流於使部依仁有素得地愈安涖事已還撫躬知懼某官忠勞許國德業在民蚤振武於掖垣暫偃藩於方面清列城而安堵竦百吏以趨風夫何謭能辱在威部敢不奉循教約修督事功誓殫夙夜之勤庶獲㳙埃之效代人謝副漕祗擇剛辰俯臨郡事河山連絡古稱督府之雄民物浩攘今是名臣之寄揆材非稱冒寵若驚某官國器粹溫天材超頴夙著强明之譽屢更任使之煩方密簡於上心暫出臨於東部清列城而安堵竦百吏以趨風夫何謭能辱在威部敢不奉循教約修督事功誓殫夙夜之勤庶獲㳙埃之效代人謝兩府待罪平陽幸免曠官之責承乏泗上復叨假守之榮材屢試而非長恩愈深而知懼伏念某器能淺薄學術迂踈遭㑹聖時依緣仕進一登朝籍已孤報國之勞五領方州久濫長人之寄猥䝉優貸仍許再留遽遷督府之名藩俯在陪京之近服河山環絡疆井浩繁宜有聞人以資良幹豈容朽質輒玷誤恩某官大業亮天元功播物歡樂精神之㑹作成大小之材過憫孤蹤與更善地敢不奉循詔令究悉事功十駕雖勞冀不忘於夙夜一毫有補庶無負於埏鎔樂靜集卷二十一
