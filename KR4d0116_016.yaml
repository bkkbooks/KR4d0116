body:
  text: 樂靜集卷十六宋李昭玘撰答王賢良與黃安中劉子先朱行中同作試官應詔造庭奏篇入等一時遴選多士榮觀竊以漢唐設科蓋以待非常之俊劉董論事亦足見有為之才國家纍聖相承得人甚盛半為當世之公相或出同門之父兄自非學洞天人識貫今古發憤吐悶不懼嬰鱗之危投溢扶哀深知鼓瑟之變則何以禮隆仄席望重縉紳抗足而脫塵埃矯首而登雲漢恭惟某官明燭萬里富兼九流不為章句之腐儒竊鄙簿書之俗吏以天下而自任為衆人之不能讜論激揚壓以萬鈞而彌壯多聞雱霈窘之一日以如流理物有藥石之良利民如布帛之暖通逹國體疑素宦於朝動寤上心恨相見之晚較然明白略已施行顧論説之有源將陶鎔之在手某素惟寡學猥預持衡觀水於瀾詎躬渤澥按圗求駿偶識驊騮惠然投我以夜光何有報君之玉案載懷謙抑益用閟藏得之若驚常欲置之懷袖永以為好猶將示諸子孫感戴之私誦言罔究上執政求外任時見任祕閣校理挾無知而遊世動則多違犯不韙以望人困而寡與蓋勢踈者情隔能薄者力微信未感於言前志欲行乎劵外徑庭直往猶如寸梗之撞鍾呫囁自營僅若飛蚊之過耳知難而退乃分之宜其或心以願違勢由私迮須臾之渴未能穿九仞之泉跬步所休何暇種十年之木謂不才而無取宜廢於人見有力者必鳴或關諸命伏念某蚤從鄉校入踐書林學未逹先生之言名不挂通人之論耗精神於蹇淺困年力之頺侵是非不謬於自知利害相摩於多故同堂笄冠嫁娶並舉者十人舊里田園黍稷不供者數嵗加以伯兄長謝先壠未歸纍然諸孤殆絶生意獨有少弟僻在海隅矻矻以窮年嘗耿耿而不寐嚴助懷故土之樂罷直承明陶潛求三徑之資願為彭澤而況手足寡急難之助閨門多凍餒之憂期一假於外官顧何辭於俗吏有政事之責可以赴功蒙祿廪之優足以收族恭惟某官大猷經世一德亮天利萬物以無私恥一夫之失所退惟頑陋夙被埏鎔冒嵗月以淹回乏毛米之稱報因人並奏既同南郭之吹竽以病得賙獨幸支離之受粟言斯甚迫理或可矜竊以亷者之無求樂聞君子之虛受顧屠門之割大嚼何為寄鷦鷯之棲一枝良足回謝馬狀元奏藝明庭策名上第喧前騶於廣路觀者肩摩落餘藁於四方傳之紙貴望髙時俊光動儒林乃太平養士之功亦諸生稽古之報某人天姿俊徹學術粹深璧水升堂七年並席金鸞唱籍一鳴驚人蓋志大者氣全故實修而名望落落髙騫於日下錚錚獨黯於彀中御史直聲固遺風之自許平津相業不數嵗而可期某夙仰英遊阻聞緒論方欲效李雍之識面慕盧同之卜交奉詔殿廬幸觀落筆曳裾公府復枉過門惠然投我以夜光何有報君之玉案通衢在望絶足方遒陽春白雪之音一時寡和金馬玉堂之步指日可期某猥預盛時喜聞榮捷雖仰洛中之價未盡麈尾之談賀吳正言右某伏審光膺宸綍更踐諫垣聞命之初望風而躍竊以蕙蘭擢秀久幽而不改其芳鳳凰來翔一出則大驚於世而況君子獨安其處衆人皆謂之賢揚於明庭宜在髙位乃生靈之盛福實上下之相歡嘗聞士必貴於有為志先行其所學一失是非之辨終迷聲利之場言欲出而畏憂氣益卑而沮喪發憤吐悶彼獨何人持祿養交寖成習俗惟大人之特立秉常德而不移於義也剛不可則止衆人紛警懷蓍龜先見之明末路淹回挺松柏後凋之操屬明王之嗣服毖萬事以圗新敷求多聞丕式元老方虛心於占訓俄仄席於讜言毅然容貌之堂堂是謂王臣之蹇蹇風節可畏足以厭難於未形議論敢前足以致君於無過此實德名之選大為邦國之光施膏澤以下民稍安輿論贊大鈞而播物行俟我公某猥以微蹤夙叨優眷限拘官守阻造台庭賀吳鹽運轉官伏審祗承寵渥峻陟華資敘舜庭考績之優詔商典懋官之舊逖聞成命增激歡悰恭惟某官器宇靜深智猷通博遇事有不疑之決在公惟匪懈之憂百吏承風凛若神明之畏九年足食出於指顧之餘天子重稱其才朝廷無出其右果膺殊眷特拜茂恩竦簮紱之榮觀契明良之嘉會使軒留愛已夙慮於公歸廟鼎元勳將默符於帝賚即聞迅召入覲嚴宸某素託恩休阻趨威重賀李資深中丞光被渙恩峻升中憲外刺百官之失內繩庶事之違大臣畏法而修天子斂容以遇方朝廷責成之際乃事功考實之時必得剛明肅乂之士以正其紀綱庶幾上下逺近之情不欺於視聽果聞輿論僉屬我公傳命之初有識相慶某官髙標華國清德照人志包九萬之圗氣拔東南之秀始德稱於公相俄名暴於京師接武俊林飛緌禁掖髙牆可仰士尤喜於先登大筆如神上亦嗟其晚見忽厭承明之直暫分瀕海之封馬周方重於太宗賈誼復來於宣室爰禆衮闕遽掌綸言坦明追二帝之書深厚過兩京之制紫垣灑墨湧妙思於泉流白簡數姦勵孤風而鶚立禮法修而百度正議論一而庶心傾即正鈞衡大施德業不獨重風霜之任亦將隆柱石之功某夙荷眷存久稽參侍搶榆之迹徒仰於搏霄賀厦之心尚拘於鼓翼賀李邦直舍人寵膺帝制光贊綸言潤色聖人之辭道宣王者之志此多士文章之選為一時儒學之榮才之所難得者蓋寡翕聞嘉命歡動衆心某官思識靖深器能起拔文足以經天而緯地道足以致君而澤民望髙華嶽之五千氣吞雲夢之八九朅從魏國來對漢庭咳談坐斥於淵雲器業逺躋於朝董飛名京邑竊卑稷下之遊灑筆中堂共駭洛陽之少言不激於髙訐理獨盡於忠嘉深簡上心首登清選崢嶸金馬之譽咫尺玉堂之遊暫領憲於東州復懷鉛於左史重資才藻兼代訓辭人爭嘆於湧泉吏每虞於脫腕兩漢之制雖尚覩於遺風三代之文可復還於今日即聞大拜行奮逺圗某夙荷眷存久稽參侍下情無任傾依之至賀范龍圖移慶州光膺嘉命更鎮雄藩愛養利源適秉軺於東部統制方面遽握節於西州在君子之時升宜天下之同慶況居屬郡良切歡悰顧惟安化之河開實據昆夷之襟背茍知其策則矢石不試一失其御則疆場屢驚必資忠智之臣以副朝廷之眷某官家聲著代世德在民卓有髙明之才夙懷康濟之志輟從禁掖暫守帥垣人蒙奠枕之安國賴長城之固避子亭之坐可想遺風立棠棣之碑何慙往躅佇還閫寄入贊冢司某限守州符阻趨鈞屏下情無任傾頌激切之至賀胡學士加職知桂府竊以海中三峯地稱仙境嶠南五管天限炎荒一則提封屏翰之邦一則取象圗書之府惟時嘉命屬我名臣恭惟知府安撫龍圗問學淵微器能通博奉咨詢之煩使美譽處於先朝入綴星郎暫遊蘭省後來居上安暇競時獨秀必摧翻成遻物寧遇風而知退恥躍金以自言疾驅太行周覽二陜邊民待哺喜車馭之復來野老饋漿驚節麾之幾盡果膺優詔擢預清班能世其家清氊故在不難為弟棠棣相承顧東眷之方隆將陶鎔之在即折衝萬里雖賴得人雅意本朝未容去國行聞美拜實慰僉言某素以孱愚重叨奬遇為屬部之吏嘗􅊀下陳同舉酒之歡復陪廣座猥煩謙德先辱長緘得之若驚嘗欲置之懷袖永以為好將猶示諸子孫感荷之深誦言奚既上李邦直一違鈞坐再閲嵗華久攖俗吏之簿書幾廢小夫之竿牘盈尺之紙安能自寫其肺腸萬頃之波固亦不遺於汙潦憂皇所載展轉益危與其自棄而不言孰若以誠而歸罪某官生民先覺盛世元臣吐辭為經鄙荀揚之未粹以道致主非堯舜而不陳經綸以四海為心進退有古人之節前功未就毅然待旦而行庶政已成率爾乞身而去暫資舊德作鎮别都時驅大府之旌牙坐嘯昔遊之泉石腹心之託曽未間於須臾天日之光常不違於咫尺精神相感寤寐不忘宜一德之有求乘三陽而並進為天下計必資良佐之才以我公歸永作生民之福某素慙譾陋曲被陶成每殫十駕之勤愧乏一毫之補轍鮒得水雖切幸於餘波塞馬嘶風終不忘於故國限拘官守阻造賓庭樂靜集卷十六
