body:
  text: 樂靜集卷十宋李昭玘撰上睂陽先生月日謹齋潔裁書馳獻于睂陽先生閣下某記為童時先生父子兄弟一旦出岷峩四方士大夫稱誦其文曰有宋已來未嘗見此文也至採拾先生父子兄弟所著書人人為長編大軸手自操札較其所得多少以相輕重某是時嘗得其本於親家雖未能深達義趣讀之反覆不知所以不能廢後數年偶友人朝補之自新城侍親歸云辱在先生門下雖疾風苦雨晨起夜半有所請質必待見先生而後去先生亦與之優遊講析不記寢食必意盡而後止朝君氣豪邁辨博俊敏下筆輒數千言紆餘卓犖馳肆揫斂各盡其妙嘗曰此文蘇公謂某如此作此文某所作蘇公以為然者也又數年先生罷東武還朝朝君見先生於京師既歸昏夜扣門開軒置燭出先生新文十餘篇促席吟誦朝君健辭氣每道先生言語至險絶處口吃如不快意須臾風雨暴落窗撼燭滅倏忽之間疑有神物二人者獨把卷囁嚅恍然不知心形之俱忘也某與朝君少同學而齒差長自知議論智識逺不及而彼獨聞道於賢先生頳顔熱中憤悱交作不幸頻年已來憂患摧鑠身窮而志戚坐則面墻舉頭則礙屋慨然思逰四方趨走於賢士大夫之門少起其衰惰湫底之氣然而賤迹囚纍觸事乖閼猶區區收拾古人腐餘綴為文詞出應有司而輒玷一第得官於徐徐先生舊治也風迹未逺門生故吏多出庠序而半在官府每相過者論先生德義誦先生文章堂上琅琅終日不絶某獲代者舒堯文也堯文辱先生深知把酒揮墨登臨嘯歌無日不相尋言先生與人交略去圭角洞見肺腑恐其不親已人亦自忘其鄙吝而不知所以化一日登黃樓曰此蘇公燕集之地也酒後喜為文章盡篋中無留紙如方盤大斛㵼出珠貝照爛磊落鑠手奪目衆人排捽爭先取之惟恐其攫之不多也是時晚風落日逺山逶迤川流無波白鳥上下竊思昔年席上之樂徘徊俯仰欲去不能蓋中心眷焉者不獨在夫山水一時之覽也某與堯文仕宦同而堯文辱先生之逰最久物我未忘每自慚恨未幾王子中秀才以書見投出新文五篇愛其器質深重擺去俗習不類科舉文字乃知先生弟子由壻也某竊不自度扣以先生動止則曰蘇公在齊安掩關著書俯仰一室淡然自足如巖居隱士之行與世相遺少無謫官意嗚呼事不難無以知君子嵗寒然後知松柏之後凋古之聖賢安居無事修身誠心者必期至於此而後信今斯人也某何得預聞焉故某昔之所謂憤悱慚恨者皆不留於心而惟知感動慨歎夜不卧寐自謂終身所修何為而及此也某蹤迹之賤未嘗聞於執事之前而出處違忤不得一拜道德之貌所幸傳先生之詳者皆出於先生交從親舊之間而得之尤多然而問魯人以泰山其言如是而髙如是而大已載於目前矣至於雲煙蔽虧氣象明晦日麗雨潔春濃秋瘠變化無窮雖魯人有不能道者要須屏心注目躊躇終年而後能盡也天聰不逺人意相望朝廷一旦以詔起先生而位在公相不肖方謀為祿仕南北未定不知何時得造門下區區所懷輒爾陳敘窮冬苦寒惟乞為道自重不宣上蘇黃門月日具位某謹齋心服形裁書寄獻於筠州宣德先生閣下某成童時已聞先生文章道德光耀震發驚撼天下耳目于今二十年公卿大夫閭巷之士講服傳道者嘗竊聞之矣自以賢不肖尊賤勢不相及復至出處乖隔無緣趨伏門下譬猶景星一出髙者先見三尺之童行於稠人廣市之中欲引頸而望光彩未可得也守官東徐數月先生之壻王子中惠然肯顧不以不肖無可與語寓學舍幾一年數道先生議論風趣頗熟於耳前者稍獲銘誦日夜感躍如窮乏久飢之人乍食粱肉縱未得大嚼聊使染指搶鼻亦足自慰幸甚幸甚後於王子中處得先生筠州東軒記讀之其意欲歸伏田里追求顔氏之樂又於髙郵先生處得棲賢法堂記讀之以謂士茍一日聞道則死無餘事未幾黃州先生以書見復云舍弟子由學道三十年今粗始聞道考其言行信與昔有間矣某獲是三説敬拜避席斂容以思雖未能造先生之門上其堂而窺其室正猶牧羊之子方散亂失箠於多岐之間行大道者忽出手而一招之也嗚呼士之困於俗習昜已逐物頽靡不反失其本心而不知學道之可樂者久矣非髙明君子篤好而特立以振擢其昏􅉵欲死之質則聖人之門何賴焉此天下想望先生風采者非獨某一人也薄祿所縻未能脫然以去屈膝請教於下風而碩為灑掃之列不勝慙恨伏乞為道自重下慰士望不宣再拜上孫莘老月日具位某謹百拜獻書于留守先生几下某應舉時金陵荆公初在政府四方士大夫望風而來者户外滿屨堂上滿席得荆公一言則公卿為之改容得二言則天子置之髙位當時士大夫待荆公而進退不知幾何人也後荆公之罷政平日為之倒屣跣足者稍稍去而從他門毀短排陷訿訿百出雖市道不若也由此觀之前日之來徑為勢利爾今天下與語荆公道德同器識均趣舍之迹獨不負於終始之義特先生一人爾此天下有知之士歸先生宜如何矣某天與遭遇幸先生來守徐憫其可教不忍棄之汙賤樂與之進三沐而三薰之日夜感勵不知所使而心中區區有欲傾寫於左右拘以屬吏不能豁然自道者久矣某生質卑近所見多昧性復緩濶不急於事每聞時人議論謂貧賤可恥富貴可致如夢睡中聽人語天上事耳雖略省心獨不知其可到也見一二輩才入仕宦徑得美官柔聲怡色惟恐不當人意如觀木偶人戲伸睂俯首舉動不自持但竊笑其機索使然爾某家本儒素先人在仕三十年才有田數頃子弟閉關讀書未嘗苦生事先人棄養既終喪私故敦逼弟兄奔走四方汲汲于祿仕不肖守官於此獨無他責俯仰一室黃卷中日與聖賢對為吏之樂莫甚此職但人生多事薄宦去來正如逆旅爾恐未能盡如今日之優遊也自少強聒笑人親俗事喜就書史雖不能多記誦古人趣向粗覽大槩平生藝習書射音奕略無所好一讀古文輒終日不厭遇事感激聊復自賦雖組織非工要隨意遣適此二者縱使窮老愁餓決知其不能廢若夫形骸之外非志所願而力不足者久已忘之矣仲尼曰四十五十而無聞焉斯亦不足畏也已自惟齒壯子長去四十之年如數朝暮修身行已治性養心之效曽未及古人之一二而忽忽將老此寤寐憂懼深自痛恨者也不幸事先生才數月僅熟于聲貌而先生移鎮留府官責所拘不獲追隨杖几豈復天使之終愚乎伏承使旌戒道有日謹齋心服形三日不外視敬拜坐末願終餘教使今日之遭遇獨有異於碌碌者他日不辱門下之逰沒齒知幸不宣某再拜上孫莘老求先人埋銘具位某今月日謹齋潔裁書西鄉再拜獻于祕監學士先生閣下某嘗謂天下之情有欲於中者不能無求於外其求之也或樂而與之或拒而不應蓋求之則一而所求之者二也以利求人者戞於世俗之所必爭宜拒而不應也以義求人者合於君子之公好宜樂而與之也某今日之求正為義爾此所以內省而無疑直往而不懼特有望於左右爾先君在仕四十年信道守義端重靜肅不作茍見不治茍得不趨俗不干譽世之所謂貧富貴賤寵辱利害者未嘗攖拂其心進退去就之際漠如也故見利則知畏未衰而早休安其志而已挾此之志以逰乎世其為人深知之也固寡矣雖然在先君言之志不願知於人則可在人子之心不能明先君之志以貽子孫以聞後世則罪也使有勢位者明之耶則不敢纍其心使善辭説者明之邪則不敢誣其實必求諸有道嚴正君子而已恭惟祕監學士先生道足以信萬世行足以服天下取捨以公議論不妄後生學士潔已以矜仰王公大人悚心而畏屈非獨不肖所受教也今得先生一言以銘先人壙中使其志足以貽子孫聞後世不泯泯於寂寥茫昧之中則人子之情沒齒不忘伏祈先生優恤之幸甚幸甚自惟不肖嚴事先生視之以父也先生所以教育不肖視之以子也事人以父者必如其父而不欺教人以子者必如其子而不外此區區之心尤恃其必獲也俯伏聽命下情無任倣徨激切之至不備上顔朝奉某啓前日嘗辱賜手書曲示存恤屬私事未定尋失裁報獲罪多矣先人棄養十年門緒衰墮兄弟仕宦粗知所立手足相助日望起家先兄最孝睦行已端肅有古人法度不獨兄弟所愛敬鄊人尤樂親之年方四十三官至一尉平生所志未及開發一二遽爾摧謝天罰何大酷邪二子雖已勝衣可以奉後而田園廬舍久廢不治某中春須暫謀歸計使孤嫠稍安然後復還顧未得罷去為恨伏聞子由先生過彼數年之别一日會遇相與解斥世故講其學道之妙此賢者所樂也不肖安得與之志氣所同必見於酬唱使一咀餘味猶不陷溺於小人乃所願也中年多難觸事氣喪兩鬢蕭然輒已半白自悔少時務學鮮淺不求深趣區區所聞正在膚革今日思之大是謬悠爾此所以急聞救藥也見諭子由先生云管子中有佛書精要處此亦無可怪但至理無二言會於理便為真際井巷常談出於鄙夫鄙婦有與聖人合者理不外是故也鬼谷韓非之書推本道德時近玄旨二子安足知老子哉其言適中爾管氏之時固未聞有佛縱有之亦不為佛觀其書者喻其理可矣安在學所問耶昔人有談不死者或從而學之未及門而其人已死猶恨其學之不早或曰自謂不死而其人已死乃誣也奚恨曰彼雖死安知其無不死之術正如管氏未知佛而其言有似之也先生以謂如何滕人來得雜録一卷寫畢歸左右巽臺記更一二日可模單氏東園記方謀鑱刻此月末必得馳上新著必多願無吝貶教春溫不雨惟冀節宣自愛不宣樂靜集卷十
