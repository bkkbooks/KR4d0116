body:
  text: 樂静集巻十三宋李昭玘撰賀皇帝即位表臣某言正月十六日准進奏院遞到制書皇帝登寳位者龍徳時升紹一王之休運天恩下霈鼔萬國之歡心凡在盖容一歸撫御中謝竊以可托天下必允屬於真人克享帝心實有懐於明徳恭惟皇帝陛下聰明齊聖厯數在躬孝悌感於人神言行動乎天地奉兩宫而無間就外傅而弗煩道學生知徳心日邁宜先王之眷命付大器以受民二聖嗣興益隆乎世祚一道相授盖篤於天倫謳歌朝覲之有歸禮樂政刑之具在享七世崇髙之業應萬年熙洽之期繼體元豐均是吾君之子承華紹聖載安百姓之心永孚四海之休咸賴一人之慶臣限拘官守阻造闕廷無任抃蹈激切之至賀生皇太子表臣某言伏覩進奏院報今月八日降誕皇子者太史觀天已識前星之應大人占夢果符男子之祥喜溢宫闈慶均海宇中謝竊以誕彌厥月有開后稷之先則百斯男於顯文王之盛由人神之相與荷福禄之無窮恭惟皇帝陛下孝安祖宗仁遂動植疏爵賞以繼㓛臣之世發廩庾以恵天民之窮廣大徳以好生示神武之不殺萬事咸理允格丕平四夷皆来實獲多助三辰昭鑒六聖具依載錫洪休篤生元嗣至誠能動無待薦髙禖之牲流澤有源何煩種北宇之行况乃岱祗見象媧聖呈光共扶萬世之基来兆一人之慶岐嶷之性先自得於神靈聰明之資將弗煩於師傅大本有系衆情以熈臣猥服外僚親逢盛事上南山之夀阻預班聯誦螽斯之章莫知鼓舞謝永興路提刑到任表從事府僚訖無善狀詳刑陕部遽忝誤恩祇命入疆撫躬失次中謝伏念臣學非知奥才不逮中晚掇辭科濫登仕版猶未棄詩書之習初不更州縣之勞講藝泮宫無以應諸生之問校文芸閣莫能窮未見之書朝廷勸課之甚優事業空疎而㡬廢低徊末路慙負盛時未嘗赫赫以動人姑幸循循而寡過勉從吏責出佐藩方甫及再朞而還寖遷大伊之佐顧浩穰之多責益黽勉以自持實有愧於吏能偶遂逃於官謗屬以田廬蕪没兄弟凋零孤窮不収嫁娶未畢事君之義固内外以一心在臣之私有出䖏之異勢屢殫愚懇過覬便州豈謂天能聽而弗違日雖幽而必照不加以罪曲盡其情特優假於使華俾分持於邦憲量材非稱冒寵若驚况闗中之奥區為天下之劇部廣輪者三千里襟帶者十八州氣俗喜争動成抵冒山林多阻昜致奪攘必得通明之才以均察治之寄如臣凡闇遇事濶疎雖知任大而盡心尤恐力微而敗責此盖伏遇皇帝陛下性齊舜哲政邁湯仁表徳禮以示人亶誠明而格物將使路遺不顧人有夷齊之心田畔相推家成虞芮之俗臣敢不仰思欽恤俯務静安閑於無事之時衡以至公之聽鄉隣不擾犴獄無留誓殫夙夕之勤力圗毛米之效澄清之志非敢望於古人忠厚之風期少禆於聖治謝京東西路提刑到任表詳刑陕右已乏事功昜部畿東再叨恩㫖量材非稱戴寵若驚中謝賦性迂疎聞道蹇淺沾濡薄禄㳺泳聖時學文未去其陳言從吏不聞於善狀亦嘗陪書林之豪秀佐天府之浩繁必有可觀未始錚錚而驚世竟無他異但能碌碌以同塵屢懇便州遽分煩使事滋多而智窘責已重而心危勵志竭精知憃愚之無補累日昜月顧罪戾之益深乆玷官聨坐縻廩給方申前請復俾就遷既奔命以戴星徒揺心而望日惟京都之近壤連海岱之故區生齒實繁獄訟惟冗豈兹孱緩可使澄清攬轡登車慙非任使過家上塜預有光榮此盖伏遇皇帝陛下堯性自天舜功成物措世於中和之地道民於禮義之風將使四海為家有外户之不閉羣生咸遂無一夫之向隅臣濫總刑章恭承徳意敢不究心審閱先事禁防寛猛以和上下無擾勉立㳙塵之效仰酬覆載之恩謝移京東東路提刑到任表承乏再朞訖無禆報昜官東部尚玷恩榮循省已還兢凌失措伏念臣學非稽古才不過人晚登仕版之榮寖通朝籍之貴兩叨持節三見周星疾病相仍安恤隂陽之患精神俱耗空言犬馬之勞多慮近迂積憂成畏姑幸屏心而逺罪未嘗飾智以近名審閲獄辭唯恐失好生之意芟除偷黨庶㡬移癉惡之風間屬年穀順成生民咸遂桴鼔之驚㡬息桁楊之繫亦稀皆神明之化陶成非奔走之臣能預方將束装待罪指日言歸豈謂寛恩復更華使去長安之日雖遥千里之圍望岱宗之雲猶均一雨之潤文書有報復之速吏卒無將迎之勞昔乃吾隣盡為屬郡今雖别部曽是故僚顧如此之便安實非臣之覬望而况全齊大國瀕海奥區水極魚鹽之饒陸多桑枲之美大姓挟貲而犯法細民禦貨以為姦非有強明之才孰分察治之寄自惟迂暗難稱使令此盖皇帝陛下憲天聰明體道變化紹復先王之政圗終寜考之㓛御一世之英豪納四方於仁夀夫何微品亦備下僚謂臣無它已嘗試之任使察臣寡過猶將責以事功盖天地至大而無私日月雖幽而必照敢不勉修官責祇奉憲條察辭于差庶不愆於明慎除惡務本使無害於善柔誓有補於涓塵期少酬於覆載知滄州謝上表禮官失職甘俟嚴誅邊壘析符尚叨優寄以不可貸之罪䝉非所望之恩驚魂既還零涕無已中謝伏念臣迂疎無取選輭不持惟知任物以直情不善周身而避患每事必問已失仲尼之前知三思乃行終違文子之常誡一昨奉太母因山之制謹百官趨事之期夙有司存各以類舉逮夀宫之昜奠道虞主以告行竟達空函㡬敗乃事既身為之官守反自闕於禮文仰誤神靈之依中攖仁孝之感過莫大者誰其歸之固當戮以市朝可復付之民社眷浮陽之封壤控北敵之喉襟澤浸際天雖馬牛之弗及風聲屬耳實鷄犬之相聞宜得望人以壮方面敦詩説禮鎮以静安緩帶輕裘應之閒暇况乃大河泛溢之後一方飢窘之餘必先謹養以恵和尤在周知其疾苦如臣孱暗非所克堪此盖伏遇皇帝陛下天地同仁日月齊照澤及行葦每思視物以如傷網漏呑舟不忍向隅之獨泣聊褫官而示罰猶守土以長人敢不砥節奉公肅心悔過盡為臣之道於事無難推愛國之心以民為本誓殫夙夜少補毫分觀海知瀾宛隔蓬丘之望舉頭見日長存魏闕之心謝落秘閣校理表備校讐之列乆玷寵名委按察之權尚叨華使退慙僥倖復荷矜存聞命已還省躬知懼中謝伏念臣學術淺鮮器識拘疎偶中詞科濫登文館日見羣書之浩博坐逃俗吏之紛囂物或儻来敢怠若驚之戒義難茍得每懷非據之憂何敢取容屢嘗求解逮俯從於外補猶竊假於前稱不自請陳寖成冒昧索驪珠於魚目已失諸真衣羊質以虎皮終非其有宜循名實無紊故常曲被寛恩上還虚授此盖皇帝陛下紹隆先烈總核百工予奪必盡其公各從分守内外一歸乎正無忝司存亶堯智以知人博舜仁而愛物養之㢘恥収以事功臣敢不勉激愚衷益勤吏責天地之造難補報於生成犬馬之軀誓糜捐於驅策謝降授承議郎表臣某言八月二十二日都進奏院遞到吿一道特降授承議郎差遣勲賜如故臣尋跪授訖禮官被黜方在退思勑命示懲止從薄責重干文憲疊負釁玼撫已懐慙感恩零涕中謝伏念臣斷斷不敏碌碌何知初無竒勛以動人每以疎愚而取禍詩禮之訓㓜則嘗聞刑名之書素所未學偶預都司之進擢適當常憲之變更宰府付以官僚惟命所赴法吏摘其帋尾謂可則書文既失於舊章罪寧逃於顯戮止從貶秩尚玷承流雖天地無所不容而犬馬何以為報此盖伏遇皇帝陛下聰明睿智以獨斷慶賞刑威之必行遵制揚功永懐善繼亂名改作先務謹誅謂使人知過則能盡其忠故用罰以寛而終歸於恕臣敢不省身夙夜砥節事功知無不為庶竭事君之義死而後已益堅報國之心謝復官表天地既交適契施生之序雷雨方作悉霑曠蕩之恩歸復官資洗除罪戾莫知手舞但極涕零中謝伏念臣材非過人學不知道濫登仕版誤置書林必有可觀未始錚錚而驚世終無他異但能碌碌以同塵逮躡省闈遽參宰屬偶官僚之有請謂國憲之當更初無預於講論漫不思其抵謬罪同破律議在謹誅止鐫階秩之微聊殿籍書之末豈謂矜前車之既失開局歩於自新川澤納汙一歸曠度父母愛子皆出至情此盖皇帝陛下堯性生知舜聰逺格庶事憂勤而協帝小心寅畏以事天常善救人恐匹夫之失所為能盡物期一視以同仁曽是孤生亦䝉聖澤併還舊物復領真祠官守不出於田廬家食盡資於廩粟葵藿之心常在終幸照臨犬馬之力已衰空慙豢養一無禆報獨負生成雖已寖於桑榆顧未填於溝壑猶能中田擊壤日陪野老之歡聲清夜焚香每效封人之善祝謝出籍表滌瑕蕩穢共承雨露之霑濡振衣彈冠莫知手足之抃蹈追惟前日感涕厚恩中謝伏念臣生也有時仕而無學智識非逺議論甚卑每慙事往而知非不悟才疎而多累兩干吏議三丐宫祠顙白不可以適河猶叨豢養帷敝或堪於裹馬未即弃捐間者上帝降康大祇薦瑞備成寳刻均福蒸民敢期負釁之餘生亦預竄名於載籍此盖伏遇皇帝陛下愛人無已視物如傷賞罰之公時乃天道予奪之節本於人情法以示懲亦既屢更其嵗月過而必改誰將自棄於君親曲示函䝉一從湔拭而臣計功無取蹈悔良多載省始終莫酬萬一盖甞喻父老以戴上之美意教子弟以事君之小心長歌天保之六章百拜封人之三祝雲天在望但知傾日以為心溝壑未填尚冀殺身而報國謝八寳赦轉官表甫除罪籍遽進文階望逺雲天特預一時之澤光生簮紱如非前日之身寵至若驚感深成涕中謝伏念臣材猶社木性實絙人初非可用於時終有自貽之悔間屬禮陳八寳慶洽萬邦赦其既往之愆開以從新之路雪霜制物天將使之成材鞭扑御家父無終於棄子矜憐舊物安養殘年復陪多士之歩趨再奉真祠之洒掃已踰望表仍玷序遷未聞圗報之一端併荷流恩之三錫此盖伏遇皇帝陛下大道善貸至仁無親凡百姓皆得其心靡一物不遂其性聖㓛丕冒瑞應並臻嘉與庶工共承多福而臣偶縁幸㑹濫服寵休籧篨䝉璆既容可録支離受粟尤愧無㓛敢不誦明訓以刻肌披愚衷而指日儻萬分之有補雖九死以如歸樂静集巻十三
