body:
  text: 樂靜集巻三十宋李昭玘撰夀安縣君卞氏墓誌銘夫人姓卞氏嫁為故比部郎中陳公仲孫之妻封夀安縣君元祐二年五月十五日以疾終其子以五年正月十九日葬夫人於齊州長清縣和平鄉千秋里潘封之原從比部公之兆前葬狀其行求銘於予因其事為之銘曰卞曹叔後莊以勇聞壼晉侍中忠孝一門後家許昌仕宋滋顯震名能詩終督郵掾袞尚書郎咸太府卿賛計主漕以風力稱三世有庸善徳垂裕是為夫人曽祖祖父夫人㓜警姆傅不煩言動有度徳容閒閒母多子男獨保女厚孰無姬妾願得為婦求􅓻君子言卜其因鳯凰鏘鏘盍歸于陳陳世大門屬有䟽宻緝柔惠恭好我如一治内有政如吏治官義不私已人無間言比部守綿民阻凶嵗傾祿哺飢後日不繼請岀匳具以收殆貧婦無外事我寕忍人旁孤無天覆䕶猶已冠笄聘婚偹物如禮不幸中寡克艱于家四方田桑罔有蘖芽率身布蔬履儉時力弗謀于親有祭有食以善教子子不廢書論世辨物霈然士夫感疾告終命諸子侍汝父汝承不惰吾慰夀六十九物數所難天胡嗇斯而不百年實生三子惟燮冡嗣為州椽曺少官蚤世度敏為吏今於須句唐孝友聞始登薦書長女亦天㓜有良配齊之儒冠公輔周氏林林諸孫綽有令姿二女稚孩五男學詩陳氏之先餘澤未匱夫人緝之其後必大清源之南體魄旣歸邦人式瞻我母婦師里名千秋世藉厥祉亦旣有孫孫復有子察推閆公行狀公姓閆氏諱某字某濟州鉅野人其先世見於歐陽文忠公所撰贈兵部侍郎曽祖某之神道碑祖某光禄少卿考某贈衛尉卿公少喜讀書未就舉以光禄恩補太廟齋郎主濟州鄆城縣簿臨政明速嚴約束不妄笑語吏持文書踧踧進退庭廡肅如也邑壌素膏沃屬嵗大登勸民裒榖萬斛越明年旱災民不飢多頼公以活改京兆司理叅軍故相晏元獻公以年位持重罕岀治府事僚吏禀白遣親校報可否小人因縁紉閉中外擅移事莫敢與辭公庭叱之堅請入見因從容請元獻公曰朝廷倚尚書勲徳鎮方面執事之吏欲日望風采承教命以布威惠今使之整冠歛版聼指顧於小校其如人望何元獻公曰微君孰教我翌旦語坐客閆君骨梗有識異日不可量遂薦於朝太師潞國文公繼領旄鉞㑹邊邑小警湏輕車數百乗期令頗急議者惶畏公以術克致三日而足潞公愛其才每異禮之鄠縣有富民寗勝􅒬酒毆人知其必死紿里人張存曰是嘗惡言詬汝今可逞存不察毆之致死縣索賊勝扳存以告吏受賕誑舉具其獄上於府存不能自明公側知之卒正其罪或有譽公者公曰岀一人死非以邀隂惠但理官之責當如此耳治獄平反皆此類也遷光州軍事推官秩滿將改官坐簽書不當黜兩資再調洋州觀察推官以治平二年五月十二日卒于官舎享年四十六始衛尉棄諸子婦人王性行嚴正躬自教率仕官皆有立公尤以篤孝聞衆兄卒事寡嫂盡禮嫂亡育其孤如己子族人亦不辨也在仕十年所至有聲上官多薦其才若元獻公潞公彰徳太師王公皆深相知不幸坎壈未䆒所施遽褫其夀非命也夫初娶孫氏繼室夫人任氏故叅政安惠公之姪孫男一女一男某舉進士女適某官某孫男三人曰某曰瑀曰瑾趙知録墓誌銘君諱滋字道卿其先趙之平棘人後三世葬滏陽從其族居焉曽祖昉太子中舎祖盛太子中舎贈都官郎中父祐殿中侍御史三司户部判官以鯁亮通給為時名臣慶厯中棄養京師君年十二䕶其䘮以歸哀毁如成人以侍御遺表恩授太廟齋郎起家深州安平主簿民力薄嵗役河上多竄避違約束令數以累去君時并饒陽郡分人謂君少怯必敗事逮功休無一人私遺者歡呼從君太守晁公仲約始器君以為可用薦于朝遷蜀州録事叅軍永康有重囚具獄上君疑其寃白守請勿治守怒曰吏敢以私意變獄耶君曰特不敢妄殺人耳㑹部使者始至引訊不復者君造前輙分明之叱君立庭下時天大寒故不問君徐曰奉法無狀願付吏以先屬部使者知不可屈岀濫繫者三十餘人調淮陽司録叅軍到官丁永寕縣君母氏憂遂家於下邳服除授湖州歸安主簿嵗大水田里被害資藉髙者安鄉白給得以時訴免常賦窮下轉徙失期㑹幸而復業里胥追責如數君邀令行境上閲寔録未免者請於州州逹于轉運司使者罪令丞姑息虧公上非法當劾時李公擇知州事喜君強直為君報曰縣為朝廷申惠澤不可劾竟如所請官滿授漢州録事叅軍将行謂其家人曰吾老矣安能俯仰上官睂睫耶蓬廬豆粥以終天年吾所願也竟不行侍御公先葬滏陽負大河嵗苦沮洳改卜于下邳新安里葬云吉嵗月或逆未㡬君得疾且有治命召諸子曰死吾所歸獨先壠未安恐終不得暝無以逃塜訟汝軰勉之無吾罪翌日遂卒寔元祐二年三月二十九日也君四娶張氏孫氏晁氏晁為東州望族夫人即比部郎中仲淵之女以其家法治内甚宜皆先君卒朱氏仁淑善安恤其孤男四人舉進士曰崇厚曰崇烈曰崇徳曰世雄世雄力學早亡崇烈大觀初以行藝貢為辟廱生後君十七年卒女二人長適進士朱訓次適進士朱仁羙君幼竒頴通左氏春秋博覽史傳務曉大意間為小詩以陶寫情性為人倜儻明給内外洞達人初未知一聼其言不復自外情臆赴人急難如救焚溺嘗以事抵京師繋舟河次夜聞哭而哀者訪之乃船商載泉上供者河水五十日糧既絶行者不保皆竊取散去謂君曰吾非死無以塞責念家在逺鄉寄哀一别君聞之惻然曰倒吾槖中冀得五百千可紓君之急勉自持廬社在目中矣商得之悉償于官遂以無罪去旅食安業坊舉子楊澤與君同巷流落不得歸有小人誣澤負百千訟于官拘守甚窘忽暮夜來歸君一見知非終窮者乃潜脱之與同載歸澤涕泣愧謝君曰吾非俠也特哀君之窮耳君自有命故吾謀得行吾何與焉後五年澤登丙科來訪君而已亡矣水部郎王諤被召已促駕妻病亟将委其家以去告君曰吾兒弱萬一失所恃恐不能葬將如何君曰此吾責也弟行無恤數日果卒君時亦卧疾匐匍以徃親為理㐫事皆如禮遊士無託每衣食之客至飲酒笑歌徹旦家事有無不問也嗚呼正色屈人好義能勇如君不可多得不幸無勢以行其志數見於里閭之小節然亦中材所慕薄夫鄙人畏而化者也崇厚將以某年某月日葬君於新安自侍御而下六䘮同舉奔走四方以經大事余昔從君遊最乆又喜君之有子也為之銘曰剛决不詭可以任大事振急如已可以惠百世天不擕其志誰毁誰譽曰放以娯其窮於天而逹於人者歟悲夫張廣叔墓表士困於俗習弊于蹇淺汩汩遂棄於常塗者乆矣為能擇賢士大夫從其所教篤好而力行之以自奮於一時亦豪傑之志也南陽張寓字廣叔世為徐州古豐人六世祖太子賔客諱延庶晋天福間徙居金鄉子孫家焉曽祖肅淳化中為監察御史敢言事以亮直聞未四十而謝事家居士論稱其髙祖畋隠徳不仕喜飲酒尤工為詩與石曼卿為㤀年交父孝綽累試進士不中聚書教子弟慷慨氣决輕施重義徃來多顯人母杜氏豐縣令期之女繼室韓氏君即杜所生也五嵗讀退之進學解再過成誦初志學極意墳史兵部侍郎王公汾布衣時從先府君遊館于其家每挾疑以請問詰有理王公竒之曰東州不乏名士此兒吾所畏也縣令河南李公育博洽能文有盛名於時君執子弟禮日造其門求所以學古為文之要李公曰君子學以致其道岀處則有義命存焉司馬遷劉向揚雄制作之淵源也思則得之君踐服其言造適益逺矣既冠四預鄉書連服内䘮十年不得隨計紹聖四年春御試賜進士岀身未調歸省屬幼弟卧病親省方藥調飲餌不暇食息惟恐貽親憂未㡬告卒君曰吾父年益髙不幸有愛子之傷安可去庭闈自今不復言仕矣暇日負几杖奉版輿周覽家園為具肴醴召賓客行觴賦詩君雍容曳綵衣庭下再拜為夀鄉人榮之一日府君曰老人之情重去鄉里懐婚友笑語汝能盡孝以致養所樂多矣汝不聞得禄逮親古人所喜使吾坐官舎食太倉粟霑恩上餘賜時見貴人來知教子之報亦自幸也君始有赴調之行既及國門感疾而卒享年三十五凡鄉人之嘗與交士大夫知其名者莫不傷之娶呉氏定州法曹靖之女男一人曰芻好學有立志女孫一人以元祐七年七月十二日葬於金鄉縣進樂鄉白茅村之原君性明俊外晦詳整自重不妄取友論古今從容中理文辭簡潔不求富艶二三讀益見㣲意施于事業未易量也嗚呼崑崗有五其大盈尺可以禮上帝降福祥追琢既成俄折墮地一歎而置天之生物果何如哉此非人之所可知者若夫器質文行之羙則余能知之敢表其實以諗來世閆宗一墓誌銘閆氏世為鄆人自六代祖寳佐唐莊宗取常山以功封太原王周廣順二年改鄆州之鉅野鄆城為濟州今為濟州人濟之諸閻皆王後也君諱某字宗一曽祖某光禄寺少卿祖某楚州録事叅軍父某宣徳郎致仕公少聰警特立讀書能強記人與論事或不中理遽面質之問詰不少屈嘗謂男子之志事無難者自斷不疑可也治平間朝廷以詩賦造士學者或困于所習君方從師授聲律竊笑之曰此女功組織之事耳試操筆為之㸃綴百餘言皆瀏亮中節終不甚好也性至孝就養唯謹家事巨細經強給不見所闕有所湏必時至門外之親間有變故不以告惟恐傷其意少有疾或遇事不悅左右俯仰問省調適必起居如常時歡然笑語然後旁顧却立移就食息里人稱之凡三試禮部不中元祐五年始擢進士第授濟州鉅野主簿先是宣徳君有别業在滏陽晚年尤寄意泉石因卜居焉雖得其好而墳墓之國未嘗忘也君既歸賀者塞門置酒堂上奉觴再拜曰不肖子違負慈訓淹致養之日幾二十年始得一命効官有日将奉版輿東歸志願足矣敢上千嵗夀惟大人無辭坐客勸侑相屬宣徳君意甚歡徑醉觀者指目榮之某月日将赴官感疾甚亟顧謂從子闓曰命也奈何汝既知所立矣無墯吾志二子孤弱為我教之無使不類吾死無憾後幾日卒里人聞之匐匍而至皆前日之客也既傷君之不幸又復念宣徳君之憂無已也哭之甚悲嗚呼斗升之禄未能供一朝之養而七十之老反有哭子之哀天之施報復何頼焉雖然隂陽之理各生於所極不甚廢則不甚興剥復之道也君既有子矣為善之力竟將誰歸娶某氏男某某皆舉進士以某年月日葬公於某鄉闓來乞銘為之銘曰盡孝以事親禄未及酬而殞厥身誰其尸之為此不仁尚克有悔以貽後人樂靜集巻三十
