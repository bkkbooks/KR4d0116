body:
  text: 樂靜集卷十八宋李昭玘撰謝運使學士瀝懇乞麾方自規於假守被恩昜地猶外緫於詳刑濫同原隰之馳喜有瞻言之便退循孱緩實幸庇依伏惟某官道學知天徳名輔世文章足以華國事業見於濟時被熈寜睿聖之知叅金華勸講之任發揮奥義允恊上心伯仲談經偉矣一時之羙君臣合契焕乎千載之逢蚤預登瀛乆宜視草淵衷宻簡舊徳是圖眷惟京左之將輸實首國中之轉餉借籌良畫澄清暫委於宣風告后嘉猷雅健方思於掌制佇期迅召亟展慶函欣禱併深叙陳奚罄荅留臺沈大夫瀝懇乞麾方自規於假守被恩昜地猶外總於詳刑視事云初賜函先及伏以某官雅推令矩久著能名請留鑰之臺綱暫資宿望披中宸之芝檢行踐擘塗覿徳未皇致郵不敏良有後時之愧益深内訟之私感怍既并叙言罔既回致仕畢大夫謬膺煩使方愧於澄清夙仰髙風雅懐於瞻觀遣牘末皇於郵置貺音先辱於幐函伏惟某官藹著令名乆躋膴仕逡廵昜退之節士夫共仰於懸車優游佚老之榮談笑未承於揮麈即圖披晤深祝保綏感系之誠叙陳奚既賀濟州太守禮上顯膺綸命榮領藩符㳙擇剛辰奉宣王詔伏惟慶慰恭以某官挺才出類秉徳兼仁朝廷允恊於僉謀郡國實資於共理恩威方著聞望益隆緬惟布政之優綽有怡神之裕鷄犬候境庶可仰於仁風桑梓在郊均有䝉於徳庇傾依第切瞻對末縁伏望上為邦家精調寢餗濟倅問候結好鄰邦幸及餘波之潤被官半刺阻陪揮麈之談月吉薦更郵音稍闕逖惟副貳之暇動恊神明之休某官徳宇淳深聲猷聳邁游刃乆當於煩劇宅心自處於髙明某濫以散才謬當别乘鄉閭已熟於風化治境又託於庇庥仰徳實勞馳心孔疚方應鐘之在候宜吉履之順時伏願上為廟朝精調寢餗沂宿太守問候行郵濶畧曠馳欵啟之音大府重深徒仰浚明之徳茂惟鎮俗之暇克擁自天之休某官學際聖真才髙名世良二千石果膺治主之求課第一人行見褒書之下某濫叨貳政獲庇鄰封頋韁鎻之坐拘莫親髙範雖馬牛之不及尚借餘光叅對未縁傾依至切願保寢興之羙益介福履之休沂宿通判問候督府闗決愧非半刺之良擊柝相聞殊慶此賢之吉徒有徳公之願尚踈奏記之勤逖惟燕閒休有恊相恭以某官器能通博風度醇深薦更寄委之䌓夙根清修之羙豈兹别乘可屈逺圗佇顯效之寢彰副公朝之明陟叶光御政和叔司方伏覬上為邦家精調寢餗提刑問候講聞髙譽雖懐仰徳之勤奔走宦逰未獲依風之便比叨屬部猥託巨庥將觀使節之華遂如昔日之願某官器周物表識洞幾先早膺中扆之眷求特委東州之亷按奉行拜憲方曲盡於恕心進對楓庭將入參於近輔即期迎拜倍切懽愉賀荆王裂地全荆撫有大邦之衆建旄東道載兼兩鎮之雄茂推同姓之恩永頼維藩之固凡叨臨庇舉積懽愉某限守州符阻趨官邸賀淮陽知軍到任宦服奔馳悵趨風之乆阻封圻連絡幸擊柝之相聞方染翰以馳誠忽飛縢之來貺載懐謙抑但極感銘某官才賦䟽明器函夷粹雅有臨人之望夙推治劇之能剖竹方州暫煩於共理握蘭華省行躐於近班尚阻披承益祈珍衛謝漕州吕孝亷得士則重方盛世之有為舉爾所知盖古人之公義猥叨亷按敢後薦揚僣昜為慙賤踈何補某官才猷兼􅊀風績素髙乆揚歴於事功慙淹回於藩守昔年共事已凌厲於青雲比嵗得遷尚蒼茫於白首幸縁衆譽輙罄衷言固非量力之所宜特恐蔽賢而䝉罪豈期謙眷特屈誨存感服之私誦言罔究謝黄尚書誤被宸恩就更憲領猥縁奬遇獲預光華方俟命以造朝阻登門而伏謁敢期謙屈曲示拊存聽君子之言未遑歛袂拜使者之賜竊幸置懐樂靜集巻十八
