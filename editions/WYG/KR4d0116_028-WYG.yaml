body:
  text: 樂静集巻二十八宋李昭玘撰王仲逺墓誌銘君諱彦博字仲逺濟州鉅野人曽祖鄰不仕祖志贈大理寺丞父丕官至大理寺丞妣周氏王姓之岀盖自周靈王太子晋歴戰國秦漢而下世有顯人君之先實居冀州之信都渉五季之亂自曽祖始遷於濟州之任城君之祖又遷鉅野家居力學以其業教授諸子皆以文行著名君之伯父與寺丞公相踵擢進士第鄉閭榮之士族之教子弟者必指王氏為表儀寺丞公年五十冡息未生與周夫人齋戒夜禱夢神告而生君焉君之生也俊惠竒警不與羣兒遊戯嘗以書自隨日誦千言寺丞公棄養哀毁如成人遇父之執挽衣稽顙慟絶見者為之岀涕始受學鄉先生喜為古文頷首揺筆凌厲槃礴頃刻即成初無刻畫礱錯之跡而多得其制作之意性樂昜與人交以善相告露見城宇飲食衣服必與之同使人益親而不欲去士有類於貧乏不能縱心於學者傾所有資業之以成其志嘗諉族人昜産於他邑輙欺其價以偽劵歸之一不問或有告者君曰彼吾屬也不能逆知其所欲而使有是心吾之罪也初應詔以周夫人䘮不逮試有司其後復以疾不赴至和二年八月二十三日終於家享年二十一鄉人弔哭相屬一時名士竟作詩以寫其哀以謂靈苖不實龜毁玊破常岀於人情所甚愛而理之不可尤者其辭為傷君才甚髙巉絶獨岀老師宿學之所謂氣盛而志威滅沒千里後生軰不敢與之並馳方未冠時貴公望人不問年齒樂從其遊許以公輔之器自君之卒更五十年遺文逸句落在人口稱道不已天其或者姑假之年涵潤長養日充其材用則行其所學不用則著書以見志其於天下後世宜如何嗚呼娶孔氏有賢徳宜其家生二男長曰龜齡明悟好古有先人之風度三預薦書未壮蚤卒次曰松齡志行特立以辭學登科今為滑州白馬縣丞二女長適衢州西安縣丞閆師旦次適進士李臨孫男五人曰彬曰􅀢曰中曰聿曰串皆舉進士曽孫二人曰恕曰懋将以崇寕四年四月三日葬於濟州任城縣諫議鄉吕材之原松齡予友也状君行實求銘於予為之銘曰物生有才是亦或使誰為不仁乃復戕毁謂有命也智無與争雖死而夀又奚貴生木折非腐水窮非塞扶踈潏洋惟後之日榮起之墓誌銘先生諱振字起之其先北平無終人逺祖九思仕唐為給事中自髙祖繼紹避亂因徙居徐州之彭城後為濟州任城令因家焉今為任城人國朝開寳初授博州聊城令卒贈将作少監三子皆擢進士第長曰太素歴殿中侍御史贈諫議大夫先生之曽祖也太素生範用御史恩補太廟齋郎早卒範生翊李文定以外表親奏補試将作監主簿終宿州臨渙令先生臨渙令之次子也少剛潔自重不倚於物務學有本喜兩漢文章耻作雕篆故於辭賦少工而品藻論辨皆遷固材也凢偕計五上試禮部不中以恩補大名府助教束書東歸閉関里巷文史自娯雖老不廢晚苦風痺瘖不得語余嘗以公幹過任候其起居乆之杖而岀以指啄膺欲大呌者數四竟不能吐一言涕淚俱下余亦為之墮睫左右不忍顧反面引去未幾其子以訃聞予哭之慟嘆曰洙泗以西不復有此人矣考其諱日乃元祐二年五月初五日也享年六十有九先生壮時從事科舉郡太守聞其有髙行邀致學校表儀諸生間挾一書册徃來堂上望見儇薄後生軰不學子弟施施而來必靣責之稍不領輙懷書以去不復與語屏居蔬食一錢一米不以取與人富人巨室來則拒之聞先生之名竟不得接其靣目治已􅃊正常若不可犯者小夫淺俗竊短以謂狷介不近人而先生固自若也同郡晁公堯民才髙有盛名不妄取友從先生遊館餼甚厚每為文章議論經其可否然後岀於人經傳有疑决於其言而後定遇有須緩急厚薄必得其意而後已至於紉澣衣褐調適飲食皆家人為之不倦也由是一鄉之人始知尊先生矣太守單父馬處厚嘗為治平御史以直諫聞士不敢輕進見先生曳裾長揖升堂就席占對磊落公頗驚之異日召與論歴代治亂由秦漢而下孰得孰失猶數一二激忠疾邪感慨憤懣以不得生於其時為恨徃徃夜分乃罷公曰機辯明鋭馬周之徒歟由是一鄉之士始知先生志太學博平日之自異未可量也後馬公被召為夏官貳卿晁公擢司金郎位寖顯可以推挽時也先生已殂矣天或假之食六品禄冠柱後惠文正色立朝紏正百官凛凛風動一日得行其志無憾也不幸窮老病廢卧破屋下舌梗氣塞奄奄以死嗚呼為文髙古有法度詩句清逺得意皆前人不到處有集十巻藏於家娶句氏子男一人曰亶孝愿可立克奉緒業里人樂稱之孫二人長曰大同次曰大順習貢舉将以政和三年八月二十五日葬先生於任鄉北賈村之原從龜告也亶來乞銘義不得辭為之銘曰直木可支精金可割竟不得施腐爛摧折天既誘之乃復阨之人實知之莫或挽之大鈞茫茫孰與信疑百世不没有此銘詩李奉議墓誌銘公諱衆字仲師李姓所岀見四方尤多公之族自五代為鉅野著姓後别葬金鄉今為金鄉人曽祖綰隠徳不仕祖義贈尚書度支郎中考定以儒學起家真宗朝屢上所為文章眷奬甚渥将使數路以風績聞終尚書工部郎中直史館贈金紫光禄大夫妣永嘉郡太夫人馬氏所生仁夀縣太君吕氏金紫棄養公方數嵗哀毁如成人用遺表恩補太廟齋郎旣長力學喜慕名節不茍去就初調大名府朝城縣尉年尚少人多昜之㑹夜有獄變刼吏卒将遁喧聞於外公徒歩徑徃叱之皆辟易就縛再調恩州司理叅軍守武人以氣厭其僚遇事強愎人莫敢争獄有重繫辭說承輙語公易其情公持不可守色厲公徐曰吏有法守安敢以私意輕重不然當自主何必付吏幸得罪去無愠守知其不能奪竟從之移汝州魯山縣令境土多榛萊民力不足時河朔薦饑詔許流民占墾公誘掖安集至者如歸未數月年榖大登百室熈飽公上之輸數倍他邑轉大理寺丞差知棣州商河縣求便親改单州魚䑓推行方田事詳而不攪河北提舉常平司薦公鎮寕軍節度判官管勾常平事遷太子中舎緋魚官制行改通直郎河决小呉坐免繼丁仁夀君憂服除簽書武寕判官事遷奉議郎元祐初秋大雨汴泗暴溢下阨二矼水囘洑不得去薄府東門自城竇中入沸岀平地視府庫尤殆守者倉倅無䇿公為發寳豐監廢鐡錢塞之勢遂息居人避患走丘陵不得下三日無食具糧糗舟檝俾載而歸人頼以免官滿通判潞州潞大府守臣多通貴不親吏事弊滋乆苖莊敏公以疾觧殿帥賜保康軍節領州事至則卧閣自養吏敢慢文移閲月不省動盈几格屬在告公攝事一切懲責不旬日稱治部使者過謂公曰比文報甚速非昔日潞州也倚公良多交章薦其才未幾經略司檄公按㳂邉城寨奔走觸然道得疾歸遂不起元祐五年十二月八日卒於官舎享年五十四娶比部員外郎晁仲淵之女封夀安縣君男公裕公佐公濟公逺公敏公裕累試禮部早卒公祐公濟擢進士第公祐萊州萊陽縣主簿卒於官公濟奉議郎通判潰州餘皆舉進士女適登仕郎晁損之進士卞顧奉議郎崔翰皆卒次適奉議郎魯穫進千之孫十七人以元符二年五月庚申葬於金鄉縣金山里左羊之原從先兆也公魁偉有儀度語氣簡重與人交洞見城宇乆之益驩事親篤孝與仲兄成州相愛老而不衰怡怡如也居官求稱職不取虗譽事至敢决不以利害自謀治獄明恕理可疑必爭辨雪得活者十數人屬吏有過召與欵語使知悔終保任不疑其所存亦逺矣而位卑勢迮不足以行其志中道而殞士論惜之予嘗與公同僚所知為多其子公濟來乞銘輙序其實為之銘曰嗚呼李公有勇有謀不與物流愛人而周我寳自求而命不優俾世益修祉禄是裒乃天爾酬弗庸何尤作銘藏幽以永公休成州使君李公墓誌銘士以才自任喜著功名智力俱困而終於蹈患者固常有之若夫強以濟事約以行已始卒一致而安于無悔者吾於李公見之矣公諱兟字世京濟州金鄉人曽祖綰隠徳不仕祖義贈尚書度支郎中父定工部郎中直史館贈金紫光禄大夫妣永嘉郡君馬氏所生仁夀縣太君吕氏公金紫恩補太廟室長授大名府元城簿屬太河决調役夫萬人期㑹甚急令惮其行公請自効初至人以貴家子易之約束旣行無敢犯人倍其力第勞為諸邑最留守良僖李公薦其才可試官滿調泰州司法叅軍發運使以上供綱委公督遣朝廷岀專使且至適嵗大飢民艱食法當賑給官吏束手憂窘公語使者曰民命寄朝夕國計旬月可緩也願先岀榖以活窮民以其餘歸太倉未晚旣而按籍檢括猶僅可支使者服其敏决遷開封府中牟縣尉嘗躬獲強冦或者告以用勞改官公曰幸逃責爾竟不言者上用薦格改大理寺丞南京留守傳求辭改公府司録叅軍鄉民謝徳誠説浮屠法謂能禍福人聞者甚恐祈謁擁門守以為奴且生變捕繫幾百人公白守曰無知之民無大蠧害特㒺衆取財爾即日杖遣之禁卒祖立以逃被捕市人王郝歐妻至死當論如法疑未次公覆訊乃得之立曰初念毋以逃顧母無恙将復歸道遇邏卒曰我寔逃幸執以聞郝曰母詬婦婦反之我不勝忿歐無幾偶以傷死公曰以情自歸何有捕也歐不孝婦非歐妻也皆不當死乃以疑上讞止坐配法鄆州置都作院事始須得人辟公充監官工技精宻諸郡遂以其式行太子中舍賜緋魚官制行改通直郎轉奉議郎通判徐州彭城男子自稱神降其家慿附語言里巷詾詾相告幾不定居公宻捕其首痛懲之斥境外騰口遂息轉運使今武康節度呉公聞之将置獄方乘驛至而事已平矣頃城令受賕枉法監司檄公按劾其罪不可數舉抵讕不承公曰為吏至此尚可免也掇其一二甚明者鞫之以薄治其罪奏上猶竄嶺表将行以餘俸資之丁仁壽君憂服除改承議郎通判兖州奉符有大商死逆旅資萬緍奴軰胠篋已亾其半公追治究詰盡籍於官移其家給之萊蕪富人以獄繫訟狡吏紿作令語受富人金事發誣令教我令幺性不能自解公潜遣人索金於吏家果得之遂正其罪是嵗秋不登羣盗薄境聚落一空道無行迹提刑司聞於朝責公誅剪選驍卒百人先扼其走集焚蕩巢穴禁食飲徃來不旬日斬馘殆盡青州有滯訟情屡變踰年不能决部使者語公曰暫屈此行不然不能無寃人公至盡去縲械具湯沐食物親勞之曰父母妻息孰為收恤資業孰為經理狴犴與廬舍孰樂皆泫然泣下曰今日當吐肺腸墮地敢復囘隠不加一箠盡服其辜㑹濟南守罷去公承乏攝事是時右丞徐公翰林強公方為屬僚相好甚欵公嘗語人曰精金羙玊皆廊廟器也後果貴逹論者服其知人遷朝㪚郎知成州所治偏逺吏無法守屡勤亷使轉運判官㳺師雄曰同谷得疾元祐八年正月二十一日卒于官舍享年五十八娶大中大夫趙恭和之女封蓬萊縣君男五人公享公亷公忠公才公輅公享儒林郎兾州司工曺事公才将仕郎京兆府櫟陽縣尉公亷早卒公忠公輅未仕女三人長適從事郎杭州司理叅軍閭丘珪次適承務郎監磁州昭徳鎮張斁次適通直郎潁昌府司録事劉師文孫男九人尚㓜以政和四年六月二十七日葬于金鄉縣左羊里之原從先兆也公少喜讀書務曉大意性沉毅渾厚若不可犯與人交樂昜無間乆之益歡議論從容中理未嘗餙虗文作竒中以求人知而人寔知之事至耻循黙岀衆敢前事已則逡巡退遜不自言功而無所媢忌故能蹈利害渉險夷常裕如也嗚呼年未及中夀而所試者纔及一州此不可知者余亦莫能言也因叙其事又為之銘以信其可言者銘曰見可則為適當而止不徼福故寡禍不近譽故無毁傳曰樂循理謂為君子尚爾後人服此餘祉蓬萊縣君趙氏墓誌銘夫人姓趙氏其先西洛人殿中侍御史孚之曽孫御史中丞尚書右丞追封魏國公謚文定公安仁之孫大中大夫恭和之女母崇徳縣太君孫氏早卒繼母榮徳縣太君閆氏夫人生七嵗聰明警悟過人言語應對了了可喜旣長動容中理不妄笑語擇良士歸之而得上部郎中直史館李公之子兟匹焉李氏諸婦皆年倍而視夫人如女子時不以娣姒齒之夫人執禮無懈凡門内之事祭祀賓客飲食服用必身先焉事其姑仁夀君尤恪問省不易其時調芼紉澣不經其手不以進諸婦相告曰我軰弗如也以夫陞朝封蓬萊縣君仁夀年益髙寢疾滋乆奉湯劑候起居未間潜飲泣不食仁夀曰吾九十人矣瞑目可憾念無以報吾婦亦無如之何惟善助吾児教子孫強立猶有望也後李公以朝㪚郎知成州卒于官夫人䕶其䘮以歸嫠居二十年􅃊正有法度誦佛書精進不倦旣得疾告諸婦曰火風将息吾何以逃汝舅仕州縣凡七遷奉法行已吾所賛多矣吾奩篋中物皆嫁時資未嘗更置一物以自奉吾此意亦欲遺諸子孫汝等誌之翌日終於正寢享年七十六大觀四年六月二十九日也男五人公享公亷公忠公才公輅公享儒林郎冀州司工曺事公才将仕郎京兆府櫟陽縣尉公亷早卒公忠公輅未仕女三人長適從事郎杭州司理叅軍閭丘珪次適承務郎監磁州昭徳鎮張斁次適通直郎頴昌府司錄事劉師文孫男九人尚㓜以政和四年六月二十七日将葬朝㪚公而舉夫人祔焉銘曰順以事上無敢咈違正以率下不以笑嘻于鄉于家寔婦之師善善不匱尚克有貽晁次膺墓誌銘政和癸巳大晟樂旣成八音克諧人神以和嘉瑞繼至宜徳能文之士作為辭章歌詠盛徳鋪張宏休以傳無窮士於此時秉筆待命願偹撰述以幸附託亦有日矣公相太師蔡魯公知公之才以姓名聞上詔乗驛赴闕公乆廢不試亦冀自見於時鄉人好公者喜公復起相與賛其行去朝天門十里置酒為餞曰異日富貴還故鄉望車馬此道上惟厚自持入都門士大夫聞公來者相告曰晁次膺自此升矣翌日太師召公語曰髙卧三十年復何所得公曰未嘗不欲仕也特以罪負斥伏若将終身不意倒屣掃門乃在今日㑹禁中嘉蓮生分苞合趺夐岀天造人意有不能形容者公效樂府體屬辭以進上覧之稱善未幾中暍感疾更十數醫不得愈命下除大晟府按恊聲律奄奄不克受賀者及門聞哭聲入弔而去八月載其䘮歸前日為餞者岀迎河上顧一舟夷猶而下揭綘帛大書乃銘旌也讀之流涕計去時纔五十日未食太倉一粒粟已為歸人念之尤傷以其年九月十九日葬於任城之魚山從先兆也公諱端禮字次膺世為澶之清豐人後金紫葬濟之任城今為任城人姓氏岀西王子朝系屬漢御史大夫錯之後祥符中文元公以儒學入翰林為文章宗工文莊公有經濟大志叅真宗政事時稱名臣晁氏之族始大著公之曽祖廸贈尚書工部侍郎生宗簡贈特進吏部尚書特進生仲參贈金紫光禄大夫公金紫之第三子也母公孫氏贈永嘉郡太夫人公以熈寕六年擢進士第授單州成武簿遷瀛州防禦推官知洺州平恩縣官滿授泰寕軍節度推官知大名府莘縣事以政和三年七月二十三日卒于東都昭徳坊之外第享年六十八娶梁氏湖州徳清令訪之女男益之觀之州學貢士同之早卒女長適泰州海陵縣丞滕伯竒次適貢士翟光弼次適河南府司工曺事馬承休孫男四人公榮公采餘㓜女二人在室平恩並大河嵗虞决溢公始至諭民具菑石謹防堨増培卑薄疑若無事而擾者元豐末果决小呉浸數州獨平恩百里耕稼自給民至今思之在華縣時嘗董役河上告戒明一㑹頓舎不便號丁夫夜徙部數十人各以隊行無敢譁閧旁縣不知也朝廷行保伍法以寓軍政都閲武人急上功約束苛冗訩訩謀變語聞於外公方視邑事馳馬入行間揮軍大呼曰離立者當斬古者教民戰使守望相助以保其家今小不忍先自棄首領如父母妻子何咸感泣悔罪部使者疑公掠功邀福招以他事坐預支公錢從私貸法奪官罷去流泊淮上寓僧舍中箔門風雨藜羮不屬抵掌談笑豪氣故在後數嵗西還稍經理生事寖饒於財分窮赴急惟恐不及客至飲酒賦詩放浪終日平居杜門避聲跡常困畏不若人方嵗大飢弃小弱道上遣人購歛飲食薪絮澣沐負抱一如家兒寖長物色所生歸之先特進葬開封屬河漲侵嚙幾壊阡壠金紫公嘗語諸族改卜未暇公誌其言一日告於廟禱以先志神寔許之自鉅野徒行四百里奉其柩以歸定於金紫之東曽太夫人從焉或曰古不修墓今遷之何也公曰孝子之葬其親不忍土侵膚不幸棺槨腐敗委諸水中亦何心哉使聖人復生必從吾請矣去下濕宅髙原子孫纍纍相依嵗時􅎈掃合食正吾祖之志也又何罪議者然之族弟以醉毆人傷後以疾死傷家挾仇訟是鬭殺持甚急公召其兄諭以引醫為對遂從流議平生嗜佛書暮年一意歸宿口誦手録皆要妙語夜卧目有圎光家人驚之公曰先文元公修清浄惠得無碍觀每有此相今不知何祥也或岀於情想爾公為人博學強記氣韻爽㧞為文清䴡雅自負不以勝人喜道人善如味膾炙與人交開露城宇窺其中不見藩鍵遇事見理明速必奠而後發論人材取大致可法不及所短有文集十巻藏於家嗚呼斯人已徃矣不可作也予既以詞哀之今又銘其墓云銘曰天之生材有命在人乖暌合逢孰職其均我之将行或授之手我行遽顛孰排於後枯楊不春稍復芽蘖雷風呼􅌵幹㧞何日太阿乆幽䝉靣塵穢旣發其光一折不試㴞㴞大川有艎有舟獨不能濟卒非人謀力善自我如表斯植影寔隨之何有迷滅一氣囘薄不虧不成旣徃不待後者其迎樂靜集巻二十八
