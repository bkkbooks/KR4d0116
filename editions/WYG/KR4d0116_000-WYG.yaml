body:
  text: 樂靜集别集類二宋提要臣等謹案樂靜集三十巻宋李昭玘撰昭玘字成季宋史云濟南人考昭玘籍本鉅野葢嘗署濟陰而史遂誤為濟南也元祐中擢進士第厯官提㸃永興京西京東刑獄坐元符黨奪官徽宗立召為右司員外郎遷太常少卿出知滄州崇寧初編入黨籍紹興初追復直徽猷閣史稱昭玘坐廢以後居閑十五年自號樂靜先生寓意法書圖畫貯以十囊命曰燕逰十交侯䝉為昭玘校試所舉士及䝉執政感舊恩使人致意昭玘惟求秘閣法帖而已其孤介自守不汲汲仕進如是故其胸度夷曠發為文章皆光明俊偉無依阿淟涊之態亦無囂呼憤戾之氣又早為蘇軾所知耳濡目染具有典型北宋之末翹然為一作者當時與晁補之齊名固不虚也其集前後無序跋不知何人所編宋史藝文志文獻通考皆不著録葉盛菉竹堂書目有之而無巻數惟焦竑國史經籍志三十巻此本凡詩四巻徐州十事一巻記一巻傳序一巻襍文二巻書二巻表三巻啓狀七巻疏一巻青詞疏文一巻僧疏一巻進巻二巻試館職策一巻碑誌行狀三巻與焦竑志合葢即竑所見之本也乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:706395654a6d536feab1f16d54c6a80e0f93a6d28512e9d5fab6e82e6a3b1f84
