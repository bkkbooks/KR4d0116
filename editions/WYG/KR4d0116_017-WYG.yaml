body:
  text: 樂靜集巻十七宋李昭玘撰謝徐州范教授分職儒林下車鄉校髙名夙著多士相歡自昔人昧五常之原世無三代之學大道殫殘於秦法衆言殽亂於漢儒以公羊為賣餠家盖譏淺俚謂太𤣥可覆醬瓿尤病支離國家崇餙儒師發明道徳排異端之戕賊歸妙理之淵源必先因性而治身然後事君而成物故於教養益重選掄某官徳性靜深天材秀擢非先王之言不道以天人之學自修將趨歩於紫垣暫棲遲於泮水金口木舌一坐盡傾白日青天衆人皆仰鳴絃盈耳投履滿門從善若登並席幾四科之列聞風而作擔簦多千里之行禮義相磨英豪軰出將見東徐雅俗共陶闕里之餘風貞觀名卿半出汾陽之髙第行須錫命别踐要津慕服素深瞻承良幸回兖州知府比貢柔緘幸塵清覽禮無不答書匪盡言上君子之堂未遑引袂拜使者之賜叠幸置懐竊惟鎮撫之餘茂有福祥之助恭惟某官聲猷華國器業在民早膺出使之華尚屈偃藩之寄報政之速固無待於朞年聞命而趨將入陞於禁從佇期瞻謁少罄叙陳賀轉運使光被恩綸出司漕計仁賢所至民吏相驩某官器識宏深風猷髙逺益隆時望夙簡聖知持節外臺屢更煩使握蘭華省䆮躐要資惟東州之奥區為諸道之劇部非通材不足濟國用非逺略不足究利源時惟僉言允屬賢業九年足用坐追滋殖之風四輔維人行被吁俞之眷某幸縁聮事遂獲依仁尚阻參承但勤嚮仰上南京豐侍郎寵被恩綸榮司留鑰仁賢所至民吏相驩恭惟某官國器宏深天姿純正言動皆君子之法出處有古人之風早升要塗益聳清望道學有本得之自然政事不煩聞者皆化惟别都之重鎮須近侍之名臣克壯藩垣式宣惠澤報政之速固無俟於期年為國之光將入升於近弼某素承知遇竊獲庇庥頋望履之有期實瞻風而自幸永興提刑謝到任某䝉恩授前判官已於正月十二日到任者委轡下車勤吏民之趨走據案渉筆擁文墨之紛紜將何補於事功徒有慙於面目伏念某迂踈末學鄙野孤生賦材不長聞道最晚棲遲日月僅成九轉之功蹭蹬風塵未䝉一頋之價再預充庭之貢謾為入洛之遊敢意菲文偶塵精鑒初乏青錢之作宜置下陳誤經黄絹之評遽超數等叨從禄仕擢偹儒官詎能握管以窺天良愧奔蜂之化蠋屬大明之繼昭延舊徳以亮功博收人才盛集冊府開閣之始豈乏異能偹員者誰乃出下客人共榮於入彀時皆謂之登瀛正始諸賢濫陪武歩石渠袐籍䪺發見聞惟知反巳以自求敢覬因人而幸進謂有昭昭之功者必有冥冥之志無赫赫之熱者亦無凛凛之寒欲寡過而未能恐修名之不立以愚自信曷嘗稱博而毁丹與世何尤不暇去嬰而歸蚡安有本同而末異奚傷先病而後瘳處冲季孟之間僅知所立甘陵南北之部適幸兩忘能不能各自其人得不得必尸諸命洋然迎餌詎為方氏之魚兀若畏人反類羊公之鶴嘆源泉之有本驚蒲栁之先衰一傳未終恍已迷其姓氏片文屢過幾不辨其偏旁但縻廪粟以偷安何罪書魚之成􅗜乆玷外庭之列聊從别乘之行迨及更書復還舊直竟無他異莫追終賈之才名必有可觀竊預趙張之政事舍丹鈆之㸃勘視鞭扑之喧囂精神僅及於目前智慮或遺於意表蠅紛訴牒驅即復來鴈集吏行守之不置間闗畏罪黽勉赴功入水必濡每憂掲厲遇風知退冀免摧頽雖殫十駕之勞蔑有寸毫之補間以私門艱窘多事侵陵禄未逮於孤窮嵗已驚於遲暮田無附郭久負陶潛之歸盜不過門素多張禹之愛屢申愚懇願守方州猥霑造物之私特假詳刑之任占河闗之勝道連雍陜之雄都小民尚氣而喜爭巨滑瀕山而為盜素稱劇部尤藉長才自非水鏡無疵權衡不撓則何以吏知守法人不稱寃頋煩闇之無堪適選掄之誤及此蓋某官元功播物一德亮天見逺業於有為期太平之可致論事必同於善使人樂盡其才引傴僂以升髙徒煩假手削輪囷而成器幾誤揮斤敢不慎守官箴勉思民事不近名而邀福無倚法以作威概以中平得之安靜少圗禆報上副陶成羙廕方休曽未虞於巨臂不才自養終願託於長年過此以還未知所措賀交代改官對揚褒命進陟新階名徳所推縉紳相慶恭惟某官降才踈敏體道靜深議論見聖人之心行義為天下之則横經芹水之館士有成材賜見雲龍之庭上嗟晩遇遽遷羙秩寔慰公評竚聞天語之咨庸行踐禁垣之清近謝漕使誤被綸言再叨憲領方馳驅而及境寔嚮往以為勞竊幸拙踈廼承庥庇伏惟某官天姿超㧞國器宏深爰遇興王亟踐髙華之選薦逢盛旦尚紆將漕之權敢謂官常獲聮事任企聲光之雖舊拜門館之匪違陪萬忻愉敷陳曷究移京東西路憲謝丞相陕西緫刑任使每懐於罪黜畿東昜部庇存曲荷於陶埏事簡責輕恩隆感厚此盖伏遇某官道大而備器博以深用中正秉國之均專精神熈帝之載期底於治必納以忠燮理隂陽三階平而萬物遂整齊法度五教敷而七政調宰正庶寮儀形四海總六官而建六典以致大和同一徳而恊一心坐凝庶績洪鈞運物大冶扇金盖皆播於至公豈必躍而自化顧才甚下並用無遺重念某早辱知憐乆叨委寄惟是寵光之異尤深戴仰之歸初以疾聞規求符竹亟䝉恩徙宻邇鄉閭豈惟登車攬轡之榮實有過家上冡之幸囊􅗜鮮椎剽之習桁楊無請寄之姦人謂便安心知尸素尚懼不移之愚懦難勝甚渥之眷私雖竭薄才竟虞無補終期便郡更冐大恩庶幾驅策於蹇駑不負範鎔於甄鑄同前謝曽樞宻盛德茂禀傑才間生以堯舜而致君並䕫龍而濟世上窺姚姒早推掌制之工載戢干戈果著執樞之畫居然社稷之衛時為文武之全基立太平規王體而斷國論戰勝無事運智略而明廟謀廣土闢而七政調泰階平而萬物遂制四夷而請命同一徳而恊心端率百寮坐凝庶績謝交代上官正言登車陕右已叨煩使之榮昜部畿東獨竊總刑之寄内愧精神之消耗難勝責任於澄清矧英軌之在前仰絶塵而莫繼已積平生之欣慕更増情契於遵承雖瞻覿之後期有規模之可想伏惟某官富深淵之道學播忠厚之徳名髙文早擅於巍科大節乆崇於要任屢光華於言路惟宻簡於主知識逺器宏實儒林之祭酒智博用大為朝廷之直臣進退裕如中正不撓上心所屬嘉謨渇見於膝前使節外持公論乆期於衮職佇膺異擢用快輿情繼展慶函更陳素悃樂靜集巻十七
