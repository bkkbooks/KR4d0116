body:
  text: 樂静集巻五宋李昭玘撰記陵冢陵冢在城南圗經云即王陵母所葬也案班固漢書髙祖入咸陽陵聚黨數千人居南陽不肯從沛公及漢王還擊項籍陵乃以兵屬漢項羽取陵母置軍中陵使至東向坐陵母欲以招陵陵母既私使者曰願為老妾語陵善事漢漢王長者無以妾持二心遂伏劎而死陵卒從漢王定天下嗚呼聖人不作禮義大壞君子猶不篤於自信而閨門女子之行能勇斷不惑者盖亦鮮矣如衛女之思歸共姜之不嫁其風烈足以悟動衰俗者又蔑然無聞焉陵母生於暴秦之世出於閭巷之賤未嘗聞風人之詠嘆良傅姆戒告之言一旦知其存亡去就之義而引決於死生之際豈非賢婦人耶天下大亂群雄競逐市井氣侠小人望風託附傾貨財棄墳墓妻子冒矢石披荆棘甘心萬死之地而助為刀俎所幸封侯鼎食顯名一世爾及乎禍亂已定束手就戮猶强梁不屈謂失則為賊而犬吠非其主奚不愧於飛鳥擇木之智哉昔嫠不恤緯而憂周之亡齊女見宣王而發四殆之嘆當其禍見於已形智生於憂患何足多也秦鹿未死劉項相持一起一仆謀臣猛士睥睨扵兩可猶豫之間此能隂知其成敗之理而以死明之信可謂賢婦人矣髙祖起沛中委身同患者多鄊閭握手之舊獨張良以兵法試之知其能用遂從而不去較之陵母先知之言猶有間焉夫范増不知項羽殘忍多忌非天子之度而區區與漢争王至其言再不見用乃曰孺子不可與謀奪天下者必沛公也其後疑間一行竟以疽死何覺之晚耶曽意竒計之士不及一婦人悲夫然究觀其情斷頸不辱由無累而明為人指蹤者以私欲害之也録僧恵泉事跡恵泉彭城人住南臺閣子院性孤狷不妄與人交知名士多就見之一與之語落落可喜數親之則拒而不應義學超洽慕唐人為詩得趣清淡淳化初曹彬縁弭徳超之譛出領節制閉閣謝客孫何自京師来乆不得見以詩自誚云欲謁元戎無紹介薛能詩板在雕堂異日登南臺聞恵泉髙槩扣其門一見如舊館於其廬饋勞加厚將歸贐以裘馬後二年何為進士舉首第二人路振官彭門何盛稱泉好義甚篤不求人知振下車携僚客詣焉其徒曰前二日聞公来已㳺二浙矣振留詩壁間曰漢公嘗說恵泉師解講楞嚴解賦詩今日我来師已去草堂風雨立多時至今彭門之士語方外之㳺者多及泉焉浮屠氏法不三宿桑下棄父母妻子如腐泥朽梗斷割支體能忍而不愛若泉之志可謂善行其所學矣嗚呼士忘其所學者不能力行義命之説而養其不動之勇牿於聲利膠於事變顛倒潰亂撼揺煎爍如被壊絮坐叢棘中展轉鈎裂不可復出一聞浮屠氏之說瞪目垂頤恍若夢覺遽欲忘形骸脫世故而翻然與之逰此自信不篤之過矣是猶燕人歸過晉國悲其城社而忘其真先人之廬冢此之謂失其本心亦泉之所笑者也跋秦系詩右東海釣客試祕書省校書郎秦系詩一在南臺懐古堂一在佛殿東唐書隱逸傳系字公緒㑹稽人天寳末避亂剡溪北都留守薛兼訓奏為右衛率府倉曹參軍不就客泉州南安刺史薛播數往見系不肯一過門張建封聞系不可致請加校書郎以傳考之系未甞至彭城今在此有登戯馬臺詩疑其感事託賦不然酬建封之作也比有客自泉南来歸出系詩三十六篇號秦隱君集吕縉叔序其本末與傳粗合傳云東度秣陵年八十餘卒序貞元十六年過丹陽不知所終此差繆異爾系辭意清逺諷而不怨有古詩人之風一時與逰者錢起韋應物劉長卿鮑防耿湋皆知名士獨權徳輿深愛之非所謂大音希聲大味必淡者歟夫山林朝廷之士未甞不兩忘而更笑故纓冠濡足則譏耕釣為亂倫枕流漱石則薄軒裳為䘮我不得不然也若夫道不足興世才不足任物幸㓛名夸權利睢盱於頽波末路間降志愁精而不知悔彼方且杖藜引嘯於岩石之上忘形巾屨而注想雲漢視此輩擾擾盖蔑然矣余嘗讀系詩至於老年唯自適主事任羣兒慨然竊嘆有味其言則知系之肥遯盖有所不為而後去非沽激喜名者也世俗之人猶欲以半通之綬繫而拘之難矣記白鶴泉臨角門外折行而西二十歩有石井曰白鶴泉野老云昔有兩白鶴翔唳而下因以名焉泉舊在老子祠咸平中侍御史趙及築新城限於其外自是泉與祠異處人或不知也睂陽蘇公来守此邦治公之餘抉竒摘古以寓吟嘯初得泉焉味甘色白於茶尤宜以謂雖不及恵山而不失為第三水人始稱之世傳陸羽張又新水記次第二十種多出東南北州之水棄而不載一旦蘇公獨為詮賞而北人不甚喜茶雖知之弗貴也恵山當二浙之衝士大夫往来者貯以罌瓶以籜封竹絡漬小石其中犯重江渉千里而達京師公侯之家華堂錦案招一二貴人出龍團鳳餅次第而烹之雖醴泉甘露不足比名斯泉也棄於路隅人足罕至雨潦浸灌牧兒餉婦驅牛馬負罋盎飲濯其旁七月八月之間草深苔滑蝸螺鰌鮒曳泅自得道上行旅渴不得嘗嵗時逰人過者既乏瓶綆一照睂髮而去䝉煙墜露涵沙浮梗以寒冽自持而不能争名於甌鼎之間良可悲也天下之物貴於近人而賤於逺俗人之常情多隨少執競於羣衆之所趨而不察君子之獨好此幸不幸所從来而其致不能一也嗚呼物固無求於世為士則有義命者也辨戯馬臺城南有山建佛刹其上徐人謂之戯馬臺者也宋髙祖九日登此臺賦詩燕集故事風流至今存焉睂陽蘇公嘗考之曰山石犖确不可以戯馬其南有亞父塜疑即故臺也余少逰濡須過范増墓喬木翳日祠窅無人里人嚴事之後讀大厯中張諲法堂寺鑄鐘記考其地今臺乃鳳凰山以此知塜即臺實非塜也推其附就之始出於小人好勇喜於犯險以夸其氣俗不然騷人逐客據登覽之勝壯山河悲故􅀦借其一弔焉二者之情不同其於狥名失實一也夫弄劍者劒殺之狎水者水溺之吾終不知羽戯馬邪馬戯羽邪當其馳騁自若顧瞻叱咤縱横出沒思欲憑風雲超日月南驤五嶺北踶燕代秣流沙而飲碣石其志亦雄矣故屠咸陽収鉅鹿震讋三軍氣横宇内將諸侯兵三十萬畧河南而西阬秦士卒降子嬰燒咸陽宫室分王諸將如左如右指麾畧定投策故鄉以幸休息而漢王徐躡其後張良隂制其鞅田榮彭越驅逸彘而驚之矍然復起雖蹴城陽蹢躅於成臯廣武之間力殫氣褫乃約漢王中分天下而志局矣至於烏江之困不能加一箠而東謂亭長曰吾騎此馬五年所當亡敵吾不忍殺以賜公噫未之思也胡不曰使我恃鬭忌人謀而失天下者此馬也殺之以祭居巢老人如此則後世君子猶善其知悔焉記殘經南臺古刹有佛書數百巻多唐季五代時所書字畫精勁歴歴可喜按大藏經目凡五千四百巻今所存纔十一首尾可讀者又無㡬也阿含經四巻泰寜軍節度使齊克讓造廣明元年劉漢宏合黄巢侵揚州髙駢按兵不出詔克讓屯汝州㑹許州部將周芨殺其帥薛能克讓懼下叛引其軍還兖十二月巢攻潼闗克讓復出戰闗外士飢燒營以譟克讓遽走入闗勢不能守賊遂犯京師昔王縉相代宗或夷狄入冦必合衆沙門誦護國仁王經為禳厭人事不修而終以賕敗嗚呼將相大臣不能以身任社稷安危而託浮屠氏以生死負天下多矣然辱國喪師不罹誅殛之禍者又何幸也正法華經一巻乾符六年女弟子牛妙音書僖宗既立天下多亂盗賊羣嘯王仙芝揺毒於江湖黄巢磨牙於閩粤荒墟暴骨不堪行路士大夫顧唐將亡竄匿避禍如觸網罟畏死無日閨門女子區區媚佛以自救亦可哀矣大涅槃般若經共三十巻武寧軍節度使朱友恭造友恭全忠養子李彦威也後為龍武都統軍與氏叔琮同弑昭宗全忠亟誅之以滅天下謗此經天復三年所書崔垂休召全忠誅宦官韓全誨刼天子奔鳳翔昭宗初不知謀全忠既至帝怒諭使還鎮未㡬復引兵薄城下惡焰赫然寖逼輿衛强藩悍鎮隂虞爛額之禍進退首鼠莫肯同出一手以扶天歩全忠禍心滋大欺天盗國人共怨怒友恭猶詭情佞佛以厭天下耳目使世無佛則可果佛能報應人則又將欺佛而盗福不亦愚乎毗荼耶雜事一巻徳妃伊氏造唐莊宗次妃初神閔敬皇后劉氏以微賤得立歸賜於佛性喜聚斂貨賄山積惟寫佛書饋賂僧尼而士卒不得以衣食妃為此經豈非畏后所偪耶後有印章曰燕國夫人伊氏盖未進封時所鑄也唐制太后皇后之寳皆尚寳主之未甞用印凡封令書即太后用宫官印皇后用内侍省印而夫人不聞有用印之禮是時兩宫交通藩鎮使者旁午於道而恬不知禁則夫人私自鑄亦不為僣矣按五代史稱徳妃與韓淑妃居太原晉髙祖反時為契丹所虜不知是經何從至也其餘中斷横裂蟲鐫鼠齧雨敗塵腐無復尤綴想夫飄散蹂藉炷燈拭案補壊帷塞屋漏者又不勝其數也釋氏之戒能為人寫四句偈獲福無量心生不信罪抵千刼今其徒怠棄如此何頑頓之甚也不然禍福自人不在於黄藤赤軸之間耶余感其禍亂之迹殘缺之餘因書其事聊寄其一嘆云記劉向冢酈道元水經注云汴水西十五里有楚王山自楚元王後世塟於此凡十三冢皆結石為之今向冢獨在城北五里蛇穿豕齧斷垣破甓茅棘蕭然疑其世非襲封不得與先王之兆域而為别冢故也向元王之𤣥孫以經明行修擢諫大夫蕭望之周堪以向忠直薦於朝元帝懦昏小人比徳許史以外戚干政恭顯以近倖盜權向肺腑之親乃心王室抗危言吐孤憤必欲推拉小人拔天下正直之士在帝左右以清天憲方羣邪側目相與攻詆勢不能支初下獄再免為庶人終十年見廢蕭望之周堪皆被誣自殺向獨得不死而志亦不少衰可謂忠矣惜乎既以身當怨毅然特立不能暴小人之惡揚於王庭以動天下之公義及使外親上變而戒帝無漏言彼所以揣其不足畏而又欲擠之者也當是時韋𤣥成貢禹以經術位大臣不能助善排惡為向明區區之義指以為罔上不道由此觀之為向之言者果亦難矣厥後成帝沉於内嬖王氏専制威福上下之勢將轉衣為裳忠臣良士惴惴懼禍向引春秋變異欲以刼其心而終不省其一二豈言有所未中歟趙氏殺太子國嗣屢絶當此之時因以天性不忍之愛父子之至情引諭禍福指明治亂之漸庶幾惻然知悔焉夫震雷變色作於湏㬰蜂蠆螫手終身戒之何則逺於人者不必甚畏而迫於所愛則惟恐傷之也若向之博極羣書議論不詭與董仲舒揚雄司馬遷相先後可謂命世之才矣於今洙泗之上士多博洽廉靖樂道者盖向之遺風云録張祜詩勝因禪院有王智興詩刻凡十餘篇最後䖏士張祜酬智興詩曰更有柱天功業外李陵章句右軍書智興本徐州牙兵屢擊李師道有功為沂州刺史長慶初河朔用兵充武寜軍節度副使領河北行營朝廷用崔羣為武寜帥羣畏智興難制宻請追還京師未報㑹赦王廷湊諸節度班師智興還羣遣僚屬迎之戒吏士委甲智興斬闗以入殺異已者十餘輩然後謝羣曰此軍情也羣為治装去智興以兵衛送還朝至埇橋掠鹽鐡院刼商旅逐濠州刺史侯𢎞度朝廷方罷兵不能討詔以全節付之祜所謂柱天功業者既已誣矣字畫抵捂如刀筆吏所為詩句淺惡甚於里巷小人嘲調不根之語祜比之李陵右軍又不情之甚也甞讀杜牧與祜詩以謂千首詩輕萬户侯此豈足以輕萬户侯耶唐自元和以後士人多以辭章逰王公之門謂之投巻所幸者大則薦聞於朝小則資以賕貨士之急於人知無甚於此時也戰國之士挟持詭說以揺諸侯一見而為客卿再見而為國相在則令人安去則令人危全城廣地獻於朝白璧黄金將其後較其所得止足以咤怨妻賣仇女後世謂之賤丈夫况夫彫畫章句卑辭斂衽以幸一顧之價而自信於終身其視賤丈夫猶十百也習俗之弊使人如此嗚呼信道不篤喜於自媒能不以美言為禽犢者寡矣說二洪泗水有二洪自城南五里曰百歩下百歩六十里曰吕梁百歩言其長之數吕梁則見於莊子者也鉅野之北衆水合并滙為大澤大澤之水又決為兩支一則北過於汶循齊之右足而入海一則南過於沛走彭城之脅達於淮而入於海由沛而上則謂之泗水泗與汴交流争於兩洪如吐於咽嗌之中怒不得逞此湍險之患也夏秋之交時雨暴集不辨牛馬霜寒水落巨石磥砢如伏鬭士布陣馬水之来也左旋右折而突出於兩翼之間騰踏披揚而出立而睨之股揺目轉疑與之俱飜瀕河之人狎水如陸御舟如馬習於疾徐上下之數挟以専利行人往来一聽其可否之說少不當意則操篙却立負絙鞭牛而不顧其用情酷矣景祐中李文定公遇水大涸起徒千人火烈而醯沃之批以巨鑿而排以飛搥雖不能盡去其害而勢亦少洩後之議者必欲行公之志使之湠漫安流而後已此迂論也夫泗之為水若江漢之有源也㳺而無節則不數晝夜而竭安復有舟楫之利哉人且車矣夫天下之事有人力所不能争者皆天也世俗之人必曰前人所未至而天下之智無昜於我而力為之其克濟者鮮矣自古功名之士好為竒智拂天下之公是强所不能以成其私欲未能以三為四而其末流卒至於大壊不救由是觀之莊周塞聰攦拍之論良有取也録徳宗詩唐徳宗賜張建封詩皇太子誦書在太守治事堂之東貞元四年拜建封徐泗濠節度使以備李納十三年朝京師帝不待日召見延英殿建封賦朝天行以獻將還帝賦詩以餞之即此詩也徳宗性猜忌諱過愎諫甘心姦䛕用盧杞為相賊殺賢士大夫流毒于民天下側目欲食其肉猶曰我未見其姦邪其狠暗可知矣奉天之難大器㡬覆殘家破國出於心寒股栗之餘深自懲創始行姑息之政優恩曲遇如撫藉兒女欲以結强臣悍帥之心而方鎮日益怙亂唐之威令自此微矣建封以忠力自明寫情帝側故歡然眷與動其忠槩親製其辭文使儲后書之可謂異數矣然自貞元以来忠佞不分誅賞無信予奪不専於天子其失民心誤天下非一日也四方幸亂兵拏不解四凶二孽煽禍相戛朝廷出師問罪如持三尺箠行羣虎狼中既驅於前已攫於後豈建封一手足之力所能捍哉觀徳宗初用陸贄於艱難奔播之中能聽其言引過自歸以謝天下故詔書所至武夫暴卒無不感涕毅然宣力戡復之功贄有力焉及事平之後蔽裴延齡之讒遽欲誅之其忍戾不仁如此反欲以方尺之紙膚革之言以起天下之義心芟除根柢之患固已難矣嗚呼自古君臣相與之際無漢髙祖之大度光武之赤心唐太宗之知人猶以功業望人者雖行道之人猶不信也樂静集巻五
