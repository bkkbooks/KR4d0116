body:
  text: 樂静集巻九宋李昭玘撰問黙莊周曰道無問問無應然則即理而問則問不在言即物而應則應不自我此之謂無問無應而問黙所以作也思𤣥先生僻居離羣不誦書不應賓客不呼奴𨽻不叱鷄狗坐如寐立如齋行如有所失而未得㞐三年門無車庭無屨人皆怪而莫敢過有客升其堂扣其几而問曰先生何為者也先生支頤自若客下堂三呼而三招之先生㗳然不顧客將去為之歌曰明者塞而智者迷哀今之人兮似是而非先生矍然而起不待納履竭蹷而追之曰吾居三年口未嘗言而心之所潜意之所至畧自得於成心矣若夫逐者之闐闐聚者之讙讙故不能挫吾精而敗吾思今子反以為似是而非子猶有至道之精挈我而上趨邪將強聒迷繆而過詆我耶客曰吾嘗相先生之形左耳目聰明而右耳目不達殆非隂陽不和而有偏傷之患先生幸以嘗覩聞者告我我因藥其傷而起之先生曰甚矣人之多言也言不若黙黙而識之是謂大得故天無言聖人欲無言一言以為彼二言以為此三言以并彼此道未嘗有彼此者亦未嘗無彼此也各操而議之果奚在夫言之一出至於三言而未能定則是非之相雜愛惡之相攻復㡬千萬言而後已言之愈煩離道愈逺使天下之人沉偽而失真摭華而去實者言之罪也噫言之為患已甚而又悲夫言者之自害也南方有羽蟲利喙而善鳴鳴亟益哀咀血而死北方有介蟲服氣而善息至潛而不躁其夀千嵗今夫嘵嘵之口馳心氣而擢精神撓静淵而洩和理反以害其生則吾之黙黙者豈特畏罪哉亦謹養吾生而已客曰先生可謂能黙者也夫以言為無累邪言多則數窮以言為有累邪言雖滿天下而吾道寜䘮天地之於萬物也雷震風鼔雨流川激百獸以羣嘷昆蟲以類鳴有形之相磨有氣之相觸未甞息也然則太空寥然至虚漠然又何累焉故有道者無所言無所不言終日言而非言終日不言而亦言其於言黙也奚擇浮屠氏號為居士者問其徒以不二法其徒解析連類操三十二說以獻謷然不答而三十二心皆化不害為能言䝉人學老耼者著書數萬言謬悠之說無端涯之辭連犿而無傷恣縱而不儻稽之無度逐之無宿不害為能黙能言而不能黙能黙而不能言是乃據道之一偏而非夫泊然大通者也射者之惡蚊䖟則志静奕者之思鴻鵠則志動以静對動則静者勝然域於静則失也古莽之民善眠故多息阜落之民常覺故多勞以息代勞則息者勝然狥於息則非也今先生能黙而不能言猶拘於所域而蔽於所狥是以有偏傷之患而不足於冲和之氣以吾觀先生之不言殆惡夫與物争而先生之志猶未出乎争也有人曰龜長於蛇白狗黒犬可以為羊雞三足此形色名數之非其實者也茍知天下之物不出於形色名數之異則天地之間同一物耳不足辯也故横心之所念横口之所言亦不知彼之是非利害歟亦不知此之是非利害歟如此則七竅流通百體俱融尚何鉗吻結舌閉心一氣譬猶食未下喉噎不得吐如此復自快耶至人之出言也與物去来隨起隨滅如鳥度空如風過物可見而不可逐可覺而不可執方且趯趯然從其後而掇之不亦惑歟先生曰子之說然矣是言猶黙也黙猶言也敢問非語黙之時孰辨曰吾智淺意迫不能知請詢之黄帝孔丘先生曰黄帝孔丘今亡矣將焉問客趨出先生頷之而不謝書鄧先生石几先生避地者也不以世故累其心人亦未嘗以所狥而干先生之好低囘隱逺以自完潔不願聞乎時時亦不知先生果何人也城隍之東北其地阜以髙先生即而築居焉葭蔣蕉蓼之披折鶖鶬鳬鶩之上下乃數十年之廢墟先生不以荒汚窮僻不可居也覆茅為廬四面環堵鑿户如竇傴僂而出入不闗不鑰無食器無卧榻席地而坐隱几而觀書草深苔滑蟲鳴螽躍斷人足音人不堪其陋先生幸是以遯其身未甞厭也一日先生出有盜過其廬弃書掲几而去先生曰吾不逰井里不受聲利是非之束縛榮辱之陷溺富貴之侵忍權門之凌咄吾逃之乆矣而盜不容尚何遯吾之窮也夫盜之取吾几或售而食或析而炊吾不知然盜生扵所利利生於所用埋黄金於地下不若瓦棺之能乆無取於利故也吾今琢石為几堅厚重大絶臂不能移以利則甚賤以為用則大迃吾庶㡬保焉以是語天逰子天逰子應之曰先生以昔之有所利而不可保過為堅厚重大使不能移先生慮則勝矣先生之跡未免為誨盜也天下之物適来適去行流散徙不可捉而有也故逹道者賓之而不主得之勿喜䘮之勿悲先生不能隨物去来方且強梁去智而與物争吾恐先生不能遯而猶區區為盜者守也壑舟之藏其下千仭勇者或負而趨之則物有所不能固北山之險其上九折愚者必墾而平之則力有所不能屈今先生固我有以屈人之力吾是以知先生未免為誨盜也先生姑無其几無意其存亡適為几之義以達之於性命之際庶㡬有所有而萬無䘮也几之為器凴之以安石之為物置而不動先生憑而安之且不動也由是外觀萬物之芸芸内觀一性之明妙則知天地賊我隂陽奪我亦不甚毒耶先生㝠是心以超乎天地隂陽之外虚而遨逰雖萬變迭陳乎前而湛然常寂是几也流落乎千載之逺或為柱下礎或為塚上碣霆震風折水泐火裂塊而礫虀而塵㑹歸磨滅亦不足以䘮先生之所存又果可為先生物哉跋閣本法帖太宗皇帝治定餘暇逰意翰墨甞遣使購古帝王名卿墨帖集為十巻詔鏤板藏禁中每大臣登二府即賜焉嵗乆寖不復賜元豐中嘉王嘗從神考借其板模拂㡬百本王府官盡得之士大夫間亦嘗見一二初長沙僧希白再郭填刻石河東潘氏御史劉次莊又作别本識者謂希白善書不甚失真潘復昜次間以他書御史所模尤疎濶夫獨前者縱學歩者拘因人之迹而又加意焉則目亂而心疑神已虧矣故終不近也天下之物亦有以偽冒真者亦不能與真並行盖有公是存焉自此尤以閣本為貴跋三代款識篆𨽻出而正書作正書作而行草興非獨古異以為竒亦所變之勢然也字畫之工初盛於魏晉魏晉之間江左惟逸少尤著世數遼絶散落腐壊之餘出於物數之幸存日力之必能保者時一見於好事之家良可貴也昔韓退之作石鼔詩以為俗書失之姿媚亦至論也紆餘鮮妍粲然動人無復髙古之遺態此姿媚之過也余故以三代款識為諸帖之冠嗚呼冠劍丈人朱鉛女子難以並觀狐裘純儉或作約又作白繡衣粲錯不可同笥而進識者自有别矣士固有陋古而排獨好者亦未昜曉也一作士之學道不能自信陋古而變其所習以排其衆人之好君子不道也跋東坡真蹟昔東坡守彭門嘗語舒堯文曰作字之法識淺見狭學不足三者終不能盡妙我則心目手俱得之矣觀其用筆凌厲馳逐出入二王之畛域而不見其轍迹晚年獨與顔魯公周旋並驅而歩不許退也長牋大幅風吹雨洒如掃敗壁十目注視排肩争取神氣不動兀如無人譬諸解衣磅礴未嘗見舟而操之莫知為我莫知為人非神定氣閒孰能為之必曰三折為波隱鋒為㸃正如團土作人刻木似鵠復何神明之有跋郭填諸帖余嘗讀張彦逺法書要錄載二王書猶有四百六十餘帖以今所存考之十無二三此模書不可廢也陶隱居曰郭填蕭益曰響榻人空郭存聲散而響未闋故蹤餘韻歴歴可據慰人多矣蠒楮弱薄一出囊笈則沒身朽壤初因傳模後来者傳窺其髣髴與夫為去臣鑄金與亡國繼絶盖有不忍之心存焉智巧之徒㸃漬穿缺綴以印章年次欺衆人之耳目不知而受者徒為人發笑知而受之又挟其欺以迷世榜牙冠玉襲以文錦冒好古之名掠人之好已復何心哉跋孟仲寜畫蓮社圗舒城李伯時作蓮社圗士大夫傳以為佳玩謂可與輞川並馳潁川晁无咎復得遺意頗加損益集古名筆以緡工孟仲寜為之曰可曰否如左如右獵竒擷妙變化隨出雖摩詰復生恐不能過也夫意之所詣為難了人之意亦非昜伶人吹管假工捻竅直肆横出抗厲厭抑終不如律使其心運指應皆與神㑹則無不諧矣古之任事者嘗患不得其人為用用或非其人故余於此畫特有取焉耳跋石曼卿詩後右石曼卿詩三篇為侍御史髙公作也髙公初自御史以言事忤丁晉公出守淄川天聖三年擢户部判官坐試進士擅不如格左遷監兖州酒三年復官知單州時曼卿為濟州金鄉宰馳此詩寄之髙公志大氣剛學貫今古論天下事有理勇于自任雖屢謫逐志愈不屈文章雅重有法度作詩務髙古語健而志深一時望人也曼卿以豪偉自許獨深知其為人執弟子禮敬事之其詩引賈誼韓愈杜甫以見不得其志才不下古人區區冀復用以發于事業以此觀之士君子氣節相與又不可茍合必欲致身於功名之㑹惟恐汩汩以死非特言辭取悅而已未㡬髙公再入為鹽鐵判官屬大河決澶淵乃疏利害議者不喜罷去知陕府卒于官後十年曼卿自海州通判遷祕閣校理上書陳西夏十事不報既而元昊犯吾圉邊邑騷動天子稍思其言方試一事不幸病且死嗚呼髙公終身力行而三躓曼卿纔一進武而遂殞厥身竊讀此詩良可歎云大觀戊子仲秋朔樂静堂題書六逸四暢畫本世傳四暢六逸畫本人物清肆不類世俗多以此愛之六逸者或以謂嵇康劉伶阮籍之徒四暢則不知奚人也觀其氣度超洒以琴書相逰囂然有傲世意其亦晉人之流乎啑者引仰鶴飲而橋顙爬者跼蹐鴟蹲而捉膝拊背者據杖而伸足剔耳者目駐而心凝壅閼既攻竅户流通痟癢既祛肌絡皆充如噎得吐如跛得走如川決防如馬脫羈猶未足方其快此四者之暢也既醉而歸日暮牛飢鞭之不隨偃蹇將墜扶者不支欲跨而竚頽然無所據奔驢駭御童子挽繮却顧後者擁之而不去二人者醉也斟酌俱適中褊不適彼罇既空欲辭莫得二人者將醉也吹竹為歌以相侑酬舉手抑耳請竢曲終二人者飲方和也解衿擢帶脫履墮帽禮法所不能禁君上所不能使以天為掌以地為塊以日月為跳丸以生為衣中虱以死為南面樂寒暑晝夜罔有知覺深觥大斗日以濡口飛鳥不瞬疾雷不驚昏昏冥冥我將何營雖祿以天下爵以人主無以昜其樂此六者之逸也吾不知四者之謂暢果固然邪果適然邪有役人焉日夜馳負勞形怵心皸足胝手食不充口卧不并睫一旦休其作程藉以筦簟飫以粱肉百體既舒屈伸自足其心愉愉莫知所得吾恐彼以為暢者正類是也吾不知六者之謂逸果無徇邪猶有徇邪有狂者焉惡聞人聲不願見色蔽目厭耳逺去塗巷謂人曰豕謂居室曰牢筴謂身曰囚謂衣冠曰五木散髮徒跣曠野而走吾恐彼所謂逸者正類是也夫未能忘形奚所謂暢未能忘心奚所謂逸形忘者無時而不暢心忘者無事而不逸是道也語不能傳意不能至惟天樂而神逰者知之尚何感通塞於形骸排夢覺於柸杓哉彼數人者居相從坐相觀視天下之所得無以昜我者固不知出醖甕而有大天地舍斗水而有無津涯之江湖方且㝠㝠而飛相喣以濕亦可悲矣夫可悲者既甚愚悲人者亦未為智吾乂安知不有悲吾之悲而不自悲者哉噫民之迷也固已乆矣戯答閻子常悲墨寂宴先生畜陳唯進墨乆矣一旦李子挹之而去先生悲墨之不還也作詩以追之李子有辭代墨以對曰魯人陳𤣥敬告先生先生保我㡬三十年䝉埃如煙零丁壁間萬金之璧猶不昜焉上書公車移文北闗俯仰前却㑹無一言愛而弗用莫如弃捐遇我何疎鄙我何厚𤣥圭不完漆身日痩縱飲一升何補藜糗歸乎歸乎不若為李子之夀書筆工王玠東州筆工視他䖏為最勝前輩如睢陽元道寜曹南屈士安金鄉韓振營丘梁道皆為士大夫所稱近時彭門出一彭嵩與數人相先後今已亡矣惟鉅野秦穎丘自然工雖不同各有妙䖏比又得單父王玠製作精宻已與時流並馳而獨駸駸未已也唐人多善書疑其用筆亦各自擇如顔魯公之端重栁河東之峭整歐陽率更之遒勁虞永興緩而不弱褚河南清而麗李北海楷法好為卧筆沉江西行書正出懸腕隨意作勢自成一家故善造筆者唯務識人意乃能盡妙樂静集巻九
