body:
  text: 樂靜集巻二十四宋李昭玘撰濟州天寧請觀禪師開堂䟽諸佛以因縁出世我法以方便為門發菩提心行本願力六度萬行如筏濟河十地三乘隨根得雨惟生實相無佛衆生合寳綱珠光光相入盡大地水滴滴同歸從無始已來為一念所染波生海濁塵落鏡迷顛倒色空流轉生死乃至大疑未判小智自私趼足山溪腐脣貝葉萬里尋天竺國窮年轉法華經未離妄想情塵不見本來面目有右佛子為人道師不由心外千開直指言下一路金箆刮膜更無隔地懸天黄葉止啼祗在拈搥舉拂方今聖神紹述海宇熈平共傾臣子之一心願祝君王之萬壽徧闗梵刹大暢宗風兼收善利之功永作無疆之福恭惟觀公和尚惠林麟鳳覺路梯航携隻履以遊方警紫雲而駐錫頋惟敝里乆仰髙風薝蔔花開欣逢此日醍醐味羙未副夙心伏望憐惻有情敷揚妙㫖登師子坐作海潮音華亭手中篙臨濟坐上喝衝風巻浪送巨艦於長川强弩發機斃群鹿以一箭然後雲收霧散同觀自在之天虎嘯龍吟競唱太平之曲聖君賢相長轉法輪百辟庶民供依福地毋懐謙黙幸副懇祈天寧請化老住持䟽逹磨傳心特來震旦曹溪得法終返南州各有因緣共成契㑹化公和尚辨才無礙行業素髙駿馬一鞭萬縁俱斷寳花纔出四衆同傾揚睂大振於宗風隨器盡霑於法雨間遊京輦暫寄叢林黄檗清凉須垂巨䕃牛頭氣象為指真棲永懐佛祖之恩不忘父母之國某乆沉迷網夙乏利根幸枌社之相依愧潮音之禾接老之至耳敢逃抱足之譏聞斯行諸猶希刮膜之賜天寧請首座賛直傳法開堂䟽伏以雲出岫以時行終歸無住火傳薪而迭照本自相生天寜和尚系出黄龍化流上國錘鑪不倦夏臘寖髙坐却天下舌頭養得窟中獅子將忘言於宴坐毎寄相於中林授此信依囑吾嫡嗣大川得濟舟楫方閒利劍不呈煙塵俱息首座大師求心無墮見道不疑胷前猛得一椎豁開宿障肋下連遭三築唤出菩提既從這箇了知當與大家受用比者寳憧圍繞香象奔騰共看出世機縁必有驚人語句莫但掲眉展手戯弄學人便應刮膜開光通流祖意儻許尋蹤見鹿寜辭立雪齊腰多生曾是作緣此日定求得佛大空法界從初不限東西無量度門何處獨無能秀願垂悲濟永脫迷流普集妙因上崇聖筭同前伏以空性不遷法縁無盡求佛得佛故葉葉相承以心傳心故燈燈迭照不住常住是無非無窺索根原必自思維外入流通消息終由語句中來雖諸聖有情如人父母而一言不契非我子孫天寧和尚臨濟别支黄龍髙足自曹溪而下薝蔔同林留滄海以西麒麟一角疚心搥拂注想雲泉須要猛脫閒名未可輕論法器千人衮衮罕逢入闕將軍四句惺惺獨有當春獠子首坐大師乆親巾錫夙悟機縁曽經虎口捋鬚奪得钁頭在手不待三敵入室便能一㸃成金直透重闗更無遺照比者宻傳空印親奉法衣掛皎月於髙臺鑑洪鍾於廣坐師子出窟百獸吞聲馬駒踏人千里無跡十年趺坐不將拄杖它遊一日花開真見老婆心切自昔張弓捉箭見敵横行從今劈浪鑚風看師自渡伏望以自利利物以先覺覺人開無碍門唱第一義庶使隨根得潤見指知迷上去階梯既許承當大事後來津濟莫教辜負宗門願憑佛子之因共作聖人之祝金輪永御髙視泰平法界無邊一歸清淨樂靜集巻二十四
