body:
  text: 樂靜集巻二十宋李昭玘撰謝及第興能而出治雖先王本俗以教民有徳者必言故近世攷文而取士發於里選簡在帝庭暮辭褐博之卑朝餙青緺之貴聖人由是而政立君子資之而道行豈宜承學之𤨏材冐厠諸儒之上列恩深渙汗愧若負芒嘗聞欲治之君以得士為難非常之材必待時而奮合謀以計其事兩作以繼其明惇徳允元二帝襲衣裳之化尚賢絀惡三王同道徳之歸九官􅊀而百工釐八政齊而五士舉作人以東序西序辨志於小成大成論然後官無假人之名器教之不率有移化之郊鄉後世失教育之方學者䘮艾淑之實天地之全既缺性命之理益微操守不經繡已加於鞶帨童昏益亂巧尚弊於雕蟲於皇我朝奮越治古方大明嗣服之始寔百度作新之時發揚聖論蕩斥末學神竒出而臭腐化糟粕棄而醇精流飬成材於浸潤之微成德性於髙明之至近觀之則言行斯富大用之則禮樂可興自昔所難於今為昜鳶飛魚躍莫知鼓舞之神雲翔風從來格光華之㑹如某者器唯物小性匪近中論世讀書嘗慕古人之逺遊心竄句尚迷俗學之迂加之禍患侵陵事為􅆾忤三人行而二人惑欲往何之一日暴而十日寒所存能幾以謂否必有喜窮當益堅幸留涸轍之軀復鼓敗軍之勇類陪嵗貢再踐春闈偶中藝於下陳旋奔哀於故里生無以養遊者何追禄不逮親仕斯可已度餘年之殘槁憫衰系之飄零勉奉寛恩朅來上國平日寡彈冠之援髙門無曳履之遊術本甚踈誰恤不龜之藥義難自逹耻為躍冶之金接武掖門觀光黼坐觸神遊於感忽奉清問於雍容心目雖明氣辭幾困少年而動文帝固慙賈誼之才徒歩以見太宗竊感馬周之遇各使發言而觀志僅能引古以議今盈溝之雨昜窮暴日之暄奚補既乏甚髙之論但虞無赦之誅舜用五臣盖盡至精之選羿虧一矢遂無必中之功尚優片善之求過預六人之列量材匪稱戴寵若驚此盖伏遇某官大雅存心至誠格物知識足以發天人之藴聞譽足以為邦家之光才富而若虚登髙而善下憫不能而如已無求􅊀以與人過致繆庸輙承甄採敢不行其所學不忘蚤夜之思慎乃終身少答生成之賜過此以往未知所裁謝舉幕職此者特預薦章俾升幕佐名非實副感與愧并嘗聞人雖病於難知士亦羞於詭遇謂能脩其身則天且不廢茍自信以道則世誰可輕如玉韞匵以何沽況珠在淵而必媚所期非速為趨每髙或片言而推其器識之優或一見而許以公侯之貴盖去就之有守在賢否以甚明故時無滯才朝盡公舉惜乎風流既息古義寖衰蔽是非之實以愛憎攖榮辱之情於得䘮霄漢扶持之速跬足三公塵埃排擯之餘蒼顔斗粟至使名身兩役物我更持氷炭裝懐夜忘卧夢風波駭目日起志憂甚者巧希合於情先閉險深於迹外邯鄲善歩壽陵爭襲其趨螗蜋據蟬黄雀已窺其後笑窮通之有序矜富貴於昜煤千里坐期一跌隨廢如某者生而寡見長則数竒趨時雖願於激揚學道每傷於遲後四百年之傳序世出聞人三千秩之故書家無别橐引屬簮裾之列來游翰墨之塲見舟即操往焉無懼取蜩猶掇頋者皆驚兩綴賢書再丁家禍哀餘生之殘槁擢一第於淹回尚憐垂翅之窮猶有搶榆之决然而上京雄觀羣俊並驅談落落以相髙意僊僊而欲舉自惟推賤分取棄沉何期舊學之拙迂忽誤近臣之論薦職之鄉校編以儒林脫敲扑之喧囂屏簿書之倥偬弦歌終日酣味六經少釋為貧之憂終懐浮食之愧加以服大人之餘誨感末路之多虞益知勢利之昜汙未見紛華之少樂不肯碌碌與時太踈何為區區頋影自笑每欲玩林泉而佚老擷杞菊以茹饑放浪形骸優游嵗月向子平之家事猶累素心陶靖節之吾廬但馳去夢遲遲斯乆忽忽未遑愈深必退之思無復儻來之望敢希孤躅輙動上官憫其矩歩之勞挈以循階而進此盖伏遇某官至仁兼愛大雅不遺以長取人由恕及物傳鳴鴟之羽翮文斷木以青黄必使接天衢之遊庶幾成宗廟之器量能非稱荷賜過優敢不厲終身歸潔之心慕古人特立之義老將至耳未甘四十而無聞學恐失之尤愧寸隂之可惜誓堅素守上答明知謝舉太學博士伏䝉保舉充太學博士者天子辟廱之地盡集時髦儒林師保之官屢先宸選頋惟淺陋可復堪任如某者嗜學太迂賦能俱短奮壯年之精銳擢一第於淹回尚隣黒髪之未凋自許青雲之可致以牛捕鼠鈍不適時縁木求魚勞非得計碌碌衆人之後遲遲行路之間璞玉既非徒使盧胡而笑國能未就殆將匍匐而歸重以筓冠相仍松楸未卜瘠土寡粢盛之奉弊廬多風雨之憂弟兄役役於賤官饘粥皇皇而卒嵗低回薄禄僶俛寸心詎能忘流俗之情何足語丈夫之志聽南枝之啼鳥潜感星霜覽北山之遺文空慙雲壑嘗從大府猥在泮宫人皆謂之投閒巳獨知其非據襃衣布坐每聞弦誦之鏗鏘黄卷滿前為異簿書之倥偬養口有便便之飽動人無赫赫之功但容一日之可居奚論十年之不調而況上官旁照雅意過優羅觴豆以相娱裂牋縢而更唱有如此者不亦樂乎敢期翦拂之私更􅊀薦論之列此盖伏遇某官至誠無間大徳有容與庶物以為春耻一夫之失所芝砂並用初何與於豨苓鼎爼既盈猶不遺於雞肋賜出仁人之愛感深國士之知藏之中心誓以沒齒假鈞弓於羿手固無百中之期譽駑馬以龍媒已増十倍之價敢不明去就之有守要終始之不渝庶幾激昻少答知遇謝館職落筆玉堂之上僅綴千言振纓冊府之遊濫陪群後論說無本文辭不工序當今可舉之政事則未究大綱考先王已行之法度則不閑古訓訖無可録退有後憂豈意江湖納汙川流一貫龍蛇啟蟄蠖歩同伸雖幾去而復收終以榮而為懼惟天禄石渠之故事乃皇墳帝籍之所藏或出於秦人煨燼之餘稍見於沒塜斷殘之後書尤難於盡信史已甚於闕文寖潤諸子之異同頗識古人之章句詳延沉雅分命訂讐焕爛遺文上占東壁凌馮危觀古謂蓬山坐尤廹於帝居人或夸於仙去多士願聞其推轂名臣軰出於此塗由漢則子雲劉向以經術􅊀員在唐則九齡房琯以辭章入侍故博洽名家之士萃聚乎東西兩京太平儒術之功浸淫乎數百餘嵗得人甚盛曠古所無國家累聖紹休生民底乂囹圄空而爼豆布干戈藏而鐘律修百度可觀皆博士儒生之論四方求獻多山嵓屋壁之書永惟英皇對越治古謂取士必先於素飬詔大臣各舉其所知一新東觀之討論樂得英材而任使遺風不講幾數十世之相望引類並興以二十人而聞上一時名徳之盛落落相髙于今侍從之華班班可數規模良逺典故具存天祚真人日熈庶政躋世於安寜之域作人以忠厚之風正臣進而群枉之道消徳意孚而不肖之心化股肱一體既丕式於老成諒直多聞將旁求於新進丁寜細札祖述舊章使棲遲涵泳於圗書翰墨之林以滋長成就其髙大光明之器盖楩楠杞梓須千尺之幹珪璋琮璧非累日而工必與之以追琢其章亦漸之以雨露之潤然後薦丘壇以交神明之貺壯宫室而除風雨之憂豈徒然哉所用如此若某者生而非敏壮也無聞學淺鮮而不根氣萎蕤而昜涸英華無㡬局韻大拘既未能赫赫以動人固不善盱盱而狥物以牛捕鼠鈍不適時縁木求魚勞非得計碌碌衆人之後遲遲行路之間幸從庠序之外官不廢絃歌之舊習家有一鍾之石篋無三上之書乘鴈雙鳬既不闗於多少大鵬斥鷃亦各適於逍遥何期近弼之誤知過以不才而應詔徬徨捧檄踧踖振衣為逢極治之朝庶逹敢言之志而舊文卑弱空驚賈誼之過秦素譽寂寥良愧陸機之入洛家幾索米門寡曳裙待漏赴朝懐鉛就席感嘆紵袍之故態頋瞻金馬之盛遊下筆不休乏傅毅屬文之思令人忘倦非馬周論事之才雖鈎攣綴拾以成編終底滯迂踈而可笑畫地作餅何以療饑曝日獻君未為知術尚䝉採擷不即棄捐驅蹢躅於遼東竟無他異望騰驤於冀北猶踵後陳是何異綴魚目於夜光補狐裘以羔袖既􅆾准度有誤題評此盖伏遇某官道徳在躬聞望超世契光華之盛旦見事業於有為文章博洽而不以窮人器質渾厚而樂於成物致兹末品亦預同升所願讀書陽城猶喜於從吏未能成賦左思亦幸於為郎而況大君深切之訓詞近侍雍容之知遇實英俊並遊之㑹方朝廷有道之時戴白之老畢世而再逢窮巷之士動心而竊嘆羙意不輕於樂育終身敢薄於自期固當澡雪滯昏鍥磨頑魯黽勉平生之志激昻君子之風不獨丹鈆㸃勘之為工必使事業語言之可用老將至矣寜自廢於聖時行或使之冀少伸其素宁代庭玉弟謝吕大資舉縣令量材非稱撫已増慙嘗聞人實難知士非昜遇言非可聽仲尼猶失於宰予君遂不來孟子卒排於臧氏盖乍賢乍佞如山川之莫測一用一舍譬霄壤之相遼故聖人窮理以盡觀物之明志士感知而輕殺身之報不敢忽者是非之智所尤難者上下之交而況自五十而知命則始可與言去就之方非三月不違仁則未足以見始終之操富貴紛華之外慕窮愁怨忿之内攻持以兩端頋中流而俯仰半於九十厭末路以低囘將必保其窮年詎輕掄於精鑒至若塵埃蹇歩蓬藿孤生懐羙玉以待時望青雲而引睇平日寡遊談之助滿朝無曳履之容絶絃未卜於知音投筆忽逢於按劔澤邊散髪誰謂興嗟轅下長歌幾成感泣故自昔重功名之際謂相逢非旦暮之期惜乎古義既凋餘風益薄一諾稍輕於許可衆人争効於馳趨詭譎不情囂浮昜䘮見利忘義遽操射羿之弓枉道事人翻作吠堯之犬或前恭而後肆或昨是而今非能聲暴著而毁議已喧章墨未乾而按檄隨至末流及此來者謂何共觀覆轍之危益起吹虀之戒自非行義夙著志道日脩磨不磷而涅不緇窮益堅而老益壯則何以仰干品藻過被奬提有如此人未覩数軰若某者器惟拘小才不逮中早霑世禄之微勉踐儒衣之素簿書尤冗徒汩汩於賤官饘粥未充毎皇皇於卒嵗殫才駑短甘志捐驅拘小邑之僻迂念孤蹤之眇末潭潭府宇屢傴僂以趨庭兩兩台躔悵熒煌之在目既接以徳容之盛又飲以言教之和終夜以思未識自脩之漸三年一眄敢希與進之優乆俟譴訶轍參論薦感恩幾涕拜寵若驚此盖伏遇某官道徳在躬功業超世以勞謙而下物由内恕以與人大冶既鈞不遺於頑鑛春陽一育無間於寒根敢不勤畏簡書日嚴撡履慕古人特立之義勵終身歸潔之心少副所聞仰酬大賜過此以往未知所裁代謝薦盖聞先王之時公卿大夫相與進賢拔善者既不敢蔽其所知閭巷賤士所以致身託名者亦不敢昜其所守薦人於朝與衆共之非挾於私恩也彼以道焉見知於上由已得之非矜其幸進也吾有義爾故賢與不賢自乎人而朝不沽薦士之名得之不得尸諸命而下不爭施我之惠此三代所以直道而行也逮乎古風凋薄流俗競奔操權挾貴之家無恤於狥公貪得鋭進之士不羞乎詭遇同乎巳則終日而再遷不同乎巳則窮年而不問見其利則一揖而競進未見其利則三巳而復來所取或非其人所得不由諸道意相與者必曰每聞其某氏之子勢可籍者必曰願出於我公之門由富貴之使然宜情狀之乃爾其或義不遺於公舉禮無失於自媒在昔所難於今能幾如某者受性凡闇與時迂踈素無王公之遊粗知義命之分僶俛寸禄低徊末塗固知其才不過人所幸者困以寡怨但甘屏黙敢冀薦論伏惟某官内推恕心外示寛徳樂至公而與進操古義以自期不縁左右之言借以吹噓之力憫其孤弱俾遂遷升非獨小子之愚可當竊為東州之士相賀昔羊祜之舉不容私謝孔光之薦嘗恐人知頋惟鄙心未敢忘報寸隂可惜誓不墮於素脩駑力未殫庶益勤於來效又代謝薦伏䝉某官保舉某充職官任使者從命指呼慙非强給上章論薦過荷陶成雖大人推博愛之心而不肖有過情之懼省循非稱感激無窮竊聞知人之明自古其慎驩兠之凶有容於堯舜之世宰我之辯或取於仲尼之門在聖智以為難豈尋常之可忽故先王之法必試其所譽使百官之屬各舉爾所知行能皆中則得好賢樂善之稱品藻一誤則蒙罔上不忠之罪然猶在位者以誠明相許為士者以名節自髙進無待於私言退不容於來謝迨乎士流冗濁俗習競奔羞隠阨而幸功名惡貧賤而邀富貴邪柔多與浮詭不情語言和厚以昜親趨歩周旋而可喜僅獲一辭之舉益加百拜之勤厚禄稍充素脩巳惰術既成而反思射羿利所在則不恥吠堯謹厚者輒以勢驕潔白者終於墨敗斯皆物移所志勢害其才固宜推轂之心必有吹虀之戒彼哉奚取來者益艱自非操致逺之資曷足千盡公之鑒伏念某器能淺狹性識顓愚學未知方仕將為禄乆承弓冶幸家法之猶傳勉視簿書豈民情之素習適緣初宦託在巨庥去其體貌之尊進以父兄之教切勤佩誦粗免譴訶復噓奬於吏勞俾參榮於幕佐發揚有自感勵不忘此盖伏遇某官大徳有容至仁無間憐不能而如巳無求偹以與人文朽木以青黄之華傅鳲鳩以羽翼之助將從𤨏賤漸致激昻敢不夙夜在公始終一節慕古人之行已勉循吏之愛民立事立功遽敢言於今日非禮非義誓不辱於終身惟允蹈於所聞庶少酬於洪造代謝改官觀其為主進身者豈昜於知人舉爾所知為上者亦難於與物盖非義不合以道泛觀可否在我而不蔽其心窮逹自天而一尸諸命逮夫名實不立風俗浸衰視聽悠悠不斷於是非之際情為擾擾必爭於得䘮之塗至有迕風多推附火先熱蘭子之劍適者歡心東郭之竽不知濫吹雖出愛憎之素昧未成利害之相攻其或巧言如流素書盈束幸韓荆州之一見借郭有道之片言髙談則自謂退藏大致則求為容悦淒酸昜感僅猶躑躅以悲鳴嫵媚不情何異盱睢而獻笑斯皆學術失守氣節不剛間有風波之民莫測山川之險合三言而成虎凑一隙以沉舟甚則蜂蠆起懐豺狼當路狡兎未得韓盧爭先螳螂方休黄雀窺後斯人也何所取爾為士者不亦難乎如某者少則甚愚壯而寡與棲遲末路蹭蹬累年再領簿書嘗懼勾稽之失一臨民社敢言撫字之勞所願者惟畏法而奉公自信者不罔民而病物訖無顯狀輙玷誤知挈短歩於禄階脫一飛於選集陶成有自感服知歸此盖某官大徳有容至仁樂與傅鳴鳩以羽翼文斷木以青黄使之物有成才器無近用致兹寒陋稍預遷陞敢不慎守官箴益脩徳履不為俗吏之效勉蹈古人之風貴不可求敢妄干於寵禄志須有立庶少濟於事功樂靜集巻二十
