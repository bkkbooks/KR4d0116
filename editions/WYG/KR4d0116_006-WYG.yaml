body:
  text: 樂静集巻六宋李昭玘撰濟州真武殿記北極大帝位紫微垣左右四將真武在其序明威正一實帝之司殺者也按太上真武經元始天尊於上元天宫說無上至真妙法時魔鬼流行横毒人命幽寃之氣上䝉天闗有北方大神將號曰真武能以正法祛攝邪厲即以符召之付之馘滅生人既安乃復其位大無量心不斷仁濟晦朔之間一降真馭蕩除不祥扶翼廉善故尊事祈報之禮甚䖍而度危拔厄之功著見非一天禧二年有龜蛇見於都城東南隅即真武之負足神也居民不日建堂其上以表異之有泉湧其側病者謁之一飲良愈詔遣中使度地置觀名曰禪源加真武號曰靈應真君凡神降之日公侯貴人宫闈戚里朝士大夫閭巷庶人屏居齋戒奔走衢路摩肩擊轂争門而入嵗以為常方州小邑間設祠宇寖乆不治雨漏塵委狐鼠穿穴靈響寂絶無所憑附大家富室猶能虚館寓嚴器飾薫被汎掃以迎其来下里寒陋敗帷破屋父子喧呼腥穢不除欲望雲旗聞風馬九天寥寥區域萬里果何在也夫大淵空谷窅然静深如有神物使人色動形悚無敢狎侮有所畏故也是心也人誰無之顧作之何如耳天慶觀舊無真君祠奉議郎陳公穀語道士史知真曰天之威神位在黄籙汝知日誦其經不能為人請福亦黄冠之罪人也余願以月俸三十萬造真像寄位三清之側以示警發度材聚工峙基結宇汝之責也知真領其語因謁諸里人有河東薛洙者士族子也歡然應之曰此吾志耳相與風曉善類積錢一百三十萬度東南隅為殿四楹涓日之良作大醮設以奠神位劍芒霜冽目采電射𤣥衣矯首赤靈吐舌天丁玉童猛厲静荘旗旛飛揚微風觸人香嬰上騰髣髴雲霧衣冠士庶羅立庭下拜而升拜而獻獻而祝又拜而退踧踖屏息無敢噫唾如負山岳如臨崖谷猶恐神之不享也非有畏心孰能使之方斯時也志専氣柔五官無邪七情不競恍惚之間影動響觸莫知神之所以来也如是者特須㬰之感耳幣焚器徹飲福言歸行路顧瞻不見可畏向時之心寖爾迷滅神之去人亦復逺矣神行乎空虚逺之不得疎近之不得親因人之心為之去来故化材以成象因象以致其心此奉祠之意也人能有常心不變不惰如獻祝之際日勵而時出之無入不為善則神將保汝為福無窮事之順適者不祈而獲顛危疾苦必有以振虎符不飛靈劒不試伏妭飛疰嘯梁瞰室之禍無得而憑陵矣凡諸邦人儆戒無忽政和五年四月二十日記徐州巽臺記徐古大州氣象雄奥面抱巨峯背負連嶂汴泗走乎兩肋長洪齧於衿領之間重岡鉤阜夾曳旁立如鬭如逐如邏如遏雖欲放觀長想意已迫矣州之東南地勢委靡紆以平林演以廣隰山舒而水緩悠然逝隤然止如大路馬安安徐歩如隱君子偃卧退匿可望而不可及使人心目暢達而不病乎拘㡳獨此一隅爾鳳山僧行介即其居之餘址叠石為臺崛然百尺以直其隅憑陵半空睥睨孤刹東南之勝交薦於臺上臺上之觀委虵而無窮也凉秋八月金氣既明草木鮮静天宇空澈太守王公率僚屬登其上而讌飲焉是時也微風颸颸墮乎欄檻飄颻乎衣裾颯然撇巾髮而過也煩昏頓祛神爽超發邈焉引覽千里在睫况練光之横溢紺螺之明滅飛帆歘見孤鶩乍失不舟不轂以意為適直將跨流雲於蒼莽軼征鴻於泬寥而後已也公顧客曰異日有此樂乎吾欲據東南之㑹名此為巽臺非特辨方配物又以表吾之所樂也有客曰巽之名則稱所以為巽之說竊為公發焉解倥偬而攬髙明逃諠囂而接遐曠欣於暫得而横謂之樂非樂也今夫肆目之所逐快心之所適觀滄海之浩茫識閬崑之縹緲搏扶揺撠膠葛浮河漢而問津於牛女猶未厭也須㬰思窮力怠摧頽却顧盃案狼藉人語聒聒曽未離乎一席之上已愀然不恱及乎風霾暴勃霧雨迷塞天寒日暮不可竚立嚮来之樂顛倒潰亂不可復覩而憂隨之矣大哉樂乎古之為道者不交於物意無所至収耳目之役闗吾神明之舎㝠乎至虚以六合為内如此則髙明遐曠無時而不與吾俱存又何能終日栩栩從物飛揚而不返哉故昜曰巽入也真樂堂記李子以書乞墨竹於睂陽先生先生不妄許可得李子之言喜而不拒作大小竹石二畨以貺焉李子再拜而受正顔色而觀之柯葉脩勁聳動偃仰風雨霜霰所不能凌㢘角竅缺盤礴屼峍百夫不可轉也一日而神動二日而心化三日不知形骸之所忘意慮之所得彷徨顧歩如恐其忽然失之也當此之時雖疾雷不驚飄瓦不觸况乎睡寐飢飫晦暘寒燠所能覺哉先生謂李子曰君豈復事此兒女子喜好者也先生道徳髙重冠服天下歉然猶以兒女自處則眇乎不足數者非敢與知也富貴聲色得之則淫溺怠傲不得之則窮日力而争此壯者之所好也飴蜜梨栗得之則莞爾而笑不得則雖若有失而不知所怨此兒女之所好也及夫愁精揺思昏病羸僂雖堂堂之軀未嘗不為兒女之所輕挟懐咀嚼叫呼相擲雖三尺之子未嘗不為壯者之所嘆二者之好果誰樂邪然而壯者之好無窮兒女之好昜足吾以昜足者為真樂夫為天下所笑必以笑天下者也為衆人之所棄必亦棄衆人者也物我未定不可奪此而與彼則姑從所好吾豈知有物哉今以先生石竹掛於坐因名其堂曰真樂且以成先生之貺而不敢忘也葬遺骸記元豐壬戌京師之東自春徂夏連數州不雨徐於他州獨屢飢而旱甚故其民尤病太守髙郵孫公哀民之乆窮也寤寐如疚憂見言色凡山川之在境内與其佛老子之祠不以逺近疏數皆躬請焉至於徙市舞雩之法亦復為之雖雲徂雷升徬徨回薄拒城四五十里輙止疑若有所忤而却者人莫知也是時民以艱食往往盗發荒塚取故塼以售日或百數州有書生江天錫能道晉相和魯公凝記夢事因客以獻請公加禁罰公聞之惻然翌日下令戒民毋得發塚期以不貸遣校吏拾野中遺骸得一百八十餘軀葬於城南官之廢地為之祭告而後掩焉後三日大雨一夕而足初魯公微時偶嵗旱夜禱於家庭既寐夢逰新橋頭數十人聚語道上若弔若賀者怪而問焉前一人對曰吾昔居賓徳坊開運二年死葬於金山之陽吾之閭里附金山而葬者八十餘家嵗逺子孫淪亡祭祀不主無理之人輙破墓暴骸歛陶甓以為貨悠悠之䰟無所棲息故寃哀之氣上薄於天帝實震怒踰時不雨使彼方之民愁餓危蹙為吾等報也然来者猶未已吾方得理於帝君能為我言諸守長可為之禁而歸吾故宅庶㡬可和隂陽囘帝怒而致膏澤焉願公無忽魯公寤即以書抵在位者如其言而為之果驗夫鬼神之難知也乆矣知道者不必窮諸形聲而後信以理推之可也孔子嘗謂子路未知生焉知死未能事人焉能事鬼信乎死之與生鬼之與人雖隂陽晝夜所役之不同要之情状猶未離乎其類也夏凉冬温燕居燕寢覆其體膚藉以筦簟一有不足則通夕不寐及其為鬼也毀其室宅暴其支首凄風烈日無以自蔽豈獨無人之情也哉世固有賤死而蔑鬼者與其自戕也特一間耳昔東海繆殺孝婦三嵗枯旱後太守得其故祭孝婦塜天立雨嵗即大熟以此推之掩骼之報固不疑也雖然君子之用心也不期於巫祝之説亦曰仁而已矣達吾不忍人之心致吾誠而為之若夫報施之端有無之理不必論也大矣哉孫公之仁其利溥也明有以振其生幽有以安其死輙書其事以聞諸四方士大夫之仁者庶㡬公之澤益廣焉元豐四年七月日記任城修佛殿記至人無形合宇宙以為形大道無寄因萬物以為寄形無所窮則不可思寄無所在則不可致若夫㳺想於恍惚之間假名於真寂之外所見非見所得非得是猶鑿地求天止能見影尚何足以覽太空之寥寥指靈明於無碍者哉西方有聖人號其身為千百億化身無往而不通號其法為大寳藏無求而不具變化出沒廣大圎滿不離自性行住坐卧飲食謦欬皆為解脫色所不能見意所不能取以三十二相觀則相相非真以七寳布施修則布施隨盡故非去非来非有非無是名寳相持一句偈解無上意是名無量福徳至於金玉珂貝繒彩雕畫纎麗昭爛作而相之其富無倫髙堂廣厦丹楶藻梲岌嶪沉邃覆而棲之其貴無敵瞻傃引仰胝足血顙歌唄環遶無日不在是於無為中妄生縁影自以為得妙道之行是亦疎矣然則法無二門根有利鈍太上無修非心非佛其次不修佛而修心其下不修心而修佛要其有所至一也由是言之以色相觀以布施修是人雖不能生無所住心已於三毒火中得甘露味必竟清浄不纒煩惱與夫夸悍突盗欺忍頑戾不知可修不見可畏如鬭獸觸格黠囚抵獄不順羈紲不承箠訊跳梁倔强自速䘮害者固有間矣此佛氏之崇塔廟所以有情化也昔者燕人生於燕長於楚及老而還過晉國同行者指其社曰此若里之社乃喟然而嘆指其廬曰此若先人之廬乃潸然而泣夫悲不自知對境而作凡人一禮塔廟一瞻像貌生歸信心起清浄想亦因於境而已外境所設豈能使人生如是心起如是想由自性中本来有故冥冥之民必待境而後知化乃蔽而不自思爾噫性不在境依境而後覺境不碍性見性則自忘及乎萬想俱融一真常寂五藴六根悉是幻化山河大地悉是虚假向之所謂塔廟像貌者乃聚塊積薪而已其於佛也奚有負日軒記天逰子窮冬苦寒薪火不足鑿屋之南垣盗太陽之暄而曝焉大明既升赤烏吐精𤣥冥収威萬物皆傾叢林之鳥穴罅之蟲鳴呼攫躍磨喙伸足于于愉愉莫知所作吾方垂頭隱几閉目擁鼻傴僂而負之初焉若沃若嘘强者柔屈者舒爬搔引挽無意不如少焉肌血活流經於髮膚骨肉俱融充乎虚空吾不知形骸之所以為我我之有形骸邪吾不知洞户奥室綈帷十重白狐䝉茸巨爐獸烘酒行十鍾有樂於此邪吾不知大漠之北氷厚三尺鑚木敲石煙火不出十指欲呵呀然已踣有不幸於此邪吾疑夫隂陽氤氲太和渾淪還我以性命之根使我逰真挹醇與天地並存而獨有此邪吾是以愛之而不知厭就之而不能違晝則遡而東昃則遡而西竊竊然惟恐其去已也已而羲馭將宿奔於䝉谷吾不能疾走而逐於是始不豫於吾心吾猶計之卒嵗之寒不薪不火庶乎計日而長有此也及乎朔風吹雨飛霾四昏老隂司殺怒氣惨烈其闕萬物鳴者吟飛者戢吾亦拘攣拳曲拔肩累足鴟蹲蝸縮敗絮自擁悽酸百種蠢蠢時動如蠒包蛹雖沸九鼎燎鄧林使吾沃而煬之恐未足發吾生氣而綴吾餘息追幸前日之愛不可復也故吾心更悲夫一晝一夜隂陽代更一寒一暑四時錯行此萬物無所逃於天地之間天地亦不得私於萬物今且狥吾所愛將獨有以成吾私既知其不可有也始則不豫於吾心終則其心更悲不亦惑歟然則天下之物戛於利害之塗與吾身託於變化之間者果可以獨有歟至於鬭逐排擊一得一失喜怒相賊而自焚溺者不亦大惑歟是說也雖野人不得獻之於其君吾將自事其心焉樂静集巻六
