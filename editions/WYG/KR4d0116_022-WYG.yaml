body:
  text: 樂靜集巻二十二宋李昭玘撰哲宗興龍節䟽右語律當大吕潜通夢日之符月應上弦燦發流虹之瑞篤生真聖允契昌期恭惟皇帝陛下秉哲自天繼明當極對三靈之休眷度六帝之丕圗叙隂陽風雨以成和媚祖考神祗於安樂萬國熈洽一歸下武之繼文百姓謳歌欣見重華之恊帝俯迎誕節大啓法筵敢慿西竺之文上祝南山之筭伏願神通于號共扶不拔之基壽考萬年永據無疆之福臣無任傾祝䖍切之至僖祖忌䟽積行累功肇啓千齡之運報本反始莫窮萬世之思方諱日之俯臨慿妙縁而上薦惟願證一乘法離六欲天挹仙聖於九清御神靈於四海本支相續與薝蔔以長榮社稷愈安如須彌而不動太宗忌䟽繼志圗功廣規模於萬世興文偃武混夷夏扵一區流澤被乎子孫餘烈照於天地百神幽賛四海永懐載更厭御之辰肅展事存之禮敢慿妙果仰薦真遊伏願超最上乗作無量福皇家繼緒如吐於千花法界含生長霑於一雨仁宗忌䟽大徳宜民共戴天雲之覆庶邦懐惠更深河洛之思垂衣拱手閒燕於四十年餘烈遺風扶持於億萬世頋真遊之雖逺宜昭報之不忘躬啟法筵上資福地惟願六通自在萬行圗成入非想天放光明於寳座以本願力遍功徳於河沙子孫承不㧞之基廟社庇無疆之福神宗小祥功徳䟽帝鄉孰在莫返神遊日軌不留已成周嵗恩涵萬類哀動庶心恭惟神宗皇帝聦明睿知之有臨禮樂政刑而不悖天人和恊宗廟妥安雖堯帝之功獨資於神聖而文王之壽終損於憂勤永辭萬國之依遽歴四時之變玉音未逺龍馭何追抱鼎湖之弓澘焉流涕望裕林之栢森以成行敢薦妙縁少伸哀祝伏願證一乘法離六欲天挹仙聖於九清御神靈於四海乾坤日月共扶不㧞之基社稷子孫永庇無疆之福神宗忌䟽痛龍髯之中斷未盡哀號感春露之既濡已臨諱日神遊寢逺塵世何知頋白晝之不留即金仙而往扣伏願聞一音之真妙滅諸念於往來超最上乘得無漏果寳幢香象長為天上之遊法雨慈雲更作人間之福神宗小祥開啓道塲䟽龍去鼎湖莫返登遐之馭律回姑洗奄當厭御之辰躬啓梵筵仰伸孺慕惟願六通自在十地圎成離有想天不墯金輪之果超極樂界長瞻月相之尊本支永庇於慈雲廟社共依於法力章獻明肅皇后經䟽北郊薦服已推配日之賢南面抱孤更極補天之力憂勤致理慈愛及民屬諱日之載更仰徽音之如在敢憑薫唄上祝莊嚴伏願入觀止門超直乘於十地以威神力扶洪業於萬年神宗皇帝齋䟽龍去橋山悵乗雲之已逺天崩杞國縱殞骨以何支悲動百神哀纒萬國恭惟大行皇帝道躋曠古澤被生民焦心勞思幾至於二十年崇徳廣業將垂於億萬世四方底定百度緝熈未能燕息以隨時終以憂勤而損壽遽辭宸極長往帝鄉頋丹鼎之悲凉空餘塵跡望鈞天於恍惚宛隔神遊仰集勝因少伸孺慕唯願證一乘法離六欲天挹仙聖於九清御神靈於四海乾坤日月共扶不㧞之基社稷子孫永庇無疆之福孝明皇后忌䟽伏以雲衣縹緲頋羽駕之何追寳宇深嚴想徽音之如在俯臨諱日恭啓法筵伏願三十六天直超無上千萬億刼不墮有情生靈共濟於慈梁社稷長依於福海皇帝天寧節功徳䟽天幹三辰嵗分六甲水坐一而利萬物土居中而行四時屬隂陽參合之期為仁聖本元之日是用即琳宫之福地啟金籙之秘文有徳者昌宜神靈之交相歸功於上乃臣子之至情伏望工帝鑒觀衆真感格䕶太清之髙拱擁多福以來宗三百六旬每周流而不息千萬億嵗當永保於無窮樂靜集巻二十二
