body:
  text: 樂靜集巻十六宋李昭玘撰答王賢良與黄安中劉子先朱行中同作試官應詔造庭奏篇入等一時遴選多士榮觀竊以漢唐設科盖以待非常之俊劉董論事亦足見有為之才國家累聖相承得人甚盛半為當世之公相或出同門之父兄自非學洞天人識貫今古發憤吐懣不懼嬰鱗之危投溢扶哀深知鼓瑟之變則何以禮隆仄席望重縉紳抗足而脱塵埃矯首而登雲漢恭惟某官明燭萬里富兼九流不為章句之腐儒竊鄙簿書之俗吏以天下而自任為衆人之不能讜論激揚壓以萬鈞而彌壮多聞霶霈窘之一日以如流理物有藥石之良利民如布帛之煖通逹國體疑素宦於朝動寤上心恨相見之晩較然明白略已施行頋論説之有源將陶鎔之在手某素惟寡學猥預持衡觀水於瀾詎躬渤澥按圗求駿偶識驊騮惠然投我以夜光何有報君之玉案載懐謙抑益用閟藏得之若驚常欲置之懐袖永以為好猶將示諸子孫感戴之私誦言罔究上執政求外任時見任祕閣校理挾無知而遊世動則多違犯不韙以望人困而寡與盖勢踈者情隔能薄者力㣲信未感於言前志欲行乎劵外徑庭直往猶如寸梗之撞鍾呫囁自營僅若飛蚊之過耳知難而退乃分之宜其或心以願違勢由私迮須㬰之渇未能穿九仞之泉跬歩所休何暇種十年之木謂不才而無取宜廢於人見有力者必鳴或闗諸命伏念某蚤從鄉校入踐書林學未逹先生之言名不掛通人之論耗精神於蹇淺困年力之頺侵是非不謬於自知利害相摩於多故同堂笄冠嫁娶並舉者十人舊里田園黍稷不供者數嵗加以伯兄長謝先壠未歸累然諸孤殆絶生意獨有少弟僻在海隅矻矻以窮年嘗耿耿而不寐嚴助懐故土之樂罷直承明陶潛求三徑之資願為彭澤而況手足寡急難之助閨門多凍餒之憂期一假於外官頋何辭於俗吏有政事之責可以赴功䝉禄廪之優足以收族恭惟某官大猷經世一徳亮天利萬物以無私恥一夫之失所退惟頑陋夙被埏鎔冐嵗月以淹回乏毛米之稱報因人並奏既同南郭之吹竽以病得賙獨幸支離之受粟言斯甚廹理或可矜竊以亷者之無求樂聞君子之虚受頋屠門之割大嚼何為寄鷦鷯之棲一枝良足回謝馬狀元奏藝明庭策名上第喧前騶於廣路觀者肩摩落餘藁於四方傳之紙貴望髙時俊光動儒林乃太平養士之功亦諸生稽古之報某人天姿俊徹學術粹深璧水升堂七年並席金鸞唱籍一鳴驚人蓋志大者氣全故實脩而名望落落髙騫於日下錚錚獨黯於彀中御史直聲固遺風之自許平津相業不數嵗而可期某夙仰英㳺阻聞緒論方欲效李邕之識面慕盧仝之卜交奉詔殿廬幸觀落筆曳裾公府復枉過門惠然投我以夜光何有報君之玉案通衢在望絶足方遒陽春白雪之音一時寡和金馬玉堂之步指日可期某猥預盛時喜聞榮捷雖仰洛中之價未盡麈尾之談賀吳正言右某伏審光膺宸綍更踐諫垣聞命之初望風而躍竊以蕙蘭擢秀乆幽而不改其芳鳳凰來翔一出則大驚於世而況君子獨安其處衆人皆謂之賢揚於明庭宜在髙位乃生靈之盛福寔上下之相驩嘗聞士必貴於有為志先行其所學一失是非之辨終迷聲利之塲言欲出而畏憂氣益卑而沮䘮發憤吐懣彼獨何人持禄養交寖成習俗惟大人之特立秉常徳而不移於義也剛不可則止衆人紛警懐蓍龜先見之明末路淹囘挺松栢後凋之操屬明王之嗣服毖萬事以圗新敷求多聞丕式元老方虚心於占訓俄仄席於讜言毅然容貎之堂堂是謂王臣之蹇蹇風節可畏足以厭難於未形議論敢前足以致君於無過此寔徳名之選大為邦國之光施膏澤以下民稍安輿論賛大鈞而播物行竢我公某猥以微蹤夙叨優眷限拘官守阻造台庭賀吳鹽運轉官伏審祗承寵渥峻陟華資叙舜庭考績之優詔商典懋官之舊逖聞成命増激懽悰恭惟某官器宇靜深智猷通博遇事有不疑之决在公惟匪懈之憂百吏承風凛若神明之畏九年足食出於指頋之餘天子重稱其才朝廷無出其右果膺殊眷特拜茂恩竦簮紱之榮觀契明良之嘉㑹使軒留愛已夙慮於公歸廟鼎元勲將黙符於帝賚即聞迅召入覲嚴宸某素託恩休阻趨威重賀李資深中丞光被渙恩峻陞中憲外刺百官之失内繩庶事之違大臣畏法而修天子歛容以遇方朝廷責成之際乃事功考實之時必得剛明肅乂之士以正其紀綱庶幾上下逺近之情不欺於視聽果聞輿論僉屬我公傳命之初有識相慶某官髙標華國清徳照人志包九萬之圗氣㧞東南之秀始徳稱於公相俄名暴於京師接武俊林飛緌禁掖髙牆可仰士尤喜於先登大筆如神上亦嗟其晩見忽厭承明之直暫分瀕海之封馬周方重於太宗賈誼復來於宣室爰禆衮闕遽掌綸言坦明追二帝之書深厚過兩京之制紫垣洒墨湧妙思於泉流白簡數姦勵孤風而鶚立禮法修而百度正議論一而庶心傾即正鈞衡大施徳業不獨重風霜之任亦將隆柱石之功某夙荷眷存乆稽參侍搶榆之跡徒仰於搏霄賀厦之心尚拘於鼓翼賀李邦直舍人寵膺帝制光賛綸言潤色聖人之辭道宣王者之志此多士文章之選為一時儒學之榮才之所難得者盖寡翕聞嘉命歡動衆心某官思識靖深器能起拔文足以經天而緯地道足以致君而澤民望髙華岳之五千氣吞雲夣之八九朅從魏國來對漢庭咳談坐斥於淵雲器業逺躋於晁董飛名京邑竊卑稷下之游洒筆中堂共駭洛陽之少言不激於髙訐理獨盡於忠嘉深簡上心首登清選崢嶸金馬之譽咫尺玉堂之遊暫領憲於東州復懐鈆於左史重資才藻兼代訓辭人爭嘆於湧泉吏每虞於脱腕兩漢之制雖尚覩於遺風三代之文可復還於今日即聞大拜行奮逺圗某夙荷眷存乆稽叅侍下情無任傾依之至賀范龍圖移慶州光膺嘉命更鎮雄藩愛養利源適秉軺於東部統制方面遽握節於西州在君子之時升宜天下之同慶況居屬郡良切懽悰頋惟安化之河開寔㨿昆夷之衿背茍知其策則矢石不試一失其御則疆場屢驚必資忠智之臣以副朝廷之眷某官家聲著代世徳在民卓有髙明之才夙懐康濟之志輟從禁掖暫守帥垣人䝉奠枕之安國頼長城之固避子亭之坐可想遺風立棠棣之碑何慙往躅竚還閫寄入賛冢司某限守州符阻趨鈞屏下情無任傾頌激切之至賀胡學士加職知桂府竊以海中三峯地稱仙境嶠南五筦天限炎荒一則提封屏翰之邦一則取象圗書之府惟時嘉命屬我名臣恭惟知府安撫龍圗問學淵微器能通博奉咨詢之煩使羙譽處於先朝入綴星郎暫游蘭省後來居上安暇競時獨秀必摧翻成遻物寜遇風而知退恥躍金以自言疾驅太行周覽二陜邊民待哺喜車馭之復來野老饋漿驚節麾之幾盡果膺優詔擢預清班能世其家清氊故在不難為弟棠棣相承頋東眷之方隆將陶鎔之在即折衝萬里雖頼得人雅意本朝未容去國行聞羙拜寔慰僉言某素以孱愚重叨奬遇為屬部之吏嘗􅊀下陳同舉酒之歡復陪廣座猥煩謙徳先辱長緘得之若驚嘗欲置之懐袖永以為好將猶示諸子孫感荷之深誦言奚既上李邦直一違鈞坐再閱嵗華乆攖俗吏之簿書幾廢小夫之竿牘盈尺之紙安能自冩其肺腸萬頃之波固亦不遺於汙潦憂皇所載展轉益危與其自棄而不言孰若以誠而歸罪某官生民先覺盛世元臣吐辭為經鄙荀揚之未粹以道致主非堯舜而不陳經綸以四海為心進退有古人之節前功未就毅然待旦而行庶政已成率爾乞身而去蹔資舊徳作鎮别都時驅大府之旌牙坐嘯昔遊之泉石腹心之託曽未間於須㬰天日之光常不違於咫尺精神相感寤寐不忘宜一徳之有求乘三陽而並進為天下計必資良佐之才以我公歸永作生民之福某素慙譾陋曲被陶成每殫十駕之勤愧乏一毫之補轍鮒得水雖切幸於餘波塞馬嘶風終不忘於故國限拘官守阻造賓庭樂靜集卷十六
